// ===== Lerp =====
// =====================================================
// ============================================================
// FIGHTER CLASS — Direct Drawing (no skeleton/joints)
// Shadow Fight style: silhouette + glow + state-based poses
// ============================================================

const STATES = {
    IDLE:'idle', WALK:'walk', JUMP:'jump', FALL:'fall', LAND:'land',
    ATTACK_LIGHT:'attack_light', ATTACK_HEAVY:'attack_heavy',
    BLOCK:'block', HURT:'hurt', STUN:'stun', DEATH:'death', WIN:'win'
};
const ANIM_DATA = {
    idle:         {loop:true,  dur:800},
    walk:         {loop:true,  dur:400},
    jump:         {loop:false, dur:300},
    fall:         {loop:false, dur:500},
    land:         {loop:false, dur:200, recovery:200},
    attack_light: {loop:false, startup:80,  active:180, recovery:360, dur:360},
    attack_heavy: {loop:false, startup:140, active:280, recovery:560, dur:560},
    block:        {loop:true,  dur:200},
    hurt:         {loop:false, dur:320},
    stun:         {loop:false, dur:500},
    death:        {loop:false, dur:800},
    win:          {loop:true,  dur:600},
};

// Hitbox helpers (simple AABB, no joints needed)
const HITBOX_BODY  = {oy:-70, h:80, w:28};
const HITBOX_PUNCH = {oy:-50, h:24, w:40};
const HITBOX_SWORD = {oy:-60, h:22, w:64};


function Fighter(x, color, isPlayer, maxHp, hasSword) {
    if(maxHp===undefined)maxHp=100;
    if(hasSword===undefined)hasSword=false;
        this.x=x; this.y=CONFIG.groundY;
        this.vx=0; this.vy=0;
        this.color=color;
        this.hitRotation=0; // knockback rotation angle
        this.hitRotVel=0;
        this.health=maxHp; this.maxHealth=maxHp;
        this.isGrounded=true;
        this.facing=isPlayer?1:-1;
        this.isAttacking=false; this.isBlocking=false;
        this.lastAttackTime=0;
        this.stunned=0;
        this.invincible=false; this.invincibleEnd=0;
        this.isPlayer=isPlayer;
        this.blockStamina=100;
        this.combo=0; this.lastHitTime=0;
        this.hasSword=hasSword;
        this.landingSquish=0; this.recoilX=0;
        this.heroId='kang';
        // State machine
        this.state=STATES.IDLE;
        this.stateStart=Date.now(); this.stateTime=0;
        this.canInterrupt=true;
        // Walk animation phase
        this.walkPhase=0;
        // Sprite renderer
        this.spriteRenderer = new SpriteRenderer(isPlayer);
        this._lastDrawTime   = Date.now();
        // ── Pose Blending ──
        this._prevPose = null;   // pose از الـ state السابق
        this._blendT   = 1.0;    // 0→1 (1 = fully new pose)
        this._blendSpd = 0.18;   // سرعة الـ blend
        // ── Smooth velocity (acceleration/deceleration) ──
        this.smoothVx  = 0;      // velocity المعروضة للـ animation
        // ── Attacker recoil ──
        this.attackerRecoil = 0;
        // ── Freeze frame ──
        this._freezeUntil = 0;
    
}

Fighter.boxesOverlap = function(a,b) {
        return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
    
};

Fighter.prototype.setState = function(s, force) {
    if(force===undefined)force=false;
        if(!force&&!this.canInterrupt) return;
        if(this.state===STATES.DEATH) return;
        if(this.state===s) return;
        // حفظ الـ pose الحالية قبل التغيير عشان نعمل blend منها
        if(this._prevPose) {
            // دمج الـ blend المتبقية في الـ prevPose
            this._prevPose = this._getBlendedPose(this._prevPose, this._lastRawPose||this._prevPose, this._blendT);
        }
        this._blendT   = 0.0;  // ابدأ blend من الأول
        // سرعة الـ blend حسب نوع الـ transition
        const fast = (s===STATES.HURT||s===STATES.DEATH||s===STATES.ATTACK_LIGHT||s===STATES.ATTACK_HEAVY);
        this._blendSpd = fast ? 0.28 : 0.14;
        this.state=s; this.stateStart=Date.now(); this.stateTime=0;
        const a=ANIM_DATA[s];
        if(a&&!a.loop&&a.recovery){
            this.canInterrupt=false;
            var _self1=this; setTimeout(function(){_self1.canInterrupt=true;},a.recovery);
        } else { this.canInterrupt=true; }
    
};

Fighter.prototype.getBodyBox = function() {
        return {
            x: this.x+this.recoilX - HITBOX_BODY.w/2,
            y: this.y + HITBOX_BODY.oy,
            w: HITBOX_BODY.w, h: HITBOX_BODY.h
        };
    
};

Fighter.prototype.getAttackBox = function() {
        const def = this.hasSword ? HITBOX_SWORD : HITBOX_PUNCH;
        const f   = this.facing;
        return {
            x: this.x + this.recoilX + (f>0 ? 10 : -10-def.w),
            y: this.y + def.oy,
            w: def.w, h: def.h
        };
    
};

Fighter.prototype.update = function() {
        const now=Date.now();
        this.stateTime=now-this.stateStart;
        if(this.stunned>0){this.stunned--;if(this.stunned===0)this.setState(STATES.IDLE,true);}
        if(this.invincible&&now>this.invincibleEnd) this.invincible=false;
        if(!this.isBlocking&&this.blockStamina<100)
            this.blockStamina=Math.min(100,this.blockStamina+0.5);
        const wasGrounded=this.isGrounded;
        this.vy+=CONFIG.gravity; this.y+=this.vy;
        if(this.y>=CONFIG.groundY){
            if(!wasGrounded&&this.vy>3){
                this.landingSquish=10; spawnLandingDust(this.x);
                this.setState(STATES.LAND,true);
                var _self2=this; setTimeout(function(){if(_self2.state===STATES.LAND)_self2.setState(STATES.IDLE,true);},200);
            }
            this.y=CONFIG.groundY; this.vy=0; this.isGrounded=true;
            if(!this.isPlayer){
                this.vx *= CONFIG.friction;
            } else if(!keys.left && !keys.right){
                // تباطؤ تدريجي — أسرع لو بتغير اتجاه، أبطأ لو توقفت
                const stopFriction = Math.abs(this.vx) < 1.0 ? 0.72 : 0.82;
                this.vx *= stopFriction;
            }
        } else {
            this.isGrounded=false; this.vx*=CONFIG.airFriction;
            if(this.vy>1&&this.state!==STATES.FALL) this.setState(STATES.FALL);
        }
        if(this.landingSquish>0) this.landingSquish-=1.5;
        if(Math.abs(this.recoilX)>0.1) this.recoilX*=0.75; else this.recoilX=0;
        // Hit rotation decay
        if(Math.abs(this.hitRotVel)>0.001){ this.hitRotation+=this.hitRotVel; this.hitRotVel*=0.82; }
        else { this.hitRotation*=0.88; this.hitRotVel=0; }
        // Attacker recoil decay
        if(Math.abs(this.attackerRecoil)>0.1) this.attackerRecoil*=0.7; else this.attackerRecoil=0;
        // Smooth velocity for animation lean (acceleration feel)
        this.smoothVx += (this.vx - this.smoothVx) * 0.18;
        this.x+=this.vx;
        this.x=Math.max(40,Math.min(canvas.width-40,this.x));
        if(!this.isPlayer) return;
        const moving=Math.abs(this.vx)>0.5;
        if(this.isGrounded&&!this.isAttacking&&!this.isBlocking
           &&this.state!==STATES.LAND&&this.state!==STATES.HURT&&this.state!==STATES.STUN)
            this.setState(moving?STATES.WALK:STATES.IDLE);
        if(!this.isGrounded&&this.vy<-1) this.setState(STATES.JUMP);
        if(this.isBlocking&&this.state!==STATES.HURT) this.setState(STATES.BLOCK,true);
    
};

Fighter.prototype.takeDamage = function(amount, attacker) {
        if(this.invincible||this.health<=0) return false;
        let finalDmg=amount, kb=5.5;
        if(this.isBlocking&&this.blockStamina>0){
            finalDmg=Math.floor(amount*(1 - player.blockPow/100));
            this.blockStamina-=amount*2; kb=1.5;
            AudioManager.play('block');
            spawnHitParticles(this.x,this.y-40,'#3498db','block');
            ScreenShake.trigger(3,4);
            this.recoilX=attacker.x<this.x?3:-3;
        } else {
            AudioManager.play('hit');
            const heavy=finalDmg>20;
            spawnHitParticles(this.x,this.y-40,this.color,heavy?'heavy':'hit');
            spawnHitParticles(this.x,this.y-40,'#f1c40f','sparks');
            ScreenShake.trigger(heavy?8:5,heavy?8:5);
            // Freeze frame — توقف قصير على الإمباكت
            this._freezeUntil = Date.now() + (heavy ? 80 : 45);
            if(attacker) attacker._freezeUntil = Date.now() + (heavy ? 60 : 30);
            // Attacker recoil — المهاجم بيترجع شوية
            if(attacker) attacker.attackerRecoil = (attacker.facing > 0 ? -3.5 : 3.5) * (heavy ? 1.5 : 1);
            this.setState(STATES.HURT,true);
            this.recoilX=attacker.x<this.x?5:-5;
            // Hit rotation — الشخصية بتتلوي لما تتضرب
            this.hitRotVel = (attacker.x < this.x ? 1 : -1) * (heavy ? 0.18 : 0.10);
        }
        this.health=Math.max(0,this.health-finalDmg);
        const dir=attacker.x<this.x?1:-1;
        this.vx=dir*kb; this.vy=-4;
        damageNumbers.push({x:this.x,y:this.y-60,vy:-2.5,alpha:1,text:`-${Math.round(finalDmg)}`,color:this.isPlayer?"#e74c3c":"#f1c40f",size:Math.min(28,16+finalDmg*0.3)});
        this.invincible=true;
        this.invincibleEnd=Date.now()+CONFIG.invincibilityDuration;
        if(attacker && attacker.isPlayer){
            const n=Date.now();
            attacker.combo=(n-attacker.lastHitTime<CONFIG.comboWindow)?attacker.combo+1:1;
            attacker.lastHitTime=n;
            if(attacker.combo>=3){
                spawnComboEffect(this.x,this.y,attacker.combo);
                ScreenFlash.trigger(
                    attacker.combo>=7?'#e74c3c':attacker.combo>=5?'#e67e22':'#f1c40f',
                    Math.min(0.35,attacker.combo*0.05));
                if(attacker.combo>=5) ScreenShake.trigger(attacker.combo,6);
            }
        }
        return true;
    
};

Fighter.prototype.draw = function(ctx) {
    var now  = Date.now();
    var dt   = Math.min(now - (this._lastDrawTime||now), 50);
    this._lastDrawTime = now;

    var cx   = this.x + this.recoilX + (this.attackerRecoil||0);
    var cy   = this.y;
    var inv  = this.invincible && Math.floor(now/80)%2;
    var st   = this.state;

    var heroId  = this.heroId||'kang';
    var isHogan = heroId==='hogan';
    var isGante = heroId==='gante';
    var isKenji = heroId==='kenji';

    var glow = inv ? '#fff' :
               isHogan ? '#e67e22' :
               isGante ? '#ff4400' :
               isKenji ? '#9b59b6' :
               (heroId==='normal') ? '#e74c3c' : '#4ab4ff';

    // update sprite animation
    this.spriteRenderer.isPlayer = this.isPlayer;
    this.spriteRenderer.update(st, dt);

    // scale: Hogan bigger, Kenji smaller
    var sc = isHogan ? 2.1 : isGante ? 1.95 : isKenji ? 1.6 : 1.8;

    // hit rotation + velocity lean
    var rot     = this.hitRotation || 0;
    var velLean = (this.smoothVx||0) * 0.016;
    var sq      = Math.max(0, this.landingSquish);
    var psx     = 1 + sq*0.03;
    var psy     = 1 - sq*0.03;

    // ── Aura glow ──
    var aC = ({'kang':'rgba(74,180,255,','hogan':'rgba(230,126,34,',
               'gante':'rgba(255,68,0,', 'kenji':'rgba(155,89,182,',
               'normal':'rgba(231,76,60,'})[heroId] || 'rgba(74,180,255,';
    var ap = 0.1 + Math.sin(now/420)*0.05;
    ctx.save(); ctx.globalAlpha = ap;
    var aG = ctx.createRadialGradient(cx,cy-50,4,cx,cy-50,52);
    aG.addColorStop(0, aC+'0.35)'); aG.addColorStop(0.55,aC+'0.1)'); aG.addColorStop(1,aC+'0)');
    ctx.fillStyle=aG;
    ctx.beginPath(); ctx.ellipse(cx,cy-50,48,62,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Ground shadow
    var airH       = Math.max(0, CONFIG.groundY - this.y);
    var shadowAlpha= Math.max(0.05, 0.3 - airH*0.003);
    var shadowW    = Math.max(10, (28 - airH*0.15) * sc * 0.6);
    ctx.save();
    ctx.globalAlpha = shadowAlpha;
    ctx.fillStyle   = '#000';
    ctx.beginPath();
    ctx.ellipse(cx, CONFIG.groundY+4, shadowW, shadowW*0.28, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // motion trail on attack active frames
    var isAtk = (st===STATES.ATTACK_LIGHT||st===STATES.ATTACK_HEAVY);
    if (isAtk && this.stateTime > 80 && this.stateTime < 250){
        motionTrails.push({
            x:cx, y:cy, f:this.facing, heroId:heroId,
            alpha:0.18, glow:glow
        });
    }

    // main draw with transform
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot + velLean);
    ctx.scale(psx, psy);
    ctx.translate(-cx, -cy);

    this.spriteRenderer.draw(
        ctx, cx, cy,
        this.facing,
        sc,
        inv ? 0.4 : 1.0,
        glow
    );

    // HitFlash overlay
    if (this.isPlayer && HitFlash.p1 > 0.05){
        ctx.globalAlpha = HitFlash.p1 * 0.55;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(cx, cy - 50, 20*sc*0.55, 50*sc*0.55, 0, 0, Math.PI*2);
        ctx.fill();
    } else if (!this.isPlayer && HitFlash.p2 > 0.05){
        ctx.globalAlpha = HitFlash.p2 * 0.55;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(cx, cy - 50, 20*sc*0.55, 50*sc*0.55, 0, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();

    // Block shield
    if (this.isBlocking) {
        ctx.save();
        var sp = 0.7 + Math.sin(now/180)*0.3;
        ctx.globalAlpha = sp;
        var shCol = isHogan?'#e67e22':isGante?'#ff5500':'#3498db';
        ctx.strokeStyle = shCol; ctx.lineWidth=4;
        ctx.shadowColor = shCol; ctx.shadowBlur=22;
        ctx.beginPath(); ctx.arc(cx + this.facing*32, cy-60, 26, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 0.12*sp; ctx.fillStyle=shCol;
        ctx.beginPath(); ctx.arc(cx + this.facing*32, cy-60, 26, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
};



// ── Blend helper: lerp بين كل قيم الـ pose ──
Fighter.prototype._getBlendedPose = function(a, b, t) {
    var keys = ['hx','hy','lean','arRs','arRe','arLs','arLe',
                'lgRh','lgRa','lgLh','lgLa','bob','scaleX','scaleY'];
    var out = {};
    for(var i=0;i<keys.length;i++){
        var k=keys[i];
        var av=(a&&a[k]!=null)?a[k]:(k==='scaleX'||k==='scaleY'?1:0);
        var bv=(b&&b[k]!=null)?b[k]:(k==='scaleX'||k==='scaleY'?1:0);
        out[k] = av + (bv - av) * t;
    }
    out.inActive = b ? !!b.inActive : false;
    return out;
};

Fighter.prototype._getPose = function(st, t, f, now) {
        // defaults: upright idle
        let p = {
            // head offset
            hx:0, hy:0,
            // body lean (degrees)
            lean:0,
            // right arm: shoulder-elbow angle, elbow-wrist angle
            arRs:0, arRe:0,
            // left arm
            arLs:0, arLe:0,
            // right leg: hip-knee, knee-ankle
            lgRh:0, lgRa:0,
            // left leg
            lgLh:0, lgLa:0,
            // vertical bob
            bob:0,
            // attack active frame
            inActive: false,
        };

        const sin=Math.sin, cos=Math.cos, PI=Math.PI;
        const pr=(a,b)=>Math.min((t-a)/Math.max(b-a,1),1); // progress a→b

        if(st===STATES.IDLE){
            // breathing: chest expands على sine wave
            const breath = sin(now/820);
            const b = breath*3.8;
            p.bob  = b;
            p.hy   = b*0.35;
            p.arLs = 18 + breath*5;  p.arLe = 12 + breath*3;
            p.arRs = -18 - breath*5; p.arRe = -12 - breath*3;
            p.lgRh = 7; p.lgLh = -7;
            // lean من الـ smooth velocity حتى في الـ idle
            p.lean = (this.smoothVx||0)*1.8 + breath*1.2;
        }
        else if(st===STATES.WALK){
            // walkPhase speed tied to actual velocity
            const absVx = Math.abs(this.smoothVx||this.vx);
            this.walkPhase += 0.10 + absVx * 0.032;
            const wc = this.walkPhase;
            const spd = Math.min(absVx/4.5, 1);
            // Natural arm swing — عكس الرجل
            p.arRs = sin(wc)*32*spd;    p.arRe = sin(wc)*16*spd;
            p.arLs =-sin(wc)*32*spd;    p.arLe =-sin(wc)*16*spd;
            // الرجلين مع knee bend طبيعي
            const kBend = 18 + spd*12;
            p.lgRh = sin(wc)*34*spd;
            p.lgRa = sin(wc) > 0 ? sin(wc)*kBend : sin(wc)*8;
            p.lgLh =-sin(wc)*34*spd;
            p.lgLa = sin(wc) < 0 ? -sin(wc)*kBend : -sin(wc)*8;
            // Bob مع الخطوة — بينزل عند منتصف الخطوة
            p.bob  = -Math.abs(sin(wc))*5*spd;
            p.lean = (this.smoothVx||this.vx)*2.8;
            // طفرة خفيفة للأمام في الكتف مع الخطوة
            p.hx   = sin(wc)*2*spd;
        }
        else if(st===STATES.JUMP){
            // Phase based on actual vy — rising vs falling
            const rising = this.vy < 0;
            const airTime = Math.min(t/300, 1);
            const ease = rising ? (1-(1-airTime)*(1-airTime)) : airTime;
            if(rising){
                // بيطلع — الجسم بيمتد للأعلى stretch
                p.bob   = -ease*18;
                p.arRs  = lerp(0,-55,ease);  p.arRe = lerp(0,-25,ease);
                p.arLs  = lerp(0,-55,ease);  p.arLe = lerp(0,-25,ease);
                p.lgRh  = lerp(0, 25,ease);  p.lgRa = lerp(0, 18,ease);
                p.lgLh  = lerp(0,-25,ease);  p.lgLa = lerp(0,-18,ease);
                p.scaleX = 1 - ease*0.06;  p.scaleY = 1 + ease*0.08; // stretch up
            } else {
                // بينزل — arms أفقية للتوازن
                p.bob   = ease*8;
                p.arRs  = -45 + ease*20;  p.arRe = -10;
                p.arLs  = -45 + ease*20;  p.arLe = -10;
                p.lgRh  = 20 - ease*15;
                p.lgLh  = -20 + ease*15;
                p.lean  = (this.vx||0)*1.5;
            }
        }
        else if(st===STATES.FALL){
            p.arRs=-28; p.arRe=-12; p.arLs=-28; p.arLe=-12;
            p.lgRh=18;  p.lgLh=-18;
            p.lean = (this.vx||0)*1.8;
        }
        else if(st===STATES.LAND){
            const pv = pr(0,220);
            // bounce curve: بيضغط ثم يرجع بـ overshoot
            const bounce = Math.sin(pv * Math.PI) * (1-pv*0.5);
            p.bob    = bounce * 14;
            p.lgRh   = bounce * 28;  p.lgLh = bounce * 28;
            p.arRs   = bounce * 18;  p.arLs = bounce * 18;
            p.lean   = (this.smoothVx||0)*1.5;
            // squash على اللمسة
            p.scaleX = 1 + bounce*0.08;
            p.scaleY = 1 - bounce*0.06;
        }
        else if(st===STATES.ATTACK_LIGHT){
            const a=ANIM_DATA.attack_light;
            if(t<a.startup){
                // wind-up: اليد ترجع للوراء + الجسم ينكمش (squash)
                const pv=pr(0,a.startup);
                const ease=pv*pv; // ease-in
                p.arRs=lerp(0,-70,ease); p.arRe=lerp(0,-35,ease);
                p.lean=lerp(0,-15,ease);
                p.bob =lerp(0,-6,ease);   // جسم ينزل شوية
                p.scaleX=1-ease*0.08;     // squash أفقي
                p.scaleY=1+ease*0.06;     // stretch رأسي
            } else if(t<a.active){
                const pv=pr(a.startup,a.active);
                const ease=1-(1-pv)*(1-pv); // ease-out
                p.arRs=lerp(-70,75,ease); p.arRe=lerp(-35,18,ease);
                p.lean=lerp(-15,22,ease); p.hx=lerp(0,8,ease);
                p.bob =lerp(-6,4,ease);
                // stretch في اتجاه اللكمة
                p.scaleX=1+ease*0.12;
                p.scaleY=1-ease*0.08;
                p.inActive=true;
            } else {
                const pv=pr(a.active,a.recovery);
                p.arRs=lerp(75,0,pv); p.lean=lerp(22,0,pv); p.bob=lerp(4,0,pv);
                p.scaleX=lerp(1.12,1,pv); p.scaleY=lerp(0.92,1,pv);
            }
        }
        else if(st===STATES.ATTACK_HEAVY){
            const a=ANIM_DATA.attack_heavy;
            if(t<a.startup){
                const pv=pr(0,a.startup);
                const ease=pv*pv;
                p.arRs=lerp(0,-90,ease); p.arRe=lerp(0,-45,ease);
                p.arLs=lerp(0,-35,ease);
                p.lean=lerp(0,-22,ease); p.bob=lerp(0,-12,ease);
                p.scaleX=1-ease*0.1; p.scaleY=1+ease*0.1;
            } else if(t<a.active){
                const pv=pr(a.startup,a.active);
                const ease=1-(1-pv)*(1-pv);
                p.arRs=lerp(-90,90,ease); p.arRe=lerp(-45,24,ease);
                p.lean=lerp(-22,28,ease); p.hx=lerp(0,10,ease);
                p.bob=lerp(-12,8,ease);
                p.scaleX=1+ease*0.15; p.scaleY=1-ease*0.12;
                p.inActive=true;
            } else {
                const pv=pr(a.active,a.recovery);
                p.arRs=lerp(90,0,pv); p.lean=lerp(28,0,pv);
                p.scaleX=lerp(1.15,1,pv); p.scaleY=lerp(0.88,1,pv);
            }
        }
        else if(st===STATES.BLOCK){
            p.arRs=-10; p.arRe=-20; p.arLs=-10; p.arLe=-20;
            p.lean=-8; p.hx=-5;
        }
        else if(st===STATES.HURT){
            const pv = 1 - pr(0,320);
            const bounce = sin(t/40)*pv*3;   // micro-vibration
            p.lean = pv*22 + bounce;
            p.hx   = pv*10;
            p.bob  = pv*8;
            // ايدين تتفرج للجنبين من الضربة
            p.arRs = lerp(0,-55,pv);  p.arRe = lerp(0,20,pv);
            p.arLs = lerp(0,-30,pv);  p.arLe = lerp(0,15,pv);
            // رجلين بتنفرجوا شوية
            p.lgRh = pv*12;  p.lgLh = -pv*12;
            p.scaleX = 1 - pv*0.06;
            p.scaleY = 1 + pv*0.04;
        }
        else if(st===STATES.WIN){
            const b=Math.abs(sin(now/400))*30;
            p.arRs=-b; p.arRe=-b*0.5;
            p.arLs=-b; p.arLe=-b*0.5;
            p.bob=sin(now/500)*5;
        }
        else if(st===STATES.DEATH){
            const pv=Math.min(t/600,1);
            p.bob=lerp(0,70,pv); p.lean=lerp(0,80,pv);
            p.arRs=lerp(0,60,pv); p.arLs=lerp(0,40,pv);
        }

        return p;
    
};

Fighter.prototype._drawPose = function(ctx, cx, cy, f, p, bodyCol, glow, now, isHogan, isGante, isKenji, isNorm, st) {
        // Sizes per character
        const headR  = isHogan?20  : isKenji?14  : 16;
        const torsoH = isHogan?50  : isKenji?38  : 43;
        const legL   = isHogan?40  : isKenji?30  : 35;
        const armL   = isHogan?32  : isKenji?24  : 27;
        const bodyW  = isHogan?17  : isKenji?10  : 13;
        const limbW  = isHogan?13  : isKenji?8   : 10;
        const fistR  = isHogan?11  : isKenji?7   : 9;
        const legW   = isHogan?15  : isKenji?9   : 12;

        // World Y of key body points
        const rootY     = cy + p.bob;
        const hipY      = rootY;
        const shoulderY = hipY - torsoH;
        const headY     = shoulderY - headR - 5;
        const leanOff   = p.lean * 0.4;
        const bx        = cx + leanOff;

        // Helper: رسم segment مع highlight
        var limb = function(x1,y1,ang,len,w,col2,glowC,glowB) {
            const rad=ang*Math.PI/180;
            const x2=x1+Math.sin(rad)*len*f;
            const y2=y1+Math.cos(rad)*len;
            ctx.save();
            ctx.strokeStyle=col2||bodyCol; ctx.lineWidth=w; ctx.lineCap='round';
            ctx.shadowColor=glowC||glow; ctx.shadowBlur=glowB||5;
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
            // highlight streak
            ctx.globalAlpha=0.15; ctx.strokeStyle='#fff';
            ctx.lineWidth=Math.max(1,w*0.28); ctx.shadowBlur=0;
            ctx.beginPath(); ctx.moveTo(x1-f*1,y1); ctx.lineTo(x2-f*1,y2); ctx.stroke();
            ctx.restore();
            return {x:x2,y:y2};
        };

        // Colors per character
        const lCol  = isHogan?'#1a0e00':isGante?'#1a0600':isKenji?'#0d0d1a':'#0e0e12';
        const lGlow = isHogan?'#e67e22':isGante?'#ff4400':isKenji?'#9b59b6':glow;
        const aCol  = isHogan?'#1a0a00':isGante?'#180300':isKenji?'#0e0a1c':'#0d0d11';

        // ===== LEGS =====
        const knee_r=limb(cx,hipY,p.lgRh,legL*0.55,legW,lCol,lGlow,5);
        const foot_r=limb(knee_r.x,knee_r.y,p.lgRh+p.lgRa,legL*0.46,legW-2,lCol,lGlow,4);
        const knee_l=limb(cx,hipY,p.lgLh,legL*0.55,legW,lCol,lGlow,5);
        const foot_l=limb(knee_l.x,knee_l.y,p.lgLh+p.lgLa,legL*0.46,legW-2,lCol,lGlow,4);
        // Knee joints
        ctx.save();
        ctx.fillStyle=isHogan?'rgba(230,126,34,0.7)':'rgba(255,255,255,0.12)';
        ctx.shadowColor=lGlow; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.arc(knee_r.x,knee_r.y,legW*0.38,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(knee_l.x,knee_l.y,legW*0.38,0,Math.PI*2); ctx.fill();
        ctx.restore();
        this._drawBoots(ctx,foot_r.x,foot_r.y,foot_l.x,foot_l.y,f,isHogan,isGante,isKenji,glow);

        // ===== TORSO =====
        ctx.save();
        ctx.lineCap='round';
        // Belt accent
        ctx.strokeStyle=isHogan?'rgba(230,126,34,0.5)':isGante?'rgba(255,100,0,0.4)':isKenji?'rgba(120,80,200,0.4)':'rgba(255,255,255,0.07)';
        ctx.lineWidth=bodyW*2.2+4; ctx.shadowColor=lGlow; ctx.shadowBlur=3;
        ctx.beginPath(); ctx.moveTo(cx,hipY); ctx.lineTo(cx,hipY-6); ctx.stroke();
        // Main torso
        ctx.strokeStyle=bodyCol; ctx.lineWidth=bodyW*2;
        ctx.shadowColor=glow; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.moveTo(cx,hipY); ctx.lineTo(bx,shoulderY); ctx.stroke();
        // Torso highlight
        ctx.globalAlpha=0.14; ctx.strokeStyle='#fff'; ctx.lineWidth=bodyW*0.55; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.moveTo(cx-f*2,hipY-4); ctx.lineTo(bx-f*2,shoulderY+8); ctx.stroke();
        ctx.restore();

        // ===== TORSO DETAILS =====
        if(isHogan) this._hoganTorso(ctx,bx,shoulderY,hipY,f,glow);
        if(isGante) this._ganteTorso(ctx,bx,shoulderY,hipY);
        if(isKenji) this._kenjiScarf(ctx,bx,shoulderY,f,now);
        if(isNorm)  this._normalBelt(ctx,cx,hipY,f);

        // ===== ARMS =====
        const shoulderAttachY=shoulderY+8;
        const elbow_r=limb(bx,shoulderAttachY,p.arRs,armL*0.54,limbW,aCol,lGlow,6);
        const wrist_r=limb(elbow_r.x,elbow_r.y,p.arRs+p.arRe,armL*0.46,limbW-2,aCol,lGlow,4);
        const elbow_l=limb(bx,shoulderAttachY,p.arLs,armL*0.54,limbW,aCol,lGlow,6);
        const wrist_l=limb(elbow_l.x,elbow_l.y,p.arLs+p.arLe,armL*0.46,limbW-2,aCol,lGlow,4);
        // Elbow joints
        ctx.save();
        ctx.fillStyle=isHogan?'rgba(230,126,34,0.7)':'rgba(255,255,255,0.1)';
        ctx.shadowColor=lGlow; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.arc(elbow_r.x,elbow_r.y,limbW*0.4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(elbow_l.x,elbow_l.y,limbW*0.4,0,Math.PI*2); ctx.fill();
        // Shoulder caps
        ctx.fillStyle=isGante?'rgba(255,80,0,0.25)':isKenji?'rgba(100,50,180,0.22)':'rgba(255,255,255,0.07)';
        ctx.beginPath(); ctx.arc(bx,shoulderAttachY,limbW+3,0,Math.PI*2); ctx.fill();
        ctx.restore();
        this._drawFists(ctx,wrist_r.x,wrist_r.y,wrist_l.x,wrist_l.y,fistR,isGante,isHogan,isKenji,glow);

        // ===== HEAD =====
        // Idle breathing subtle head float
        const breathShift = (st===STATES.IDLE) ? Math.sin(now/820)*1.2 : 0;
        ctx.save();
        ctx.shadowColor=glow; ctx.shadowBlur=18+Math.sin(now/400)*5;
        const hg=ctx.createRadialGradient(bx+p.hx-headR*0.25,headY-headR*0.25+breathShift,headR*0.1,bx+p.hx,headY+breathShift,headR+4);
        hg.addColorStop(0, isGante?'#200800':isKenji?'#1c1830':isHogan?'#1e1410':'#181819');
        hg.addColorStop(0.6,isGante?'#100300':isKenji?'#0e0e20':isHogan?'#140e0a':'#0f0f10');
        hg.addColorStop(1,'#050505');
        ctx.fillStyle=hg;
        ctx.beginPath(); ctx.arc(bx+p.hx,headY+breathShift,headR,0,Math.PI*2); ctx.fill();
        // Rim light
        ctx.globalAlpha=0.25; ctx.strokeStyle=glow; ctx.lineWidth=1.5; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.arc(bx+p.hx,headY+breathShift,headR,Math.PI*1.15,Math.PI*1.85); ctx.stroke();
        ctx.restore();

        // ===== HEAD DETAILS =====
        if(!isNorm&&!isHogan&&!isGante&&!isKenji) this._kangBandana(ctx,bx+p.hx,headY,headR,f,now);
        if(isHogan) this._hoganHelmet(ctx,bx+p.hx,headY,headR,f);
        if(isKenji) this._kenjiHood(ctx,bx+p.hx,headY,headR,f,now);
        if(isGante) this._ganteHeadDetails(ctx,bx+p.hx,headY,headR,f,now);

        // ===== EYES =====
        this._drawEyes(ctx,bx+p.hx,headY,f,glow,now,isGante,isHogan,isKenji);

        // ===== NECK =====
        ctx.save();
        ctx.strokeStyle=bodyCol; ctx.lineWidth=bodyW*1.1; ctx.lineCap='round';
        ctx.shadowColor=glow; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.moveTo(bx,shoulderY); ctx.lineTo(bx+p.hx,headY+headR); ctx.stroke();
        ctx.restore();

        // ===== WEAPON =====
        this._drawWeapon(ctx,wrist_r.x,wrist_r.y,f,now,p.inActive);

        // ===== BLOCK SHIELD =====
        if(this.isBlocking){
            ctx.save();
            const sp=0.7+Math.sin(now/180)*0.3;
            ctx.globalAlpha=sp;
            ctx.strokeStyle=isHogan?'#e67e22':isGante?'#ff5500':'#3498db';
            ctx.lineWidth=4; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=22;
            ctx.beginPath(); ctx.arc(bx+f*32,shoulderY+12,26,0,Math.PI*2); ctx.stroke();
            ctx.globalAlpha=0.12*sp; ctx.fillStyle=ctx.strokeStyle;
            ctx.beginPath(); ctx.arc(bx+f*32,shoulderY+12,26,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=0.4*sp; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(bx+f*32,shoulderY+12,18,0,Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    
};

Fighter.prototype._silhouette = function(ctx, cx, cy, f, col) {
        ctx.fillStyle=col; ctx.strokeStyle=col;
        ctx.lineWidth=10; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-80); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy-96,14,0,Math.PI*2); ctx.fill();
    
};

Fighter.prototype._drawBoots = function(ctx,rx,ry,lx,ly,f,isHogan,isGante,isKenji,glow) {
        ctx.save();
        // بوت Hogan — ثقيل درعي
        if(isHogan){
            ctx.fillStyle='#1a0800'; ctx.shadowColor='#e67e22'; ctx.shadowBlur=8;
            ctx.beginPath(); ctx.ellipse(rx+f*5,ry+5,17,7,f*0.15,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(lx-f*5,ly+5,17,7,-f*0.15,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(230,126,34,0.65)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(rx+f*5,ry+4,16,6,f*0.15,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(lx-f*5,ly+4,16,6,-f*0.15,0,Math.PI*2); ctx.stroke();
            // Toe cap
            ctx.fillStyle='rgba(230,126,34,0.3)';
            ctx.beginPath(); ctx.ellipse(rx+f*14,ry+5,6,4,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(lx-f*14,ly+5,6,4,0,0,Math.PI*2); ctx.fill();
        // بوت Gante — ناري
        } else if(isGante){
            ctx.fillStyle='#140000'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=10;
            ctx.beginPath(); ctx.ellipse(rx+f*4,ry+5,15,5.5,f*0.2,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(lx-f*4,ly+5,15,5.5,-f*0.2,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(255,100,0,0.5)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(rx+f*4,ry+4,14,4.5,f*0.2,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(lx-f*4,ly+4,14,4.5,-f*0.2,0,Math.PI*2); ctx.stroke();
        // بوت Kenji — خفيف نينجا
        } else if(isKenji){
            ctx.fillStyle='#0a0a14'; ctx.shadowColor='#9b59b6'; ctx.shadowBlur=7;
            ctx.beginPath(); ctx.ellipse(rx+f*3,ry+4,13,4.5,f*0.1,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(lx-f*3,ly+4,13,4.5,-f*0.1,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(155,89,182,0.4)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.ellipse(rx+f*3,ry+3,12,3.5,f*0.1,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(lx-f*3,ly+3,12,3.5,-f*0.1,0,Math.PI*2); ctx.stroke();
        // بوت Kang عادي
        } else {
            ctx.fillStyle='#0a0a0a'; ctx.shadowColor=glow; ctx.shadowBlur=6;
            ctx.beginPath(); ctx.ellipse(rx+f*4,ry+4,14,5,f*0.15,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(lx-f*4,ly+4,14,5,-f*0.15,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(100,200,255,0.2)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.ellipse(rx+f*4,ry+3,13,4,f*0.15,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(lx-f*4,ly+3,13,4,-f*0.15,0,Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    
};

Fighter.prototype._drawFists = function(ctx,rx,ry,lx,ly,fR,isGante,isHogan,isKenji,glow) {
        ctx.save();
        // قبضة Hogan — ضخمة درعية
        if(isHogan){
            ctx.fillStyle='#1a0a00'; ctx.shadowColor='#e67e22'; ctx.shadowBlur=14;
            ctx.beginPath(); ctx.arc(rx,ry,fR+1,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(lx,ly,fR+1,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(230,126,34,0.7)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.arc(rx,ry,fR,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(lx,ly,fR,0,Math.PI*2); ctx.stroke();
            ctx.fillStyle='rgba(230,126,34,0.65)'; ctx.shadowBlur=0;
            for(let k=-1;k<=1;k++){
                ctx.beginPath(); ctx.arc(rx+k*3.5,ry+2,2.8,0,Math.PI*2); ctx.fill();
            }
        // قبضة Gante — نارية
        } else if(isGante){
            ctx.fillStyle='#1a0000'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=18;
            ctx.beginPath(); ctx.arc(rx,ry,fR,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(lx,ly,fR,0,Math.PI*2); ctx.fill();
            // حلقة نارية حول القبضة أثناء الهجوم
            ctx.strokeStyle='rgba(255,120,0,0.55)'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(rx,ry,fR+3,0,Math.PI*2); ctx.stroke();
            ctx.fillStyle='rgba(255,100,0,0.6)'; ctx.shadowBlur=0;
            for(let k=-1;k<=1;k++){
                ctx.beginPath(); ctx.arc(rx+k*3,ry+2,2.2,0,Math.PI*2); ctx.fill();
            }
        // قبضة Kenji — نينجا نحيفة
        } else if(isKenji){
            ctx.fillStyle='#0d0d1a'; ctx.shadowColor='#9b59b6'; ctx.shadowBlur=10;
            ctx.beginPath(); ctx.arc(rx,ry,fR,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(lx,ly,fR,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(155,89,182,0.5)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(rx,ry,fR-1,0,Math.PI*2); ctx.stroke();
            ctx.fillStyle='rgba(180,130,255,0.5)'; ctx.shadowBlur=0;
            for(let k=-1;k<=1;k++){
                ctx.beginPath(); ctx.arc(rx+k*2.8,ry+2,1.8,0,Math.PI*2); ctx.fill();
            }
        // قبضة Kang عادية
        } else {
            ctx.fillStyle='#111'; ctx.shadowColor=glow; ctx.shadowBlur=8;
            ctx.beginPath(); ctx.arc(rx,ry,fR,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(lx,ly,fR,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='rgba(255,220,50,0.55)'; ctx.shadowBlur=0;
            for(let k=-1;k<=1;k++){
                ctx.beginPath(); ctx.arc(rx+k*3.5,ry+2,2.5,0,Math.PI*2); ctx.fill();
            }
        }
        ctx.restore();
    
};

Fighter.prototype._hoganTorso = function(ctx,bx,sy,hy,f,glow) {
        ctx.save();
        ctx.shadowColor='#e67e22'; ctx.shadowBlur=10;
        // Chest plate
        ctx.fillStyle='rgba(230,126,34,0.22)';
        ctx.strokeStyle='rgba(230,126,34,0.55)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.rect(bx-16,sy+2,32,hy-sy-4); ctx.fill(); ctx.stroke();
        ctx.strokeStyle='rgba(230,126,34,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx,sy+2); ctx.lineTo(bx,hy-2); ctx.stroke();
        // Bolts
        [[bx-11,sy+7],[bx+11,sy+7],[bx-11,hy-10],[bx+11,hy-10]].forEach(function(pt){ var x=pt[0],y=pt[1];
            ctx.fillStyle='rgba(230,126,34,0.6)';
            ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
        });
        // Shoulder pads
        [-1,1].forEach(function(s) {
            const sx=bx+s*f*24, sy2=sy+2;
            ctx.fillStyle='rgba(230,126,34,0.3)';
            ctx.beginPath(); ctx.ellipse(sx,sy2,17,11,s*0.25,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(230,126,34,0.65)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(sx,sy2,16,10,s*0.25,0,Math.PI*2); ctx.stroke();
        });
        ctx.restore();
    
};

Fighter.prototype._ganteTorso = function(ctx,bx,sy,hy) {
        ctx.save();
        ctx.strokeStyle='rgba(255,80,0,0.55)'; ctx.lineWidth=2;
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
        ctx.beginPath();

Fighter.prototype._drawEyes = function(ctx,hx,hy,f,glow,now,isGante,isHogan,isKenji) {
        const ep=0.85+Math.sin(now/450)*0.15;
        const eW=isHogan?8:isKenji?5.5:6.5;
        const eH=isHogan?5.5:isKenji?3.5:4.5;
        const ey=hy-1;
        // Kenji — عيون نازلة (ninja mask)
        const eyeOffsets = isKenji
            ? [{x:hx+f*4},{x:hx-f*4}]
            : [{x:hx-f*7},{x:hx+f*7}];

        eyeOffsets.forEach(function(eyeItem){ var ex = eyeItem.x;
            ctx.save();
            ctx.shadowColor=glow; ctx.shadowBlur=22*ep;
            const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,eW);
            eg.addColorStop(0,`rgba(255,255,255,${ep})`);
            const gc=glow.startsWith('#')?hexToRgbStr(glow):'255,255,255';
            eg.addColorStop(0.4,`rgba(${gc},${(ep*0.85).toFixed(2)})`);
            eg.addColorStop(1,'transparent');
            ctx.fillStyle=eg;
            ctx.beginPath(); ctx.ellipse(ex,ey,eW,eH,0,0,Math.PI*2); ctx.fill();
            // Pupil / inner glow
            ctx.fillStyle=`rgba(255,255,255,${(ep*0.75).toFixed(2)})`;
            ctx.shadowBlur=0;
            ctx.beginPath(); ctx.ellipse(ex,ey,eW*0.36,eH*0.4,0,0,Math.PI*2); ctx.fill();
            // Gante — شقوق صليبية
            if(isGante){
                ctx.strokeStyle='rgba(255,100,0,0.8)'; ctx.lineWidth=1.8;
                ctx.beginPath(); ctx.moveTo(ex-5,ey-4); ctx.lineTo(ex+5,ey+4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(ex+5,ey-4); ctx.lineTo(ex-5,ey+4); ctx.stroke();
            }
            // Visor / face expression overlay
            if(!isGante && !isKenji){
                // Kang/Hogan: visor bar أفقي فوق العينين
                ctx.save();
                ctx.globalAlpha=0.18;
                const vCol = isHogan?'rgba(230,126,34,0.5)':'rgba(74,180,255,0.4)';
                ctx.fillStyle=vCol;
                ctx.beginPath(); ctx.roundRect(hx-eW*2.2,ey-eH-2,eW*4.4,eH+2,3); ctx.fill();
                ctx.restore();
            }

            // Kenji — عيون ضيقة
            if(isKenji){
                ctx.strokeStyle='rgba(150,80,220,0.5)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.ellipse(ex,ey,eW+2,1.5,0,0,Math.PI*2); ctx.stroke();
            }
            ctx.restore();
        });
    
};

// Helpers
function hexToRgbStr(hex){
    if(!hex||!hex.startsWith('#'))return'200,200,200';
    let h=hex.slice(1);
    // expand shorthand #fff → #ffffff
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if(h.length!==6) return'200,200,200';
    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    if(isNaN(r)||isNaN(g)||isNaN(b))return'200,200,200';
    return`${r},${g},${b}`;
}
function isKang(id){return !id||id==='kang';}

// ===== Glowing Joints =====
Fighter.prototype._drawJoints = function(ctx, cx, cy, f, p, glow, now, isHogan, isKenji) {
    const torsoH = isHogan?50 : isKenji?38 : 43;
    const legL   = isHogan?40 : isKenji?30 : 35;
    const armL   = isHogan?32 : isKenji?24 : 27;

    const rootY     = cy + p.bob;
    const hipY      = rootY;
    const shoulderY = hipY - torsoH;
    const leanOff   = p.lean * 0.4;
    const bx        = cx + leanOff;

    const toRad = function(a){ return a * Math.PI / 180; };
    function jt(ox, oy, angle, len) {
        var a = toRad(angle);
        return { x: ox + Math.sin(a)*len*f, y: oy + Math.cos(a)*len };
    }

    var shoulderR = { x: bx + f*6, y: shoulderY };
    var elbowR    = jt(shoulderR.x, shoulderR.y, p.arRs, armL*0.55);
    var wristR    = jt(elbowR.x, elbowR.y, p.arRs+p.arRe, armL*0.45);
    var shoulderL = { x: bx - f*6, y: shoulderY };
    var elbowL    = jt(shoulderL.x, shoulderL.y, p.arLs, armL*0.55);
    var wristL    = jt(elbowL.x, elbowL.y, p.arLs+p.arLe, armL*0.45);
    var hipR      = { x: bx + 8, y: hipY };
    var kneeR     = jt(hipR.x, hipR.y, p.lgRh, legL*0.52);
    var ankleR    = jt(kneeR.x, kneeR.y, p.lgRh+p.lgRa, legL*0.48);
    var hipL      = { x: bx - 8, y: hipY };
    var kneeL     = jt(hipL.x, hipL.y, p.lgLh, legL*0.52);
    var ankleL    = jt(kneeL.x, kneeL.y, p.lgLh+p.lgLa, legL*0.48);

    var headR2  = isHogan?20 : isKenji?14 : 16;
    var headCtr = { x: bx + p.hx*f, y: shoulderY - headR2 - 5 };

    var pulse  = 0.7 + Math.sin(now/350)*0.3;
    var jSize  = isHogan ? 4.5 : isKenji ? 2.8 : 3.5;
    var jAlpha = 0.72 * pulse;

    var joints = [shoulderR, elbowR, wristR, shoulderL, elbowL, wristL,
                  hipR, kneeR, ankleR, hipL, kneeL, ankleL];

    ctx.save();
    ctx.fillStyle   = glow;
    ctx.shadowColor = glow;
    ctx.shadowBlur  = 10;
    ctx.globalAlpha = jAlpha;
    joints.forEach(function(j) {
        ctx.beginPath(); ctx.arc(j.x, j.y, jSize, 0, Math.PI*2); ctx.fill();
    });
    // Neck + head dot
    ctx.beginPath(); ctx.arc(bx, shoulderY+4, jSize*0.8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = jAlpha * 0.55;
    ctx.beginPath(); ctx.arc(headCtr.x, headCtr.y, jSize*0.7, 0, Math.PI*2); ctx.fill();
    // Spine dots
    ctx.globalAlpha = jAlpha * 0.3;
    ctx.shadowBlur  = 5;
    for (var i=1; i<4; i++) {
        ctx.beginPath(); ctx.arc(bx, hipY - torsoH*i/4, jSize*0.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
};



// Helpers
function lerp(a,b,t){return a+(b-a)*t;}







function startStage(worldIdx, stageIdx) {
    currentWorld = WORLDS[worldIdx];
    currentStage = currentWorld.stages[stageIdx];

    if (currentStage.id > player.unlockedStage) return;

    // إخفاء كل الشاشات الأخرى أولاً
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
    if(window.stopIdleAnim) window.stopIdleAnim();

    // إعداد الكانفاس
    const gs = document.getElementById('gameScreen');
    gs.style.cssText = 'display:block !important; position:fixed; top:0; left:0; width:' +
        window.innerWidth + 'px; height:' + window.innerHeight + 'px; z-index:9999; overflow:hidden;';

    requestAnimationFrame(function() {
        canvas = document.getElementById('gameCanvas');
        ctx    = canvas.getContext('2d');
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        CONFIG.groundY = canvas.height - 55;

        // خلفية الحلبة المتحركة — Boss بيستخدم خلفية خاصة
        var bgData = Object.assign({}, currentWorld.bg);
        if(currentStage.type === 'boss'){
            bgData = {type:'abyss', sky:['#030304','#050506','#070708'], ground:'#020203', accent:'#cc0000', particles:'hellfire', boss:true};
        } else if(currentStage.type === 'miniboss'){
            bgData = {type:'volcano', sky:['#200303','#300404','#400505'], ground:'#1a0202', accent:'#cc2000', particles:'embers', boss:true};
        }
        document.getElementById('arenaDiv').style.background = 'none';
        initAdvBgParticles(bgData, canvas.width, canvas.height);
        // حفظ الـ bg الحالي عشان الـ gameLoop يستخدمه
        window._currentAdvBg = bgData;

        // موسيقى حسب نوع الـ Stage
        AdvBattleMusic.play(currentStage.type);

        // إنشاء المقاتلين
        const pColor = {'red':'#e74c3c','blue':'#3498db','green':'#2ecc71',
                        'yellow':'#f1c40f','white':'#ecf0f1','black':'#2c3e50'}[player.selectedColor||'green']||'#2ecc71';
        p1 = new Fighter(canvas.width*0.18, pColor, true, player.maxHp, player.damage, false);
        p2 = new Fighter(canvas.width*0.82, getEnemyColor(currentStage.type), false,
                         currentStage.enemyHp, currentStage.enemyDmg, currentStage.hasSword||false);
        p2.aiLevel = getAILevel(currentStage);
        // Set hero IDs
        const sc=JSON.parse(localStorage.getItem('game_character')||'{}');
        p1.heroId = sc.heroId||'kang';
        p2.heroId = currentStage.type==='boss'    ? 'hogan' :
                    currentStage.type==='miniboss' ? 'gante' : 'normal';

        // HUD
        document.getElementById('p1HealthBar').style.width='100%';
        document.getElementById('p2HealthBar').style.width='100%';
        document.getElementById('timerBar').style.width='100%';
        document.getElementById('enemyLabel').textContent=currentStage.name;
        document.getElementById('comboDisplay').innerHTML='<span>⚡</span> 0';
        document.getElementById('gameMessage').innerHTML='';
        damageNumbers.length=0;
        particles.length=0;
        ScreenShake.intensity=0; ScreenShake.duration=0;
        ScreenFlash.alpha=0;

        // شاشة البداية
        const ready=document.getElementById('readyScreen');
        AudioManager.play('fight');
        ready.style.display='flex'; ready.textContent=currentStage.name;
        setTimeout(function(){ready.textContent='FIGHT!';},1500);
        setTimeout(function(){
            ready.style.display='none';
            gameActive=true;
            startGameTimer();
            if(animFrameId)cancelAnimationFrame(animFrameId);
            animFrameId=requestAnimationFrame(gameLoop);
        },2500);
    });
}

function getEnemyColor(type){
    if(type==='boss')    return '#e74c3c';
    if(type==='miniboss')return '#e67e22';
    const cols=['#bdc3c7','#2ecc71','#3498db','#9b59b6','#1abc9c','#f1c40f'];
    return cols[Math.floor(Math.random()*cols.length)];
}

function getAILevel(stage){
    const id=stage.id;
    if(stage.type==='boss')    return {atk:0.065,blk:0.72,jmp:0.016,spd:1.0};
    if(stage.type==='miniboss')return {atk:0.055,blk:0.60,jmp:0.014,spd:0.95};
    if(id<=2)  return {atk:0.020,blk:0.00,jmp:0.003,spd:0.55};
    if(id<=4)  return {atk:0.032,blk:0.18,jmp:0.007,spd:0.70};
    if(id<=6)  return {atk:0.042,blk:0.35,jmp:0.010,spd:0.80};
    if(id<=8)  return {atk:0.052,blk:0.50,jmp:0.013,spd:0.88};
    return          {atk:0.060,blk:0.65,jmp:0.015,spd:0.95};
}

function startGameTimer(){
    if(timerInterval)clearInterval(timerInterval);
    gameTimer=CONFIG.roundTime;
    timerInterval=setInterval(function(){
        if(!gameActive)return;
        gameTimer--;
        document.getElementById('timerBar').style.width=(gameTimer/CONFIG.roundTime*100)+'%';
        if(gameTimer<=0)endBattle(p1.health>p2.health);
    },1000);
}

function updateEnemyAI(){
    if(!gameActive||p2.stunned>0)return;
    const ai=p2.aiLevel, dist=Math.abs(p1.x-p2.x), dx=p1.x-p2.x, now=Date.now();
    p2.facing=dx>0?1:-1;
    p2.isBlocking=p1.isAttacking&&dist<65&&Math.random()<ai.blk;
    if(!p2.isBlocking){
        if(dist>60)     p2.vx=(dx>0?1:-1)*4.5*ai.spd;
        else if(dist<35)p2.vx=(dx>0?-1:1)*4.5*0.4;
        else            p2.vx*=0.7;
    }
    const swordRange=p2.hasSword?30:0;
    if(!p2.isBlocking&&dist<60+swordRange&&now-p2.lastAttackTime>CONFIG.attackCooldown&&Math.random()<ai.atk){
        p2.isAttacking=true; p2.lastAttackTime=now;
        p2.setState(STATES.ATTACK_LIGHT, true);
        AudioManager.play('punch');
        setTimeout(function(){p2.isAttacking=false; p2.setState(STATES.IDLE,true);},CONFIG.attackDuration);
    }
    if(p2.isGrounded&&Math.random()<ai.jmp){
        p2.vy=CONFIG.jumpForce;
        p2.setState(STATES.JUMP,true);
        AudioManager.play('jump');
    }
}

function checkBattleAttacks(){
    // ===== ضربة اللاعب — hitbox حقيقي =====
    if(p1.isAttacking&&!p2.invincible){
        const anim=ANIM_DATA[p1.state];
        const inActive=anim&&p1.stateTime>=anim.startup&&p1.stateTime<anim.active;
        // Anticipation recoil — wind-up في الـ startup
        if(anim && p1.stateTime < anim.startup){
            const windPct = p1.stateTime / anim.startup;
            p1.attackerRecoil = -p1.facing * 4 * (1 - windPct); // يرجع ورا وهو بيشحن
        }
        // Follow-through — push forward عند الـ active
        if(inActive && p1.stateTime < anim.startup + 40){
            p1.attackerRecoil = p1.facing * 3.5; // يندفع للأمام
        }
        // Synced trail particles — تبدأ مع بداية الـ active frame بالظبط
        if(inActive && p1.stateTime < anim.startup + 30){
            const trailX = p1.x + p1.facing*40;
            spawnHitParticles(trailX, p1.y-50, p1.state===STATES.ATTACK_HEAVY?'#ff6600':'#88ccff', 'sparks');
        }
        if(inActive&&Fighter.boxesOverlap(p1.getAttackBox(),p2.getBodyBox())){
            let dmg=p1.damage;
            const comboMult=1+Math.floor(p1.combo/3)*0.15;
            dmg*=comboMult;
            const isCrit=player.crit&&Math.random()<player.crit/100;
            if(isCrit){dmg*=2;spawnAdventureCrit(p2.x,p2.y);}
            if(comboMult>1)spawnAdventureComboMult(p2.x,p2.y-40,comboMult);
            if(p2.takeDamage(dmg,p1)){
                HitFlash.trigger(2);
                SlowMo.trigger(0.18, 120);
                if(p2.health<=0) endBattle(true);
            }
            p1.isAttacking=false;
        }
    }
    // ===== ضربة AI — hitbox حقيقي =====
    if(p2.isAttacking&&!p1.invincible){
        const anim=ANIM_DATA[p2.state];
        const inActive=anim&&p2.stateTime>=anim.startup&&p2.stateTime<anim.active;
        if(inActive&&Fighter.boxesOverlap(p2.getAttackBox(),p1.getBodyBox())){
            if(p1.takeDamage(p2.damage,p2)){
                HitFlash.trigger(1);
                SlowMo.trigger(0.22, 90);
                if(p1.health<=0) endBattle(false);
            }
            p2.isAttacking=false;
        }
    }
}

let advBgParticles = [];

function initAdvBgParticles(bgData, W, H) {
    advBgParticles = [];
    const isBoss = bgData.boss;
    const count  = isBoss ? 80 : 50;
    for(let i=0;i<count;i++){
        advBgParticles.push({
            x:Math.random()*W, y:Math.random()*H,
            vx:(Math.random()-0.5)*0.4,
            vy:-(Math.random()*0.5+0.1),
            size:Math.random()*2.5+0.5,
            alpha:Math.random()*0.7+0.1,
            phase:Math.random()*Math.PI*2,
            type:bgData.particles,
        });
    }
}

function drawAdvAnimatedBg(bgData, W, H, t) {
    // السماء
    const sky=ctx.createLinearGradient(0,0,0,H*0.75);
    sky.addColorStop(0,bgData.sky[0]); sky.addColorStop(0.5,bgData.sky[1]); sky.addColorStop(1,bgData.sky[2]);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // تأثيرات خاصة
    if(bgData.type==='forest'){
        const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,W*0.5);
        g.addColorStop(0,'rgba(20,80,20,0.1)'); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='desert'){
        const flicker=0.08+Math.sin(t/300)*0.03;
        ctx.fillStyle=`rgba(180,90,0,${flicker})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='storm'){
        // مطر خفيف
        ctx.save(); ctx.strokeStyle='rgba(150,180,255,0.12)'; ctx.lineWidth=1;
        for(let i=0;i<20;i++){
            const rx=(i*67+t*0.3)%W, ry=(i*43+t*0.8)%H;
            ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-8,ry+20); ctx.stroke();
        }
        ctx.restore();
    } else if(bgData.type==='volcano'){
        const lf=0.15+Math.sin(t/200)*0.07;
        ctx.fillStyle=`rgba(180,30,0,${lf})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='abyss'){
        const spiral=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W*0.5);
        spiral.addColorStop(0,'rgba(150,0,0,0.25)'); spiral.addColorStop(1,'transparent');
        ctx.fillStyle=spiral; ctx.fillRect(0,0,W,H);
    }

    // الجسيمات
    advBgParticles.forEach(function(p) {
        p.x+=p.vx; p.y+=p.vy; p.phase+=0.03;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H*0.8;
        const a=p.alpha*(0.6+Math.sin(p.phase)*0.4);
        ctx.save(); ctx.globalAlpha=a;
        switch(p.type){
            case 'fireflies':
                ctx.fillStyle='#88ff44'; ctx.shadowColor='#88ff44'; ctx.shadowBlur=8;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'sand':
                ctx.fillStyle='rgba(200,150,80,0.4)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'lightning':
                if(Math.random()<0.005){
                    ctx.strokeStyle='rgba(150,180,255,0.7)'; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x+(Math.random()-0.5)*40,H*0.6); ctx.stroke();
                } break;
            case 'embers': case 'hellfire':
                const ec=p.type==='hellfire'?'#ff2000':'#ff6600';
                ctx.fillStyle=ec; ctx.shadowColor=ec; ctx.shadowBlur=10;
                p.y=p.y<-10?H*0.85:p.y;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            default:
                ctx.fillStyle='rgba(200,220,255,0.6)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    });

    // نجوم parallax في الخلفية
    if(!drawAdvAnimatedBg._stars){
        drawAdvAnimatedBg._stars=[];
        for(let i=0;i<60;i++){
            drawAdvAnimatedBg._stars.push({
                x:Math.random()*2000, y:Math.random()*H*0.65,
                size:Math.random()*1.8+0.3,
                layer:Math.random()*3|0, // 0=far,1=mid,2=near
                twinkle:Math.random()*Math.PI*2,
                color:Math.random()<0.15?'#ffe8a0':'#b8d4ff'
            });
        }
    }
    ctx.save();
    drawAdvAnimatedBg._stars.forEach(function(s){
        const speed=[0.04,0.10,0.20][s.layer];
        const sx=((s.x - t*speed)%W+W)%W;
        s.twinkle+=0.025;
        const a=0.3+Math.sin(s.twinkle)*0.25;
        const sz=s.size*(0.6+s.layer*0.3);
        ctx.globalAlpha=a*(bgData.type==='abyss'?1.4:0.8);
        ctx.fillStyle=s.color; ctx.shadowColor=s.color; ctx.shadowBlur=sz*3;
        ctx.beginPath(); ctx.arc(sx,s.y,sz,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0; ctx.restore();

    // الأرض
    const groundGrad=ctx.createLinearGradient(0,CONFIG.groundY,0,H);
    groundGrad.addColorStop(0,bgData.ground); groundGrad.addColorStop(1,'#000');
    ctx.fillStyle=groundGrad; ctx.fillRect(0,CONFIG.groundY+2,W,H-CONFIG.groundY);
    // خط الأرض
    ctx.save();
    ctx.shadowColor=bgData.accent; ctx.shadowBlur=bgData.boss?18:8;
    ctx.strokeStyle=bgData.accent+'55'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,CONFIG.groundY+2); ctx.lineTo(W,CONFIG.groundY+2); ctx.stroke();
    ctx.restore();

    // glow تحت الشخصيات
    if(typeof p1!=='undefined'&&p1){
        const pg=ctx.createRadialGradient(p1.x,CONFIG.groundY,0,p1.x,CONFIG.groundY,40);
        pg.addColorStop(0,bgData.accent+'33'); pg.addColorStop(1,'transparent');
        ctx.fillStyle=pg; ctx.fillRect(p1.x-40,CONFIG.groundY-4,80,20);
    }
    if(typeof p2!=='undefined'&&p2){
        const eg=ctx.createRadialGradient(p2.x,CONFIG.groundY,0,p2.x,CONFIG.groundY,40);
        eg.addColorStop(0,'rgba(231,76,60,0.2)'); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg; ctx.fillRect(p2.x-40,CONFIG.groundY-4,80,20);
    }
}

var AdvBattleMusic = {
    miniBoss: null, finalBoss: null,
    baseURL: 'https://midopure883.github.io/Game/',
    load: function(){
        this.miniBoss  = new Audio(this.baseURL+'boss_music.mp3');
        this.finalBoss = new Audio(this.baseURL+'final_boss_music.mp3');
        this.miniBoss.loop  = true; this.miniBoss.volume  = 0.4;
        this.finalBoss.loop = true; this.finalBoss.volume = 0.4;
    },
    play: function(type){
        this.stop();
        var track = type==='boss'     ? this.finalBoss
                  : type==='miniboss' ? this.miniBoss
                  : null;
        if(track){ track.currentTime=0; track.play().catch(function(){}); }
    },
    stop: function(){
        [this.miniBoss, this.finalBoss].forEach(function(t) { if(t){ t.pause(); t.currentTime=0; } });
    }
};

var _lastFrameTime = 0;
function gameLoop(timestamp){
    if(!gameActive){animFrameId=null;return;}
    const rawDt = Math.min(timestamp - _lastFrameTime, 50);
    _lastFrameTime = timestamp;
    const timeScale = SlowMo.update(rawDt);
    const t=Date.now();
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // خلفية متحركة
    const bgData = window._currentAdvBg || currentWorld.bg;
    drawAdvAnimatedBg(bgData, W, H, t);

    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);
    HitFlash.update();

    if(p1.stunned<=0){
        const MAX_SPD  = 4.5 * (player.speed/100);
        const ACCEL    = 0.75;
        const AIR_ACCEL= 0.45;  // أبطأ في الهواء
        const accel    = p1.isGrounded ? ACCEL : AIR_ACCEL;
        if(keys.left){
            p1.vx  = Math.max(p1.vx - accel, -MAX_SPD);
            p1.facing = -1;
        } else if(keys.right){
            p1.vx  = Math.min(p1.vx + accel,  MAX_SPD);
            p1.facing =  1;
        }
        // Direction change — friction spike لما بتغير اتجاه
        if(keys.left && p1.vx > 0.5)  p1.vx *= 0.60;
        if(keys.right && p1.vx < -0.5) p1.vx *= 0.60;
    }

    // Freeze frame — pause physics during impact
    const _now = Date.now();
    const p1Frozen = p1._freezeUntil && _now < p1._freezeUntil;
    const p2Frozen = p2._freezeUntil && _now < p2._freezeUntil;
    if(!p1Frozen) p1.update();
    if(!p2Frozen) p2.update();
    if(!p1Frozen || !p2Frozen) updateEnemyAI();
    checkBattleAttacks();

    // Draw motion trails first (behind everything)
    for(let i=motionTrails.length-1;i>=0;i--){
        const tr=motionTrails[i];
        tr.alpha-=0.055;
        if(tr.alpha<=0){motionTrails.splice(i,1);continue;}
        ctx.save();
        ctx.globalAlpha=tr.alpha;
        ctx.shadowColor=tr.glow; ctx.shadowBlur=14;
        // رسم silhouette مبسطة للـ trail
        ctx.strokeStyle=tr.glow; ctx.lineWidth=10; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(tr.x,tr.y); ctx.lineTo(tr.x,tr.y-75); ctx.stroke();
        ctx.lineWidth=8;
        ctx.beginPath(); ctx.moveTo(tr.x,tr.y-55); ctx.lineTo(tr.x+tr.f*28,tr.y-40); ctx.stroke();
        ctx.beginPath(); ctx.arc(tr.x,tr.y-88,11,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }

    updateAndDrawParticles(ctx);

    // HitFlash overlay على الشخصيات
    p1.draw(ctx);
    if(HitFlash.p1>0.05){
        ctx.save();ctx.globalAlpha=HitFlash.p1*0.6;ctx.fillStyle='#fff';
        ctx.beginPath();ctx.ellipse(p1.x,p1.y-50,22,55,0,0,Math.PI*2);ctx.fill();
        ctx.restore();
    }
    p2.draw(ctx);
    if(HitFlash.p2>0.05){
        ctx.save();ctx.globalAlpha=HitFlash.p2*0.6;ctx.fillStyle='#fff';
        ctx.beginPath();ctx.ellipse(p2.x,p2.y-50,22,55,0,0,Math.PI*2);ctx.fill();
        ctx.restore();
    }

    // damage numbers
    for(let i=damageNumbers.length-1;i>=0;i--){
        const d=damageNumbers[i];
        d.y+=d.vy; d.vy*=0.92; d.alpha-=0.022;
        if(d.alpha<=0){damageNumbers.splice(i,1);continue;}
        ctx.save();ctx.globalAlpha=d.alpha;
        ctx.font=`bold ${d.size}px 'Segoe UI',sans-serif`;
        ctx.fillStyle=d.color;ctx.strokeStyle='rgba(0,0,0,0.8)';
        ctx.lineWidth=3;ctx.textAlign='center';
        ctx.strokeText(d.text,d.x,d.y);ctx.fillText(d.text,d.x,d.y);
        ctx.restore();
    }

    ctx.restore();
    ScreenFlash.draw(ctx);

    document.getElementById('p1HealthBar').style.width=(p1.health/p1.maxHealth*100)+'%';
    document.getElementById('p2HealthBar').style.width=(p2.health/p2.maxHealth*100)+'%';
    document.getElementById('comboDisplay').innerHTML=`<span>⚡</span> ${p1.combo}`;
    animFrameId=requestAnimationFrame(gameLoop);
}

function endBattle(playerWon){
    if(!gameActive)return;
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    if(playerWon && p1) p1.setState(STATES.WIN, true);
    AdvBattleMusic.stop();

    const res=document.getElementById('battleResult');
    const title=document.getElementById('resultTitle');
    const rewards=document.getElementById('resultRewards');
    const btns=document.getElementById('resultBtns');

    if(playerWon){
        AudioManager.play('win');
        title.textContent='🏆 انتصرت!';
        title.style.color='#2ecc71';

        const xpGain=currentStage.xpGain;
        const goldGain=currentStage.goldGain;
        player.gold+=goldGain;

        // فتح المرحلة التالية
        if(currentStage.id>=player.unlockedStage){
            player.unlockedStage=currentStage.id+1;
        }
        savePlayer();
        addXP(xpGain);

        rewards.innerHTML=`
            <div class="reward-pill xp-gain">✨ +${xpGain} XP</div>
            <div class="reward-pill gold-gain">🪙 +${goldGain} Gold</div>
        `;
        // حساب المرحلة التالية
        const wIdx=WORLDS.findIndex(function(w){return w.stages.includes(currentStage);});
        const sIdx=WORLDS[wIdx].stages.indexOf(currentStage);
        const nextSIdx=sIdx+1;
        const hasNextInWorld=nextSIdx<WORLDS[wIdx].stages.length;
        const hasNextWorld=wIdx+1<WORLDS.length;
        const hasNext=(hasNextInWorld||hasNextWorld)&&(currentStage.id+1<=player.unlockedStage);
        btns.innerHTML=hasNext
            ? `<button class="res-btn btn-continue" onclick="goNextStage()">التالي ⬅️</button>
               <button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>`
            : `<button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>`;
    }else{
        AudioManager.play('lose');
        title.textContent='💀 خسرت!';
        title.style.color='#e74c3c';
        rewards.innerHTML='<div class="reward-pill" style="color:#e74c3c;">حاول مرة أخرى!</div>';
        btns.innerHTML=`
            <button class="res-btn btn-retry" onclick="retryStage()">🔄 إعادة</button>
            <button class="res-btn btn-map"   onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }
    res.style.display='flex';
}

function closeBattleResult(){
    document.getElementById('battleResult').style.display='none';
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function goNextStage(){
    document.getElementById('battleResult').style.display='none';
    const wIdx=WORLDS.findIndex(function(w){return w.stages.includes(currentStage);});
    const sIdx=WORLDS[wIdx].stages.indexOf(currentStage);
    if(sIdx+1<WORLDS[wIdx].stages.length){
        startStage(wIdx, sIdx+1);
    } else if(wIdx+1<WORLDS.length){
        startStage(wIdx+1, 0);
    } else {
        document.getElementById('gameScreen').style.display='none';
        showMap();
    }
}

function retryStage(){
    document.getElementById('battleResult').style.display='none';
    if(!currentStage){ showMap(); return; }
    const wIdx=WORLDS.findIndex(function(w){return w.stages.includes(currentStage);});
    if(wIdx===-1){ showMap(); return; }
    const sIdx=WORLDS[wIdx].stages.indexOf(currentStage);
    startStage(wIdx,sIdx);
}

function retreatFromBattle(){
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function setupControls(){
    var bind = function(id,onS,onE) {
        const el=document.getElementById(id);
        if(!el)return;
        const s=function(e) {e.preventDefault();onS();};
        const e=function(ev) {ev.preventDefault();if(onE)onE();};
        el.addEventListener('touchstart',s,{passive:false});
        el.addEventListener('touchend',e,{passive:false});
        el.addEventListener('touchcancel',e,{passive:false});
        el.addEventListener('mousedown',s);
        el.addEventListener('mouseup',e);
        el.addEventListener('mouseleave',e);
    };

    const jBase=document.getElementById('joystickBase');
    const jKnob=document.getElementById('joystickKnob');
    const maxR=32;
    function jC(){const r=jBase.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
    function moveJ(cx,cy){
        const c=jC();let dx=cx-c.x,dy=cy-c.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
        jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        keys.left=dx<-8;keys.right=dx>8;
    }
    function resetJ(){jKnob.style.transform='translate(-50%,-50%)';keys.left=keys.right=false;}

    jBase.addEventListener('touchstart',function(e) {e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchmove', function(e) {e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchend',  function(e) {e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('touchcancel',function(e) {e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('mousedown',e=>moveJ(e.clientX,e.clientY));
    jBase.addEventListener('mousemove',function(e) {if(e.buttons===1)moveJ(e.clientX,e.clientY);});
    jBase.addEventListener('mouseup',resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    // Bounce animation helper
    function addBounce(id) {
        var el = document.getElementById(id);
        if(!el) return;
        function doB(){ el.classList.remove('btn-pressed'); void el.offsetWidth; el.classList.add('btn-pressed'); }
        el.addEventListener('touchstart', doB, {passive:true});
        el.addEventListener('mousedown',  doB);
    }
    ['btnJump','btnAttack','btnBlock'].forEach(addBounce);

    bind('btnJump',function(){if(p1&&p1.isGrounded&&gameActive){p1.vy=CONFIG.jumpForce;p1.setState(STATES.JUMP,true);AudioManager.play('jump');}});
    bind('btnAttack',function(){
        if(!p1||!gameActive||p1.stunned>0)return;
        const now=Date.now();
        const cd=CONFIG.attackCooldown*(1-player.atkSpd/100);
        if(now-p1.lastAttackTime>cd){
            p1.isAttacking=true;p1.lastAttackTime=now;
            const isHeavy=false; // يمكن إضافة heavy attack لاحقاً
            p1.setState(STATES.ATTACK_LIGHT,true);
            AudioManager.play('punch');
            setTimeout(function(){p1.isAttacking=false;p1.setState(STATES.IDLE,true);},ANIM_DATA.attack_light.dur);
        }
    });
    bind('btnBlock',function(){if(p1&&gameActive&&p1.blockStamina>0){p1.isBlocking=true;p1.setState(STATES.BLOCK,true);}},function(){if(p1){p1.isBlocking=false;p1.setState(STATES.IDLE,true);}});
}

// ══════════════════════════════════════════════
// IDLE HERO ANIMATION — map screen SVG character
// ══════════════════════════════════════════════
(function(){
    var _raf = null;
    var _running = false;

    function startIdleAnim(){
        if(_running) return;
        _running = true;
        _raf = requestAnimationFrame(_idleLoop);
        _startBgParticles();
    }
    function stopIdleAnim(){
        _running = false;
        if(_raf){ cancelAnimationFrame(_raf); _raf=null; }
    }

    // expose globally so showMap/startStage can toggle
    window.startIdleAnim = startIdleAnim;
    window.stopIdleAnim  = stopIdleAnim;

    function _idleLoop(ts){
        if(!_running) return;
        var t = ts * 0.001; // seconds

        // ── breathing bob ──
        var breath  = Math.sin(t * 0.9) * 3.5;
        var breathS = Math.sin(t * 0.9 + 0.3) * 2;

        // ── arm swing ──
        var armSwing = Math.sin(t * 0.9) * 7;
        var elbowBend= Math.sin(t * 0.9 + 0.5) * 5;

        // ── leg micro shift ──
        var legShift = Math.sin(t * 0.45) * 2;

        // ── eye pulse ──
        var eyeAlpha = (0.7 + Math.sin(t * 1.8) * 0.3).toFixed(3);

        // Update SVG elements
        var head = document.getElementById('heroHead');
        var armR = document.getElementById('armR');
        var armL = document.getElementById('armL');
        var legR = document.getElementById('legR');
        var legL = document.getElementById('legL');
        var eyeR = document.getElementById('eyeR');
        var eyeL = document.getElementById('eyeL');

        if(!head) { _running=false; return; }

        // head + torso bob
        head.setAttribute('transform','translate(0,' + (-breath).toFixed(2) + ')');

        // arms breathe with body
        if(armR) armR.setAttribute('transform','translate(0,' + (-breathS).toFixed(2) + ') rotate(' + armSwing.toFixed(1) + ',100,47)');
        if(armL) armL.setAttribute('transform','translate(0,' + (-breathS).toFixed(2) + ') rotate(' + (-armSwing).toFixed(1) + ',100,47)');

        // legs subtle weight shift
        if(legR) legR.setAttribute('transform','translate(' + legShift.toFixed(2) + ',0)');
        if(legL) legL.setAttribute('transform','translate(' + (-legShift).toFixed(2) + ',0)');

        // eye glow pulse
        if(eyeR) eyeR.setAttribute('opacity', eyeAlpha);
        if(eyeL) eyeL.setAttribute('opacity', eyeAlpha);

        _raf = requestAnimationFrame(_idleLoop);
    }

    // ── background floating particles ──
    var _bgRaf = null;
    var _particles = [];

    function _startBgParticles(){
        var cv = document.getElementById('heroBgCanvas');
        if(!cv) return;
        var W = cv.offsetWidth, H = cv.offsetHeight;
        cv.width = W; cv.height = H;
        _particles = [];
        for(var i=0;i<18;i++){
            _particles.push({
                x: Math.random()*W, y: Math.random()*H,
                vx:(Math.random()-0.5)*0.3,
                vy:-(Math.random()*0.4+0.1),
                size:Math.random()*2+0.5,
                alpha:Math.random()*0.5+0.1,
                hue: 140+Math.random()*30,
                phase:Math.random()*Math.PI*2
            });
        }
        _bgLoop();
    }

    function _bgLoop(){
        var cv = document.getElementById('heroBgCanvas');
        if(!cv||!_running){ _bgRaf=null; return; }
        var ctx = cv.getContext('2d');
        var W=cv.width, H=cv.height;
        ctx.clearRect(0,0,W,H);

        _particles.forEach(function(p){
            p.x += p.vx; p.y += p.vy; p.phase += 0.03;
            if(p.x<0) p.x=W; if(p.x>W) p.x=0;
            if(p.y<-5) p.y=H;
            var a = p.alpha*(0.5+Math.sin(p.phase)*0.5);
            ctx.save();
            ctx.globalAlpha = a;
            ctx.fillStyle = 'hsl('+p.hue+',70%,65%)';
            ctx.shadowColor = 'hsl('+p.hue+',80%,60%)';
            ctx.shadowBlur = p.size*4;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            ctx.restore();
        });

        _bgRaf = requestAnimationFrame(_bgLoop);
    }
})();

window.onload=function(){
    function fixVP(){
        const gs=document.getElementById('gameScreen');
        if(gs)gs.style.height=window.innerHeight+'px';
    }
    fixVP();
    window.addEventListener('resize',fixVP);
    window.addEventListener('orientationchange',fixVP);

    AudioManager.preload();
    AdvBattleMusic.load();
    preloadSprites();
    setupControls();
    document.getElementById('gameScreen').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

    // التطبيق دايماً landscape — عرض الخريطة مباشرة
    showMap();
    if(window.startIdleAnim) setTimeout(window.startIdleAnim, 200);
};
</script>
