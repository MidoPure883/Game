let advBgParticles = [];

function initAdvBgParticles(bgData, W, H) {
    advBgParticles = [];
    const isBoss = bgData.boss;
    const count  = isBoss ? 80 : 50;
    for(let i=0;i<count;i++){
        advBgParticles.push({
            x:Math.random()*W, y:Math.random()*H,
            vx:(Math.random()-0.5)*0.4,
            vy:-(Math.random()*0.5+0.1),
            size:Math.random()*2.5+0.5,
            alpha:Math.random()*0.7+0.1,
            phase:Math.random()*Math.PI*2,
            type:bgData.particles,
        });
    }
}

function drawAdvAnimatedBg(bgData, W, H, t) {
    // السماء
    const sky=ctx.createLinearGradient(0,0,0,H*0.75);
    sky.addColorStop(0,bgData.sky[0]); sky.addColorStop(0.5,bgData.sky[1]); sky.addColorStop(1,bgData.sky[2]);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // تأثيرات خاصة
    if(bgData.type==='forest'){
        const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,W*0.5);
        g.addColorStop(0,'rgba(20,80,20,0.1)'); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='desert'){
        const flicker=0.08+Math.sin(t/300)*0.03;
        ctx.fillStyle=`rgba(180,90,0,${flicker})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='storm'){
        // مطر خفيف
        ctx.save(); ctx.strokeStyle='rgba(150,180,255,0.12)'; ctx.lineWidth=1;
        for(let i=0;i<20;i++){
            const rx=(i*67+t*0.3)%W, ry=(i*43+t*0.8)%H;
            ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-8,ry+20); ctx.stroke();
        }
        ctx.restore();
    } else if(bgData.type==='volcano'){
        const lf=0.15+Math.sin(t/200)*0.07;
        ctx.fillStyle=`rgba(180,30,0,${lf})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='abyss'){
        const spiral=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W*0.5);
        spiral.addColorStop(0,'rgba(150,0,0,0.25)'); spiral.addColorStop(1,'transparent');
        ctx.fillStyle=spiral; ctx.fillRect(0,0,W,H);
    }

    // الجسيمات
    advBgParticles.forEach(function(p) {
        p.x+=p.vx; p.y+=p.vy; p.phase+=0.03;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H*0.8;
        const a=p.alpha*(0.6+Math.sin(p.phase)*0.4);
        ctx.save(); ctx.globalAlpha=a;
        switch(p.type){
            case 'fireflies':
                ctx.fillStyle='#88ff44'; ctx.shadowColor='#88ff44'; ctx.shadowBlur=8;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'sand':
                ctx.fillStyle='rgba(200,150,80,0.4)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'lightning':
                if(Math.random()<0.005){
                    ctx.strokeStyle='rgba(150,180,255,0.7)'; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x+(Math.random()-0.5)*40,H*0.6); ctx.stroke();
                } break;
            case 'embers': case 'hellfire':
                const ec=p.type==='hellfire'?'#ff2000':'#ff6600';
                ctx.fillStyle=ec; ctx.shadowColor=ec; ctx.shadowBlur=10;
                p.y=p.y<-10?H*0.85:p.y;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            default:
                ctx.fillStyle='rgba(200,220,255,0.6)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    });

    // نجوم parallax في الخلفية
    if(!drawAdvAnimatedBg._stars){
        drawAdvAnimatedBg._stars=[];
        for(let i=0;i<60;i++){
            drawAdvAnimatedBg._stars.push({
                x:Math.random()*2000, y:Math.random()*H*0.65,
                size:Math.random()*1.8+0.3,
                layer:Math.random()*3|0, // 0=far,1=mid,2=near
                twinkle:Math.random()*Math.PI*2,
                color:Math.random()<0.15?'#ffe8a0':'#b8d4ff'
            });
        }
    }
    ctx.save();
    drawAdvAnimatedBg._stars.forEach(function(s){
        const speed=[0.04,0.10,0.20][s.layer];
        const sx=((s.x - t*speed)%W+W)%W;
        s.twinkle+=0.025;
        const a=0.3+Math.sin(s.twinkle)*0.25;
        const sz=s.size*(0.6+s.layer*0.3);
        ctx.globalAlpha=a*(bgData.type==='abyss'?1.4:0.8);
        ctx.fillStyle=s.color; ctx.shadowColor=s.color; ctx.shadowBlur=sz*3;
        ctx.beginPath(); ctx.arc(sx,s.y,sz,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0; ctx.restore();

    // الأرض
    const groundGrad=ctx.createLinearGradient(0,CONFIG.groundY,0,H);
    groundGrad.addColorStop(0,bgData.ground); groundGrad.addColorStop(1,'#000');
    ctx.fillStyle=groundGrad; ctx.fillRect(0,CONFIG.groundY+2,W,H-CONFIG.groundY);
    // خط الأرض
    ctx.save();
    ctx.shadowColor=bgData.accent; ctx.shadowBlur=bgData.boss?18:8;
    ctx.strokeStyle=bgData.accent+'55'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,CONFIG.groundY+2); ctx.lineTo(W,CONFIG.groundY+2); ctx.stroke();
    ctx.restore();

    // glow تحت الشخصيات
    if(typeof p1!=='undefined'&&p1){
        const pg=ctx.createRadialGradient(p1.x,CONFIG.groundY,0,p1.x,CONFIG.groundY,40);
        pg.addColorStop(0,bgData.accent+'33'); pg.addColorStop(1,'transparent');
        ctx.fillStyle=pg; ctx.fillRect(p1.x-40,CONFIG.groundY-4,80,20);
    }
    if(typeof p2!=='undefined'&&p2){
        const eg=ctx.createRadialGradient(p2.x,CONFIG.groundY,0,p2.x,CONFIG.groundY,40);
        eg.addColorStop(0,'rgba(231,76,60,0.2)'); eg.addColorStop(1,'transparent');
        ctx.fillStyle=eg; ctx.fillRect(p2.x-40,CONFIG.groundY-4,80,20);
    }
}

var _lastFrameTime = 0;
function gameLoop(timestamp){
    if(!gameActive){animFrameId=null;return;}
    const rawDt = Math.min(timestamp - _lastFrameTime, 50);
    _lastFrameTime = timestamp;
    const timeScale = SlowMo.update(rawDt);
    const t=Date.now();
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // خلفية متحركة
    const bgData = window._currentAdvBg || currentWorld.bg;
    drawAdvAnimatedBg(bgData, W, H, t);

    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);
    HitFlash.update();

    if(p1.stunned<=0){
        const MAX_SPD  = 4.5 * (player.speed/100);
        const ACCEL    = 0.75;
        const AIR_ACCEL= 0.45;  // أبطأ في الهواء
        const accel    = p1.isGrounded ? ACCEL : AIR_ACCEL;
        if(keys.left){
            p1.vx  = Math.max(p1.vx - accel, -MAX_SPD);
            p1.facing = -1;
        } else if(keys.right){
            p1.vx  = Math.min(p1.vx + accel,  MAX_SPD);
            p1.facing =  1;
        }
        // Direction change — friction spike لما بتغير اتجاه
        if(keys.left && p1.vx > 0.5)  p1.vx *= 0.60;
        if(keys.right && p1.vx < -0.5) p1.vx *= 0.60;
    }

    // Freeze frame — pause physics during impact
    const _now = Date.now();
    const p1Frozen = p1._freezeUntil && _now < p1._freezeUntil;
    const p2Frozen = p2._freezeUntil && _now < p2._freezeUntil;
    if(!p1Frozen) p1.update();
    if(!p2Frozen) p2.update();
    if(!p1Frozen || !p2Frozen) updateEnemyAI();
    checkBattleAttacks();

    // Draw motion trails first (behind everything)
    for(let i=motionTrails.length-1;i>=0;i--){
        const tr=motionTrails[i];
        tr.alpha-=0.055;
        if(tr.alpha<=0){motionTrails.splice(i,1);continue;}
        ctx.save();
        ctx.globalAlpha=tr.alpha;
        ctx.shadowColor=tr.glow; ctx.shadowBlur=14;
        // رسم silhouette مبسطة للـ trail
        ctx.strokeStyle=tr.glow; ctx.lineWidth=10; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(tr.x,tr.y); ctx.lineTo(tr.x,tr.y-75); ctx.stroke();
        ctx.lineWidth=8;
        ctx.beginPath(); ctx.moveTo(tr.x,tr.y-55); ctx.lineTo(tr.x+tr.f*28,tr.y-40); ctx.stroke();
        ctx.beginPath(); ctx.arc(tr.x,tr.y-88,11,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }

    updateAndDrawParticles(ctx);

    p1.draw(ctx);
    p2.draw(ctx);

    // damage numbers
    for(let i=damageNumbers.length-1;i>=0;i--){
        const d=damageNumbers[i];
        d.y+=d.vy; d.vy*=0.92; d.alpha-=0.022;
        if(d.alpha<=0){damageNumbers.splice(i,1);continue;}
        ctx.save();ctx.globalAlpha=d.alpha;
        ctx.font=`bold ${d.size}px 'Segoe UI',sans-serif`;
        ctx.fillStyle=d.color;ctx.strokeStyle='rgba(0,0,0,0.8)';
        ctx.lineWidth=3;ctx.textAlign='center';
        ctx.strokeText(d.text,d.x,d.y);ctx.fillText(d.text,d.x,d.y);
        ctx.restore();
    }

    ctx.restore();
    ScreenFlash.draw(ctx);

    var mh1 = Math.max(1e-6, Number(p1.maxHealth) || 1);
    var mh2 = Math.max(1e-6, Number(p2.maxHealth) || 1);
    document.getElementById('p1HealthBar').style.width=(Math.max(0, Math.min(100, (Number(p1.health)||0) / mh1 * 100)))+'%';
    document.getElementById('p2HealthBar').style.width=(Math.max(0, Math.min(100, (Number(p2.health)||0) / mh2 * 100)))+'%';
    document.getElementById('comboDisplay').innerHTML='<span>⚡</span> '+(Number(p1.combo)||0);
    animFrameId=requestAnimationFrame(gameLoop);
}

var counterActive = false;
var counterTimeout = null;
var counterSweepRaf = null;
var COUNTER_DURATION = 1200; // ms مدة ظهور زر الـ Counter

function showCounterPrompt() {
    if(counterActive) return;
    counterActive = true;
    var prompt = document.getElementById('counterPrompt');
    var btn    = document.getElementById('counterRingBtn');
    var canvas = document.getElementById('counterSweepCanvas');
    if(!prompt || !btn || !canvas) return;

    // position above the Heavy button
    prompt.style.display = 'flex';
    prompt.style.right  = '90px';
    prompt.style.bottom = '95px';

    // sweep timer on the ring
    var size = 84;
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    var start = Date.now();

    function drawSweep() {
        var elapsed = Date.now() - start;
        var remaining = Math.max(0, COUNTER_DURATION - elapsed);
        var progress = remaining / COUNTER_DURATION;
        ctx.clearRect(0, 0, size, size);
        if(remaining <= 0) { hideCounterPrompt(); return; }
        // Depleting arc ring
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2 - 3, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,220,40,0.85)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.stroke();
        counterSweepRaf = requestAnimationFrame(drawSweep);
    }
    drawSweep();

    // tap handler
    btn._counterHandler = function() {
        if(!counterActive || !gameActive) return;
        hideCounterPrompt();
        triggerCounterAttack();
    };
    btn.addEventListener('touchstart', btn._counterHandler, {passive:true});
    btn.addEventListener('mousedown',  btn._counterHandler);

    // auto-hide after window
    counterTimeout = setTimeout(hideCounterPrompt, COUNTER_DURATION);
}

function hideCounterPrompt() {
    counterActive = false;
    if(counterTimeout)  { clearTimeout(counterTimeout);       counterTimeout = null; }
    if(counterSweepRaf) { cancelAnimationFrame(counterSweepRaf); counterSweepRaf = null; }
    var prompt = document.getElementById('counterPrompt');
    var btn    = document.getElementById('counterRingBtn');
    if(prompt) prompt.style.display = 'none';
    if(btn && btn._counterHandler) {
        btn.removeEventListener('touchstart', btn._counterHandler);
        btn.removeEventListener('mousedown',  btn._counterHandler);
        btn._counterHandler = null;
    }
}

function triggerCounterAttack() {
    if(!p1 || !gameActive) return;

    p1.isAttacking = true;

    setTimeout(function(){
        if(p1){ p1.isAttacking=false; if(p1.state===STATES.ATTACK_HEAVY) p1.setState(STATES.IDLE,true); }

}

function endBattle(playerWon){
    if(!gameActive)return;
    gameActive=false;
    hideCounterPrompt();
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    if(playerWon && p1) p1.setState(STATES.WIN, true);
    AdvBattleMusic.stop();

    const res=document.getElementById('battleResult');
    const title=document.getElementById('resultTitle');
    const rewards=document.getElementById('resultRewards');
    const btns=document.getElementById('resultBtns');

    if(playerWon){
        AudioManager.play('win');
        title.textContent='🏆 انتصرت!';
        title.style.color='#2ecc71';

        const xpGain=currentStage.xpGain;
        const goldGain=currentStage.goldGain;
        player.gold+=goldGain;

        // فتح المرحلة التالية (Math.max يصلح التقدم حتى مع إعادة لعب مرحلة قديمة أو unlockedStage تالف)
        var sid = Number(currentStage && currentStage.id);
        if (!isFinite(sid)) sid = 0;
        player.unlockedStage = Math.max(normalizedUnlockedStage(), sid + 1);
        savePlayer();
        addXP(xpGain);

        rewards.innerHTML=`
            <div class="reward-pill xp-gain">✨ +${xpGain} XP</div>
            <div class="reward-pill gold-gain">🪙 +${goldGain} Gold</div>
        `;
        // حساب المرحلة التالية
        var pos = findWorldAndStageIndex(currentStage);
        var hasNext = false;
        if (pos) {
            var hasNextInWorld = pos.sIdx + 1 < WORLDS[pos.wIdx].stages.length;
            var hasNextWorld = pos.wIdx + 1 < WORLDS.length;
            hasNext = (hasNextInWorld || hasNextWorld) && (sid + 1 <= normalizedUnlockedStage());
        }
        btns.innerHTML=hasNext
            ? `<button class="res-btn btn-continue" onclick="goNextStage()">التالي ⬅️</button>
               <button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>`
            : `<button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>`;
    }else{
        AudioManager.play('lose');
        title.textContent='💀 خسرت!';
        title.style.color='#e74c3c';
        rewards.innerHTML='<div class="reward-pill" style="color:#e74c3c;">حاول مرة أخرى!</div>';
        btns.innerHTML=`
            <button class="res-btn btn-retry" onclick="retryStage()">🔄 إعادة</button>
            <button class="res-btn btn-map"   onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }
    res.style.display='flex';
}

function closeBattleResult(){
    document.getElementById('battleResult').style.display='none';
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function goNextStage(){
    document.getElementById('battleResult').style.display='none';
    var pos = findWorldAndStageIndex(currentStage);
    if (!pos) {
        document.getElementById('gameScreen').style.display='none';
        showMap();
        return;
    }
    var wIdx = pos.wIdx, sIdx = pos.sIdx;
    if(sIdx+1<WORLDS[wIdx].stages.length){
        startStage(wIdx, sIdx+1);
    } else if(wIdx+1<WORLDS.length){
        startStage(wIdx+1, 0);
    } else {
        document.getElementById('gameScreen').style.display='none';
        showMap();
    }
}

function retryStage(){
    document.getElementById('battleResult').style.display='none';
    if(!currentStage){ showMap(); return; }
    var pos = findWorldAndStageIndex(currentStage);
    if(!pos){ showMap(); return; }
    startStage(pos.wIdx, pos.sIdx);
}

function retreatFromBattle(){
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function setupControls(){
    var bind = function(id,onS,onE) {
        const el=document.getElementById(id);
        if(!el)return;
        const s=function(e) {e.preventDefault();onS();};
        const e=function(ev) {ev.preventDefault();if(onE)onE();};
        el.addEventListener('touchstart',s,{passive:false});
        el.addEventListener('touchend',e,{passive:false});
        el.addEventListener('touchcancel',e,{passive:false});
        el.addEventListener('mousedown',s);
        el.addEventListener('mouseup',e);
        el.addEventListener('mouseleave',e);
    };

    const jBase=document.getElementById('joystickBase');
    const jKnob=document.getElementById('joystickKnob');
    const maxR=32;
    function jC(){const r=jBase.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
    function moveJ(cx,cy){
        const c=jC();let dx=cx-c.x,dy=cy-c.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
        jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        keys.left=dx<-8;keys.right=dx>8;
    }
    function resetJ(){jKnob.style.transform='translate(-50%,-50%)';keys.left=keys.right=false;}

    jBase.addEventListener('touchstart',function(e) {e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchmove', function(e) {e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchend',  function(e) {e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('touchcancel',function(e) {e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('mousedown',e=>moveJ(e.clientX,e.clientY));
    jBase.addEventListener('mousemove',function(e) {if(e.buttons===1)moveJ(e.clientX,e.clientY);});
    jBase.addEventListener('mouseup',resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    // ── Cooldown sweep + countdown display ──
    function startCooldownDisplay(btn, cdEl, canvas, timerEl, duration, sweepColor) {
        btn.style.opacity = '0.55';
        cdEl.style.display = 'flex';
        var start = Date.now();
        var size = btn.offsetWidth || 72;
        canvas.width  = size;
        canvas.height = size;
        var ctx = canvas.getContext('2d');
        var raf;
        function draw() {
            var elapsed = Date.now() - start;
            var remaining = Math.max(0, duration - elapsed);
            var progress = remaining / duration; // 1 → 0
            ctx.clearRect(0, 0, size, size);
            if(remaining <= 0) {
                cdEl.style.display = 'none';
                btn.style.opacity = '1';
                return;
            }
            // Dark overlay fill
            ctx.beginPath();
            ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0,0,0,0.52)';
            ctx.fill();
            // Sweep slice (conic-style using arc)
            var startAngle = -Math.PI / 2; // top
            var sweepAngle = progress * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(size/2, size/2);
            ctx.arc(size/2, size/2, size/2, startAngle, startAngle + sweepAngle);
            ctx.closePath();
            ctx.fillStyle = sweepColor;
            ctx.fill();
            // Timer text
            var secs = Math.ceil(remaining / 1000);
            timerEl.textContent = secs > 0 ? secs : '';
            raf = requestAnimationFrame(draw);
        }
        draw();
    }

    // Bounce animation helper
    function addBounce(id) {
        var el = document.getElementById(id);
        if(!el) return;
        function doB(){ el.classList.remove('btn-pressed'); void el.offsetWidth; el.classList.add('btn-pressed'); }
        el.addEventListener('touchstart', doB, {passive:true});
        el.addEventListener('mousedown',  doB);
    }
    ['btnJump','btnAttack','btnBlock','btnHeavy','btnHeal'].forEach(addBounce);

    bind('btnJump',function(){if(p1&&p1.isGrounded&&gameActive){p1.vy=CONFIG.jumpForce;p1.setState(STATES.JUMP,true);AudioManager.play('jump');}});
    bind('btnAttack',function(){
        if(!p1||!gameActive||p1.stunned>0)return;
        const now=Date.now();
        const cd=CONFIG.attackCooldown*(1-player.atkSpd/100);
        if(now-p1.lastAttackTime>cd){
            p1.isAttacking=true;p1.lastAttackTime=now;
            const isHeavy=false; // يمكن إضافة heavy attack لاحقاً
            p1.setState(STATES.ATTACK_LIGHT,true);
            AudioManager.play('punch');
            setTimeout(function(){p1.isAttacking=false;p1.setState(STATES.IDLE,true);},ANIM_DATA.attack_light.dur);
        }
    });
    bind('btnBlock',function(){if(p1&&gameActive&&p1.blockStamina>0){p1.isBlocking=true;p1.setState(STATES.BLOCK,true);}},function(){if(p1){p1.isBlocking=false;p1.setState(STATES.IDLE,true);}});

    // ── Skill: Heavy Slam ──
    var heavyCooldown = 0;
    var HEAVY_CD = 1800;
    bind('btnHeavy', function(){
        if(!p1||!gameActive||p1.stunned>0) return;
        var now=Date.now();
        if(now - heavyCooldown < HEAVY_CD) return;
        heavyCooldown = now;
        p1.isAttacking = true;
        p1.setState(STATES.ATTACK_HEAVY, true);
        AudioManager.play('punch');
        // Reset fx state for clean animation
        var ssH = _getSkillAnimState(p1); ssH._fxFrame = null; ssH.frame = 0; ssH.animKey = null;
        // Visual cooldown on button — sweep + countdown
        var btn = document.getElementById('btnHeavy');
        var cdEl = document.getElementById('cdHeavy');
        var cdCanvas = document.getElementById('cdHeavyCanvas');
        var cdTimerEl = document.getElementById('cdHeavyTimer');
        if(btn && cdEl) startCooldownDisplay(btn, cdEl, cdCanvas, cdTimerEl, HEAVY_CD, 'rgba(255,100,0,0.55)');
        // End attack after animation
        setTimeout(function(){
            if(p1){ p1.isAttacking=false; if(p1.state===STATES.ATTACK_HEAVY) p1.setState(STATES.IDLE,true); }
        }, ANIM_DATA.attack_heavy.dur);
    });

    // ── Skill: Heal ──
    var healCooldown = 0;
    bind('btnHeal', function(){
        if(!p1 || !gameActive) return;
        var now=Date.now();
        if(now - healCooldown < 4000) return; // 4s cooldown
        healCooldown = now;
        // Heal based on fighter's actual maxHealth
        var maxHp = Math.max(1, p1.maxHealth || player.maxHp || 100);
        var healAmt = Math.max(20, Math.floor(maxHp * 0.18)); // 18% of max HP, min 20
        var oldHealth = p1.health;
        p1.health = Math.min(maxHp, p1.health + healAmt);
        var actualHeal = Math.floor(p1.health - oldHealth);
        if(actualHeal > 0) {
            // Show floating number
            damageNumbers.push({x:p1.x, y:p1.y-70, vy:-2.5, alpha:1, text:'+'+actualHeal+' HP', color:'#2ecc71', size:22});
            // Update health bar immediately
            var mh1 = Math.max(1e-6, Number(p1.maxHealth) || 1);
            var bar = document.getElementById('p1HealthBar');
            if(bar) bar.style.width = (Math.max(0, Math.min(100, p1.health / mh1 * 100))) + '%';
        }
        // Trigger heal animation
        p1.setState(STATES.WIN, true);
        setTimeout(function(){ if(p1 && p1.state===STATES.WIN) p1.setState(STATES.IDLE,true); }, 1500);
        // Heal particles burst
        for(var hi=0;hi<16;hi++){
            var ang = (Math.PI*2/16)*hi;
            var spd = 1.5 + Math.random()*2.5;
            particles.push({x:p1.x, y:p1.y-50, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1.5,
                size:3+Math.random()*4, alpha:1, color:'#2ecc71', gravity:0.04, life:0.018,
                type:'combo', rotation:0, rotSpeed:0.12});
        }
        // Screen flash green
        ScreenFlash.trigger('#00cc66', 0.15);
        // Visual cooldown on button — sweep + countdown
        var btnH = document.getElementById('btnHeal');
        var cdElH = document.getElementById('cdHeal');
        var cdCanvasH = document.getElementById('cdHealCanvas');
        var cdTimerElH = document.getElementById('cdHealTimer');
        if(btnH && cdElH) startCooldownDisplay(btnH, cdElH, cdCanvasH, cdTimerElH, 4000, 'rgba(46,204,113,0.55)');
    });
}

// ===================================================
// ========== التحميل ==========
// ===================================================
// ══════════════════════════════════════════════
// IDLE HERO ANIMATION — map screen SVG character
// ══════════════════════════════════════════════
(function(){
    var _raf = null;
    var _running = false;

    function startIdleAnim(){
        if(_running) return;
        _running = true;
        _raf = requestAnimationFrame(_idleLoop);
        _startBgParticles();
    }
    function stopIdleAnim(){
        _running = false;
        if(_raf){ cancelAnimationFrame(_raf); _raf=null; }
    }

    // expose globally so showMap/startStage can toggle
    window.startIdleAnim = startIdleAnim;
    window.stopIdleAnim  = stopIdleAnim;

    var _frame = 0;
    var _frameTime = 0;
    var _sprites = null;
    var _spriteKeys = null;

    function _getSpriteFrames() {
        // Sprite sheets removed — characters to be redesigned separately
        return null;
    }

    function _idleLoop(ts){
        if(!_running) return;

        // Animate sprite: draw idle frames from sheet onto img
        var imgEl = document.getElementById('playerCardSprite');
        if(imgEl) {
            if(ts - _frameTime > 500) { // toggle every 500ms
                _frame = 1 - _frame;
                _frameTime = ts;
                var info = _getSpriteFrames();
                if(info && info.src) {
                    // Extract frame from sheet (cols=4, fw=128, fh=128)
                    var canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    var ctx2 = canvas.getContext('2d');
                    var sheetImg = new Image();
                    sheetImg.onload = function() {
                        ctx2.drawImage(sheetImg, _frame * 128, 0, 128, 128, 0, 0, 128, 128);
                        imgEl.src = canvas.toDataURL();
                    };
                    sheetImg.src = info.src;
                    if(info.glow) imgEl.style.filter = 'drop-shadow(0 0 10px ' + info.glow + ') drop-shadow(0 0 22px ' + info.glow.replace('0.9','0.4') + ')';
                }
            }
        }

        _raf = requestAnimationFrame(_idleLoop);
    }

    // ── background floating particles ──
    var _bgRaf = null;
    var _particles = [];

    function _startBgParticles(){
        var cv = document.getElementById('heroBgCanvas');
        if(!cv) return;
        var W = cv.offsetWidth, H = cv.offsetHeight;
        cv.width = W; cv.height = H;
        _particles = [];
        for(var i=0;i<18;i++){
            _particles.push({
                x: Math.random()*W, y: Math.random()*H,
                vx:(Math.random()-0.5)*0.3,
                vy:-(Math.random()*0.4+0.1),
                size:Math.random()*2+0.5,
                alpha:Math.random()*0.5+0.1,
                hue: 140+Math.random()*30,
                phase:Math.random()*Math.PI*2
            });
        }
        _bgLoop();
    }

    function _bgLoop(){
        var cv = document.getElementById('heroBgCanvas');
        if(!cv||!_running){ _bgRaf=null; return; }
        var ctx = cv.getContext('2d');
        var W=cv.width, H=cv.height;
        ctx.clearRect(0,0,W,H);

        _particles.forEach(function(p){
            p.x += p.vx; p.y += p.vy; p.phase += 0.03;
            if(p.x<0) p.x=W; if(p.x>W) p.x=0;
            if(p.y<-5) p.y=H;
            var a = p.alpha*(0.5+Math.sin(p.phase)*0.5);
            ctx.save();
            ctx.globalAlpha = a;
            ctx.fillStyle = 'hsl('+p.hue+',70%,65%)';
            ctx.shadowColor = 'hsl('+p.hue+',80%,60%)';
            ctx.shadowBlur = p.size*4;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            ctx.restore();
        });

        _bgRaf = requestAnimationFrame(_bgLoop);
    }
})();

window.onload=function(){
    function fixVP(){
        const gs=document.getElementById('gameScreen');
        if(gs)gs.style.height=window.innerHeight+'px';
    }
    fixVP();
    window.addEventListener('resize',fixVP);
    window.addEventListener('orientationchange',fixVP);

    AudioManager.preload();
    AdvBattleMusic.load();
    setupControls();
    document.getElementById('gameScreen').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

    // التطبيق دايماً landscape — عرض الخريطة مباشرة
    showMap();
    if(window.startIdleAnim) setTimeout(window.startIdleAnim, 200);
};
