let advBgParticles = [];

function initAdvBgParticles(bgData, W, H) {
    advBgParticles = [];
    const isBoss = bgData.boss;
    const count  = isBoss ? 80 : 50;
    for(let i=0;i<count;i++){
        advBgParticles.push({
            x:Math.random()*W, y:Math.random()*H,
            vx:(Math.random()-0.5)*0.4,
            vy:-(Math.random()*0.5+0.1),
            size:Math.random()*2.5+0.5,
            alpha:Math.random()*0.7+0.1,
            phase:Math.random()*Math.PI*2,
            type:bgData.particles,
        });
    }
}

function drawAdvAnimatedBg(bgData, W, H, t) {
    // السماء
    const sky=ctx.createLinearGradient(0,0,0,H*0.75);
    sky.addColorStop(0,bgData.sky[0]); sky.addColorStop(0.5,bgData.sky[1]); sky.addColorStop(1,bgData.sky[2]);
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

    // تأثيرات خاصة
    if(bgData.type==='forest'){
        const g=ctx.createRadialGradient(W/2,H/2,20,W/2,H/2,W*0.5);
        g.addColorStop(0,'rgba(20,80,20,0.1)'); g.addColorStop(1,'transparent');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='desert'){
        const flicker=0.08+Math.sin(t/300)*0.03;
        ctx.fillStyle=`rgba(180,90,0,${flicker})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='storm'){
        // مطر خفيف
        ctx.save(); ctx.strokeStyle='rgba(150,180,255,0.12)'; ctx.lineWidth=1;
        for(let i=0;i<20;i++){
            const rx=(i*67+t*0.3)%W, ry=(i*43+t*0.8)%H;
            ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx-8,ry+20); ctx.stroke();
        }
        ctx.restore();
    } else if(bgData.type==='volcano'){
        const lf=0.15+Math.sin(t/200)*0.07;
        ctx.fillStyle=`rgba(180,30,0,${lf})`; ctx.fillRect(0,0,W,H);
    } else if(bgData.type==='abyss'){
        const spiral=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W*0.5);
        spiral.addColorStop(0,'rgba(150,0,0,0.25)'); spiral.addColorStop(1,'transparent');
        ctx.fillStyle=spiral; ctx.fillRect(0,0,W,H);
    }

    // الجسيمات
    advBgParticles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.phase+=0.03;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H*0.8;
        const a=p.alpha*(0.6+Math.sin(p.phase)*0.4);
        ctx.save(); ctx.globalAlpha=a;
        switch(p.type){
            case 'fireflies':
                ctx.fillStyle='#88ff44'; ctx.shadowColor='#88ff44'; ctx.shadowBlur=8;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'sand':
                ctx.fillStyle='rgba(200,150,80,0.4)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            case 'lightning':
                if(Math.random()<0.005){
                    ctx.strokeStyle='rgba(150,180,255,0.7)'; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x+(Math.random()-0.5)*40,H*0.6); ctx.stroke();
                } break;
            case 'embers': case 'hellfire':
                const ec=p.type==='hellfire'?'#ff2000':'#ff6600';
                ctx.fillStyle=ec; ctx.shadowColor=ec; ctx.shadowBlur=10;
                p.y=p.y<-10?H*0.85:p.y;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); break;
            default:
                ctx.fillStyle='rgba(200,220,255,0.6)';
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    });

    // الأرض
    const groundGrad=ctx.createLinearGradient(0,CONFIG.groundY,0,H);
    groundGrad.addColorStop(0,bgData.ground); groundGrad.addColorStop(1,'#000');
    ctx.fillStyle=groundGrad; ctx.fillRect(0,CONFIG.groundY+2,W,H-CONFIG.groundY);
    // خط الأرض
    ctx.save();
    ctx.shadowColor=bgData.accent; ctx.shadowBlur=bgData.boss?18:8;
    ctx.strokeStyle=bgData.accent+'55'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,CONFIG.groundY+2); ctx.lineTo(W,CONFIG.groundY+2); ctx.stroke();
    ctx.restore();
}

const AdvBattleMusic = {
    miniBoss: null, finalBoss: null,
    baseURL: 'https://midopure883.github.io/Game/',
    load(){
        this.miniBoss  = new Audio(this.baseURL+'boss_music.mp3');
        this.finalBoss = new Audio(this.baseURL+'final_boss_music.mp3');
        this.miniBoss.loop  = true; this.miniBoss.volume  = 0.4;
        this.finalBoss.loop = true; this.finalBoss.volume = 0.4;
    },
    play(type){
        this.stop();
        const track = type==='boss'     ? this.finalBoss
                    : type==='miniboss' ? this.miniBoss
                    : null;
        if(track){ track.currentTime=0; track.play().catch(()=>{}); }
    },
    stop(){
        [this.miniBoss, this.finalBoss].forEach(t=>{ if(t){ t.pause(); t.currentTime=0; } });
    }
};

function spawnAdventureCrit(x,y){
    ScreenShake.trigger(12,10);
    ScreenFlash.trigger('#ff0000',0.2);
}
function spawnAdventureComboMult(x,y,mult){
    damageNumbers.push({x:x+30,y,vy:-2.5,alpha:1,text:`×${mult.toFixed(1)} COMBO`,color:'#f1c40f',size:18});
}

function gameLoop(){
    if(!gameActive){animFrameId=null;return;}
    const t=Date.now();
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // خلفية متحركة
    const bgData = window._currentAdvBg || currentWorld.bg;
    drawAdvAnimatedBg(bgData, W, H, t);

    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);

    if(p1.stunned<=0){
        if(keys.left){p1.vx=-4.5*(player.speed/100);p1.facing=-1;}
        else if(keys.right){p1.vx=4.5*(player.speed/100);p1.facing=1;}
    }

    p1.update(); updateEnemyAI(); p2.update(); checkBattleAttacks();

    updateAndDrawParticles(ctx);
    p1.draw(ctx); p2.draw(ctx);

    // damage numbers
    for(let i=damageNumbers.length-1;i>=0;i--){
        const d=damageNumbers[i];
        d.y+=d.vy; d.vy*=0.92; d.alpha-=0.022;
        if(d.alpha<=0){damageNumbers.splice(i,1);continue;}
        ctx.save();ctx.globalAlpha=d.alpha;
        ctx.font=`bold ${d.size}px 'Segoe UI',sans-serif`;
        ctx.fillStyle=d.color;ctx.strokeStyle='rgba(0,0,0,0.8)';
        ctx.lineWidth=3;ctx.textAlign='center';
        ctx.strokeText(d.text,d.x,d.y);ctx.fillText(d.text,d.x,d.y);
        ctx.restore();
    }

    ctx.restore();
    ScreenFlash.draw(ctx);

    document.getElementById('p1HealthBar').style.width=(p1.health/p1.maxHealth*100)+'%';
    document.getElementById('p2HealthBar').style.width=(p2.health/p2.maxHealth*100)+'%';
    document.getElementById('comboDisplay').innerHTML=`<span>⚡</span> ${p1.combo}`;
    animFrameId=requestAnimationFrame(gameLoop);
}

function endBattle(playerWon){
    if(!gameActive)return;
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    if(playerWon && p1) p1.setState(STATES.WIN, true);
    AdvBattleMusic.stop();

    const res=document.getElementById('battleResult');
    const title=document.getElementById('resultTitle');
    const rewards=document.getElementById('resultRewards');
    const btns=document.getElementById('resultBtns');

    if(playerWon){
        AudioManager.play('win');
        title.textContent='🏆 انتصرت!';
        title.style.color='#2ecc71';

        const xpGain=currentStage.xpGain;
        const goldGain=currentStage.goldGain;
        player.gold+=goldGain;

        // فتح المرحلة التالية
        if(currentStage.id>=player.unlockedStage){
            player.unlockedStage=currentStage.id+1;
        }
        savePlayer();
        addXP(xpGain);

        rewards.innerHTML=`
            <div class="reward-pill xp-gain">✨ +${xpGain} XP</div>
            <div class="reward-pill gold-gain">🪙 +${goldGain} Gold</div>
        `;
        btns.innerHTML=`
            <button class="res-btn btn-continue" onclick="closeBattleResult()">التالي ⬅️</button>
            <button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }else{
        AudioManager.play('lose');
        title.textContent='💀 خسرت!';
        title.style.color='#e74c3c';
        rewards.innerHTML='<div class="reward-pill" style="color:#e74c3c;">حاول مرة أخرى!</div>';
        btns.innerHTML=`
            <button class="res-btn btn-retry" onclick="retryStage()">🔄 إعادة</button>
            <button class="res-btn btn-map"   onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }
    res.style.display='flex';
}

function closeBattleResult(){
    document.getElementById('battleResult').style.display='none';
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function retryStage(){
    document.getElementById('battleResult').style.display='none';
    const wIdx=WORLDS.findIndex(w=>w.stages.includes(currentStage));
    const sIdx=WORLDS[wIdx].stages.indexOf(currentStage);
    startStage(wIdx,sIdx);
}

function retreatFromBattle(){
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

// ===================================================
// ========== التحكم ==========
// ===================================================
function setupControls(){
    const bind=(id,onS,onE)=>{
        const el=document.getElementById(id);
        if(!el)return;
        const s=e=>{e.preventDefault();onS();};
        const e=ev=>{ev.preventDefault();if(onE)onE();};
        el.addEventListener('touchstart',s,{passive:false});
        el.addEventListener('touchend',e,{passive:false});
        el.addEventListener('touchcancel',e,{passive:false});
        el.addEventListener('mousedown',s);
        el.addEventListener('mouseup',e);
        el.addEventListener('mouseleave',e);
    };

    const jBase=document.getElementById('joystickBase');
    const jKnob=document.getElementById('joystickKnob');
    const maxR=32;
    function jC(){const r=jBase.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
    function moveJ(cx,cy){
        const c=jC();let dx=cx-c.x,dy=cy-c.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
        jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        keys.left=dx<-8;keys.right=dx>8;
    }
    function resetJ(){jKnob.style.transform='translate(-50%,-50%)';keys.left=keys.right=false;}

    jBase.addEventListener('touchstart',e=>{e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchmove', e=>{e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchend',  e=>{e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('touchcancel',e=>{e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('mousedown',e=>moveJ(e.clientX,e.clientY));
    jBase.addEventListener('mousemove',e=>{if(e.buttons===1)moveJ(e.clientX,e.clientY);});
    jBase.addEventListener('mouseup',resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    bind('btnJump',()=>{if(p1&&p1.isGrounded&&gameActive){p1.vy=CONFIG.jumpForce;p1.setState(STATES.JUMP,true);AudioManager.play('jump');}});
    bind('btnAttack',()=>{
        if(!p1||!gameActive||p1.stunned>0)return;
        const now=Date.now();
        const cd=CONFIG.attackCooldown*(1-player.atkSpd/100);
        if(now-p1.lastAttackTime>cd){
            p1.isAttacking=true;p1.lastAttackTime=now;
            const isHeavy=false; // يمكن إضافة heavy attack لاحقاً
            p1.setState(STATES.ATTACK_LIGHT,true);
            AudioManager.play('punch');
            setTimeout(()=>{p1.isAttacking=false;p1.setState(STATES.IDLE,true);},ANIM_DATA.attack_light.dur);
        }
    });
    bind('btnBlock',()=>{if(p1&&gameActive&&p1.blockStamina>0){p1.isBlocking=true;p1.setState(STATES.BLOCK,true);}},
                   ()=>{if(p1){p1.isBlocking=false;p1.setState(STATES.IDLE,true);}});
}

// ===================================================
// ========== التنقل بين الشاشات ==========
// ===================================================
function showMap(){
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('mapScreen').classList.add('active');
    buildStageMap();
    updatePlayerUI();
}

function showUpgrades(){
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById('upgradeScreen').classList.add('active');
    updatePlayerUI();
    renderUpgrades();
}

function goBackToMain(){
    if (window.parent && window.parent.returnToMenu) {
        window.parent.returnToMenu();
    } else {
        window.location.href='index.html';
    }
}

// ===================================================
// ========== التحميل ==========
// ===================================================
window.onload=function(){
    function fixVP(){
        const gs=document.getElementById('gameScreen');
        if(gs)gs.style.height=window.innerHeight+'px';
    }
    fixVP();
    window.addEventListener('resize',fixVP);

    AudioManager.preload();
    AdvBattleMusic.load();
    setupControls();
    document.getElementById('gameScreen').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

    // التطبيق دايماً landscape — عرض الخريطة مباشرة
    showMap();
};
</script>
