<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ Adventure Mode</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
body {
    background:#0a0c0f; width:100vw; height:100vh; height:100dvh;
    font-family:'Segoe UI',system-ui,sans-serif;
    touch-action:pan-y; overflow:hidden; color:white;
}

/* ===== شاشة التدوير ===== */
#rotateScreen {
    display:none; position:fixed; top:0; left:0;
    width:100vw; height:100vh; background:#0a0c0f;
    z-index:99999; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:20px;
}
#rotateScreen .ri { font-size:5rem; animation:rspin 2s ease-in-out infinite; }
@keyframes rspin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
#rotateScreen p     { font-size:1.3rem; color:#f1c40f; font-weight:bold; }
#rotateScreen small { color:#aaa; font-size:0.9rem; }

/* ===== Wrapper ===== */
.screen {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100vw;
    height:100vh;
    height:100dvh;
    flex-direction:column;
    overflow-y:scroll;
    -webkit-overflow-scrolling:touch;
    background:#0a0c0f;
    z-index:100;
    padding:12px;
    gap:10px;
    box-sizing:border-box;
}
.screen.active { display:flex; }

/* ===== Top Bar ===== */
.top-bar {
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,0.04); border-radius:16px;
    padding:10px 14px; flex-shrink:0;
    border:1px solid rgba(255,255,255,0.07);
}
.top-bar-title { font-size:1.1rem; font-weight:bold; color:#f1c40f; }
.resources { display:flex; gap:12px; align-items:center; }
.res-item { display:flex; align-items:center; gap:4px; font-size:0.85rem; font-weight:bold; }
.res-item.gold { color:#f1c40f; }
.res-item.gems { color:#a29bfe; }
.res-item.xp   { color:#00cec9; }
.back-btn {
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    color:white; padding:6px 12px; border-radius:10px; cursor:pointer;
    font-size:0.85rem; transition:0.15s;
}
.back-btn:active { background:rgba(255,255,255,0.15); }

/* ===== Player Card ===== */
.player-card {
    background:linear-gradient(145deg,#1a1e2a,#12151e);
    border-radius:20px; padding:14px 16px;
    border:1px solid rgba(255,255,255,0.08); flex-shrink:0;
}
.player-card-top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.player-avatar {
    width:48px; height:48px; border-radius:50%;
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    display:flex; align-items:center; justify-content:center;
    font-size:1.5rem; border:2px solid rgba(255,255,255,0.15);
}
.player-info { flex:1; }
.player-name { font-weight:bold; font-size:1rem; }
.player-level { color:#f1c40f; font-size:0.8rem; margin-top:2px; }
.skill-points-badge {
    background:rgba(241,196,15,0.15); border:1px solid #f1c40f;
    color:#f1c40f; padding:3px 8px; border-radius:20px; font-size:0.75rem;
    display:none;
}
.xp-bar-wrap { display:flex; align-items:center; gap:8px; }
.xp-label { font-size:0.75rem; color:#00cec9; white-space:nowrap; }
.xp-bar { flex:1; height:8px; background:rgba(255,255,255,0.1); border-radius:6px; overflow:hidden; }
.xp-fill { height:100%; background:linear-gradient(90deg,#00cec9,#6c5ce7); border-radius:6px; transition:width 0.5s; }
.stats-row { display:flex; gap:10px; margin-top:10px; }
.stat-pill {
    flex:1; background:rgba(255,255,255,0.05); border-radius:10px;
    padding:6px 8px; text-align:center; border:1px solid rgba(255,255,255,0.07);
}
.stat-pill .sv { font-weight:bold; font-size:0.95rem; }
.stat-pill .sk { font-size:0.65rem; color:#aaa; margin-top:1px; }

/* ===== Stage Map ===== */
.world-section { flex-shrink:0; margin-bottom:8px; }
#stageMap { display:flex; flex-direction:column; gap:8px; padding-bottom:20px; }
.world-header {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-radius:14px;
    margin-bottom:8px;
    border:1px solid rgba(255,255,255,0.08);
}
.world-header .wnum { font-size:1rem; font-weight:bold; }
.world-header .wname { font-size:0.8rem; color:#aaa; }
.stages-list { display:flex; flex-direction:column; gap:6px; }
.stage-item {
    display:flex; align-items:center; gap:12px;
    padding:10px 14px; border-radius:14px;
    background:linear-gradient(145deg,#15181f,#0f1218);
    border:1px solid rgba(255,255,255,0.06);
    cursor:pointer; transition:0.2s; position:relative;
}
.stage-item:active { transform:scale(0.98); }
.stage-item.locked { opacity:0.4; cursor:default; pointer-events:none; }
.stage-item.completed { border-color:rgba(46,204,113,0.3); }
.stage-item.current { border-color:rgba(241,196,15,0.5); box-shadow:0 0 12px rgba(241,196,15,0.1); }
.stage-item.boss-stage { border-color:rgba(231,76,60,0.4); }
.stage-item.miniboss-stage { border-color:rgba(230,126,34,0.4); }
.stage-icon { font-size:1.4rem; min-width:32px; text-align:center; }
.stage-info { flex:1; }
.stage-name { font-weight:bold; font-size:0.9rem; }
.stage-sub  { font-size:0.72rem; color:#7f8c8d; margin-top:2px; }
.stage-reward { font-size:0.75rem; color:#f1c40f; }
.stage-status { font-size:1rem; }
.stage-item.completed .stage-status::after { content:'✅'; }
.stage-item.locked    .stage-status::after { content:'🔒'; }

/* ===== Upgrade Screen ===== */
.upgrade-tabs { display:flex; gap:6px; flex-shrink:0; }
.utab {
    flex:1; padding:8px 4px; border-radius:12px; text-align:center;
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
    cursor:pointer; font-size:0.8rem; transition:0.15s;
}
.utab.active { background:rgba(241,196,15,0.15); border-color:#f1c40f; color:#f1c40f; }
.upgrade-list { display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
.upgrade-card {
    background:linear-gradient(145deg,#15181f,#0f1218);
    border-radius:16px; padding:12px 14px;
    border:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; gap:12px;
}
.upg-icon { font-size:1.6rem; min-width:40px; text-align:center; }
.upg-info { flex:1; }
.upg-name { font-weight:bold; font-size:0.9rem; }
.upg-desc { font-size:0.72rem; color:#7f8c8d; margin-top:2px; }
.upg-level { font-size:0.72rem; color:#f1c40f; margin-top:2px; }
.upg-btn {
    background:linear-gradient(135deg,#f1c40f,#e67e22);
    color:#000; border:none; padding:7px 12px; border-radius:10px;
    font-weight:bold; font-size:0.78rem; cursor:pointer; white-space:nowrap;
    transition:0.15s; min-width:65px; text-align:center;
}
.upg-btn:active { transform:scale(0.94); }
.upg-btn.disabled { background:rgba(255,255,255,0.1); color:#666; cursor:default; pointer-events:none; }
.upg-btn.maxed { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; pointer-events:none; }

/* ===== شاشة اللعبة ===== */
#gameScreen {
    display:none; position:fixed; top:0; left:0;
    width:100vw; width:100dvw;
    height:100vh; height:100dvh;
    z-index:1000; overflow:hidden;
}
.arena {
    position:absolute; top:0; left:0; width:100%; height:100%;
    overflow:hidden;
}
canvas { display:block; width:100%; height:100%; }
.ready-screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:transparent; display:none;
    align-items:center; justify-content:center; z-index:200;
    color:#f1c40f; font-size:3rem; font-weight:900;
    text-shadow:0 0 20px #e67e22,0 0 40px #e67e22;
    pointer-events:none; letter-spacing:6px;
}
.game-hud {
    position:absolute; top:8px; left:10px; right:10px;
    display:flex; align-items:center; gap:8px; z-index:10;
}
.health-container { flex:1; display:flex; align-items:center; gap:5px; }
.health-label { color:white; font-weight:bold; font-size:11px; white-space:nowrap; text-shadow:0 1px 3px #000; }
.health-bar { flex:1; height:10px; background:rgba(0,0,0,0.5); border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
.health-fill { height:100%; width:100%; transition:width 0.2s ease; border-radius:8px; }
.vs-text { color:#f1c40f; font-weight:900; font-size:0.85rem; text-shadow:0 1px 3px #000; }
.timer-bar {
    position:absolute; top:26px; left:10px; right:10px;
    height:3px; background:rgba(0,0,0,0.4); border-radius:10px; overflow:hidden; z-index:10;
}
.timer-fill { height:100%; width:100%; background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c); transition:width 1s linear; }
.top-btns-game {
    position:absolute; top:8px; left:10px;
    display:flex; gap:6px; z-index:20;
}
.icon-btn {
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
    color:white; width:36px; height:36px; border-radius:10px;
    cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); transition:0.1s;
}
.icon-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.9); }
.game-bottom {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; z-index:10;
}
.combo-counter {
    background:rgba(142,68,173,0.75); padding:3px 10px; border-radius:20px;
    color:white; font-weight:bold; font-size:0.7rem;
    backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.1); white-space:nowrap;
}
.combo-counter span { color:#f1c40f; }
.game-message {
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    color:#f1c40f; font-weight:bold; font-size:0.95rem;
    text-shadow:0 0 10px #e67e22; z-index:10; white-space:nowrap;
}
.joystick-container {
    position:absolute; bottom:18px; left:20px;
    width:100px; height:100px;
    background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.15);
    border-radius:50%; z-index:20; backdrop-filter:blur(2px);
}
.joystick-knob {
    position:absolute; width:42px; height:42px;
    background:radial-gradient(circle at 35% 35%,rgba(149,165,166,0.9),rgba(44,62,80,0.9));
    border-radius:50%; top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 3px 10px rgba(0,0,0,0.7); pointer-events:none;
}
.action-btns {
    position:absolute; bottom:18px; right:20px;
    display:grid; grid-template-columns:1fr 1fr; gap:6px; z-index:20;
}
.action-btn {
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; cursor:pointer; border:none;
    box-shadow:0 4px 0 rgba(0,0,0,0.5); transition:0.05s; color:white;
}
.action-btn:active { transform:scale(0.88); box-shadow:0 1px 0 rgba(0,0,0,0.5); }
.attack-btn { background:rgba(231,76,60,0.85); border:2px solid rgba(255,255,255,0.2); grid-column:span 2; width:110px; height:46px; border-radius:25px; justify-self:center; }
.jump-btn { background:rgba(243,156,18,0.85); border:2px solid rgba(255,255,255,0.2); }
.block-btn { background:rgba(52,152,219,0.85); border:2px solid rgba(255,255,255,0.2); }

/* ===== شاشة نتيجة المعركة ===== */
#battleResult {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.88); z-index:4000;
    flex-direction:column; align-items:center; justify-content:center;
    gap:16px; backdrop-filter:blur(8px);
}
.result-title { font-size:2.5rem; font-weight:900; animation:endPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes endPop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.result-rewards { display:flex; gap:16px; }
.reward-pill {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
    border-radius:20px; padding:8px 16px;
    display:flex; align-items:center; gap:6px; font-weight:bold;
}
.xp-gain { color:#00cec9; }
.gold-gain { color:#f1c40f; }
.result-btns { display:flex; gap:10px; }
.res-btn {
    padding:11px 24px; border-radius:50px; border:none;
    font-size:0.95rem; font-weight:bold; cursor:pointer;
    transition:0.15s; box-shadow:0 4px 0 rgba(0,0,0,0.4);
}
.res-btn:active { transform:translateY(4px); box-shadow:none; }
.btn-continue { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; }
.btn-retry    { background:linear-gradient(135deg,#e74c3c,#c0392b); color:white; }
.btn-map      { background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); }

/* ===== Level Up popup ===== */
#levelUpPopup {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.75); z-index:5000;
    align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
}
.levelup-box {
    background:linear-gradient(145deg,#1a1e2a,#12151e);
    border:2px solid #f1c40f; border-radius:24px;
    padding:28px 24px; text-align:center; width:85%; max-width:320px;
    animation:endPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
.levelup-box h2 { color:#f1c40f; font-size:1.8rem; margin-bottom:8px; }
.levelup-box p  { color:#aaa; font-size:0.9rem; margin-bottom:16px; }
.levelup-bonuses { display:flex; gap:10px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.bonus-chip {
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
    border-radius:20px; padding:6px 12px; font-size:0.8rem;
}
.btn-levelup-ok {
    background:linear-gradient(135deg,#f1c40f,#e67e22); color:#000;
    border:none; padding:10px 28px; border-radius:20px;
    font-weight:bold; font-size:1rem; cursor:pointer;
}
</style>
</head>
<body>

<!-- شاشة التدوير -->
<div id="rotateScreen">
    <div class="ri">📱</div>
    <p>يرجى تدوير الشاشة</p>
    <small>اللعبة تعمل بالوضع الأفقي فقط</small>
</div>

<!-- Level Up Popup -->
<div id="levelUpPopup">
    <div class="levelup-box">
        <h2>⬆️ Level Up!</h2>
        <p id="levelUpText">وصلت المستوى 2!</p>
        <div class="levelup-bonuses" id="levelUpBonuses"></div>
        <button class="btn-levelup-ok" onclick="closeLevelUp()">رائع! 🎉</button>
    </div>
</div>

<!-- نتيجة المعركة -->
<div id="battleResult">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-rewards" id="resultRewards"></div>
    <div class="result-btns" id="resultBtns"></div>
</div>

<!-- ===== شاشة الخريطة ===== -->
<div class="screen active" id="mapScreen">
    <div class="top-bar">
        <span class="top-bar-title">🗺️ Adventure Mode</span>
        <div class="resources">
            <span class="res-item gold">🪙 <span id="goldDisplay">0</span></span>
            <span class="res-item gems">💎 <span id="gemsDisplay">0</span></span>
        </div>
        <button class="back-btn" onclick="goBackToMain()">🏠 القائمة</button>
    </div>

    <!-- بطاقة اللاعب -->
    <div class="player-card">
        <div class="player-card-top">
            <div class="player-avatar" id="playerAvatar">🥷</div>
            <div class="player-info">
                <div class="player-name">المقاتل</div>
                <div class="player-level" id="playerLevelLabel">Level 1</div>
            </div>
            <div class="skill-points-badge" id="skillBadge">⭐ <span id="skillPtsDisplay">0</span> نقاط</div>
        </div>
        <div class="xp-bar-wrap">
            <span class="xp-label" id="xpLabel">0 / 100 XP</span>
            <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
        </div>
        <div class="stats-row">
            <div class="stat-pill"><div class="sv" id="statDmg">12</div><div class="sk">⚔️ ضرر</div></div>
            <div class="stat-pill"><div class="sv" id="statHp">100</div><div class="sk">❤️ HP</div></div>
            <div class="stat-pill"><div class="sv" id="statSpd">100%</div><div class="sk">⚡ سرعة</div></div>
        </div>
        <div style="margin-top:10px; display:flex; gap:8px;">
            <button class="back-btn" style="flex:1; text-align:center;" onclick="showUpgrades()">🔧 Upgrades</button>
        </div>
    </div>

    <!-- خريطة المراحل -->
    <div id="stageMap"></div>
</div>

<!-- ===== شاشة الـ Upgrades ===== -->
<div class="screen" id="upgradeScreen">
    <div class="top-bar">
        <span class="top-bar-title">🔧 Upgrades</span>
        <div class="resources">
            <span class="res-item gold">🪙 <span id="goldDisplay2">0</span></span>
        </div>
        <button class="back-btn" onclick="showMap()">🔙 عودة</button>
    </div>
    <div class="upgrade-tabs">
        <div class="utab active" onclick="switchTab('combat')">⚔️ قتال</div>
        <div class="utab" onclick="switchTab('defense')">🛡️ دفاع</div>
        <div class="utab" onclick="switchTab('skills')">✨ مهارات</div>
    </div>
    <div class="upgrade-list" id="upgradeList"></div>
</div>

<!-- ===== شاشة اللعبة ===== -->
<div id="gameScreen">
    <div class="arena" id="arenaDiv">
        <canvas id="gameCanvas"></canvas>
        <div class="ready-screen" id="readyScreen">FIGHT!</div>
    </div>
    <div class="game-hud">
        <div class="health-container">
            <span class="health-label" style="color:#2ecc71;">أنت</span>
            <div class="health-bar"><div class="health-fill" id="p1HealthBar" style="background:linear-gradient(90deg,#2ecc71,#27ae60);width:100%"></div></div>
        </div>
        <span class="vs-text">VS</span>
        <div class="health-container">
            <div class="health-bar"><div class="health-fill" id="p2HealthBar" style="background:linear-gradient(90deg,#e74c3c,#c0392b);width:100%"></div></div>
            <span class="health-label" id="enemyLabel" style="color:#e74c3c;">Enemy</span>
        </div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerBar"></div></div>
    <div class="top-btns-game">
        <div class="icon-btn" onclick="retreatFromBattle()">🏠</div>
    </div>
    <div class="game-bottom">
        <div class="combo-counter" id="comboDisplay"><span>⚡</span> 0</div>
    </div>
    <div class="game-message" id="gameMessage"></div>
    <div class="action-btns">
        <div class="action-btn attack-btn" id="btnAttack">👊</div>
        <div class="action-btn jump-btn"   id="btnJump">⬆️</div>
        <div class="action-btn block-btn"  id="btnBlock">🛡️</div>
    </div>
    <div class="joystick-container" id="joystickBase">
        <div class="joystick-knob" id="joystickKnob"></div>
    </div>
</div>

<script>
// ===================================================
// ========== بيانات الأعداء والمراحل ==========
// ===================================================
const WORLDS = [
    {
        id: 1, name: 'World 1 — الغابة', icon: '🌲',
        bg: ['#0d2010','#102515','#162d1a'],
        stages: [
            { id:1,  name:'Stage 1', type:'normal',   icon:'⚔️',  enemyHp:100, enemyDmg:8,  xpGain:15,  goldGain:20  },
            { id:2,  name:'Stage 2', type:'normal',   icon:'⚔️',  enemyHp:130, enemyDmg:10, xpGain:18,  goldGain:25  },
            { id:3,  name:'Stage 3', type:'normal',   icon:'⚔️',  enemyHp:160, enemyDmg:12, xpGain:20,  goldGain:30  },
            { id:4,  name:'Stage 4', type:'normal',   icon:'⚔️',  enemyHp:200, enemyDmg:14, xpGain:25,  goldGain:40  },
            { id:5,  name:'Boss 1',  type:'boss',     icon:'💀',  enemyHp:400, enemyDmg:22, xpGain:120, goldGain:200, hasSword:true },
        ]
    },
    {
        id: 2, name: 'World 2 — الصحراء', icon: '🏜️',
        bg: ['#2a1a00','#352000','#402800'],
        stages: [
            { id:6,  name:'Stage 5', type:'normal',   icon:'⚔️',  enemyHp:240, enemyDmg:16, xpGain:28,  goldGain:45  },

function loadCharacter() {
    const saved = localStorage.getItem('game_character');
    if (saved) return JSON.parse(saved);
    return {
        gold: 0, gems: 0,
        damage: 12, maxHp: 100, atkSpd: 0, speed: 100,
        blockPow: 45, regen: 0, combo: 0, swordMastery: 0, crit: 0,
        upgrades: {}
    };
}

function loadProgress() {
    const saved = localStorage.getItem('adv_progress');
    if (saved) return JSON.parse(saved);
    return { level: 1, xp: 0, skillPoints: 0, unlockedStage: 1 };
}

function saveAll() {
    localStorage.setItem('game_character', JSON.stringify(character));
    localStorage.setItem('adv_progress',   JSON.stringify(progress));
}

let character = loadCharacter();
let progress  = loadProgress();

// دمج الاثنين في كائن player للاستخدام الداخلي
let player = Object.assign({}, character, progress);

function syncPlayer() {
    // نسخ القيم للكائنات المنفصلة
    Object.assign(character, {
        gold: player.gold, gems: player.gems,
        damage: player.damage, maxHp: player.maxHp,
        atkSpd: player.atkSpd, speed: player.speed,
        blockPow: player.blockPow, regen: player.regen,
        combo: player.combo, swordMastery: player.swordMastery,
        crit: player.crit, upgrades: player.upgrades
    });
    Object.assign(progress, {
        level: player.level, xp: player.xp,
        skillPoints: player.skillPoints, unlockedStage: player.unlockedStage
    });
    saveAll();
}

function savePlayer() { syncPlayer(); }

// ========== نظام XP والـ Level Up ==========
// ===================================================
function addXP(amount) {
    if (player.level >= MAX_LEVEL) return;
    player.xp += amount;
    const needed = XP_TABLE[player.level - 1];
    if (player.xp >= needed) {
        player.xp -= needed;
        player.level++;
        player.skillPoints++;
        applyLevelBonus();
        showLevelUp();
    }
    savePlayer();
    updatePlayerUI();
}

function applyLevelBonus() {
    player.damage += 2;
    player.maxHp  += 10;
}

function showLevelUp() {
    document.getElementById('levelUpText').textContent = `وصلت المستوى ${player.level}!`;
    document.getElementById('levelUpBonuses').innerHTML = `
        <div class="bonus-chip">⚔️ +2 ضرر</div>
        <div class="bonus-chip">❤️ +10 HP</div>
        <div class="bonus-chip">⭐ +1 Skill Point</div>
    `;
    document.getElementById('levelUpPopup').style.display = 'flex';
}

function closeLevelUp() {
    document.getElementById('levelUpPopup').style.display = 'none';
}

function updatePlayerUI() {
    const needed = player.level < MAX_LEVEL ? XP_TABLE[player.level - 1] : XP_TABLE[MAX_LEVEL - 1];
    const pct    = player.level < MAX_LEVEL ? (player.xp / needed * 100) : 100;

    document.getElementById('playerLevelLabel').textContent = `Level ${player.level}`;
    document.getElementById('xpLabel').textContent = `${player.xp} / ${needed} XP`;
    document.getElementById('xpFill').style.width  = pct + '%';
    document.getElementById('statDmg').textContent = player.damage;
    document.getElementById('statHp').textContent  = player.maxHp;
    document.getElementById('statSpd').textContent = player.speed + '%';

    const hasSP = player.skillPoints > 0;
    document.getElementById('skillBadge').style.display = hasSP ? 'block' : 'none';
    document.getElementById('skillPtsDisplay').textContent = player.skillPoints;

    ['goldDisplay','goldDisplay2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = player.gold;
    });
    document.getElementById('gemsDisplay').textContent = player.gems;
}

function buildStageMap() {
    const map = document.getElementById('stageMap');
    if (!map) return;
    map.innerHTML = '';

    WORLDS.forEach((world, wi) => {
        const allLocked = world.stages.every(s => s.id > player.unlockedStage);
        const worldColors = ['#1a2535','#2a1a00','#0d1e35'];
        const wc = worldColors[wi] || '#1a2535';

        const section = document.createElement('div');
        section.className = 'world-section';

        let stagesHtml = world.stages.map(stage => {
            const isCompleted = stage.id < player.unlockedStage;
            const isCurrent   = stage.id === player.unlockedStage;
            const isLocked    = stage.id > player.unlockedStage;
            const isBoss      = stage.type === 'boss';
            const isMiniBoss  = stage.type === 'miniboss';

            let cls = 'stage-item';
            if (isLocked)    cls += ' locked';
            else if (isCompleted) cls += ' completed';
            else if (isCurrent)   cls += ' current';
            if (isBoss)    cls += ' boss-stage';
            if (isMiniBoss) cls += ' miniboss-stage';

            const statusIcon = isCompleted ? '✅' : isCurrent ? '▶️' : '🔒';
            const onclick = !isLocked
                ? `onclick="startStage(${wi}, ${world.stages.indexOf(stage)})"`
                : '';

            return `<div class="${cls}" ${onclick}>
                <div class="stage-icon">${stage.icon}</div>
                <div class="stage-info">
                    <div class="stage-name">${stage.name}</div>
                    <div class="stage-sub">❤️ ${stage.enemyHp} &nbsp; ⚔️ ${stage.enemyDmg}</div>
                    <div class="stage-reward">🪙 +${stage.goldGain} &nbsp; ✨ +${stage.xpGain} XP</div>
                </div>
                <div style="font-size:1.2rem;">${statusIcon}</div>
            </div>`;
        }).join('');

        section.innerHTML = `
            <div class="world-header" style="background:${wc}; margin-bottom:8px;">
                <span style="font-size:1.6rem;">${world.icon}</span>
                <div>
                    <div class="wnum" style="color:${allLocked ? '#555' : 'white'}; font-weight:bold;">${world.name}</div>
                    ${allLocked ? '<div style="color:#555;font-size:0.8rem;">🔒 أكمل World السابق أولاً</div>' : ''}
                </div>
            </div>
            <div class="stages-list">${stagesHtml}</div>
        `;
        map.appendChild(section);
    });
}

let currentTab = 'combat';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.utab').forEach((t, i) => {
        t.classList.toggle('active', ['combat','defense','skills'][i] === tab);
    });
    renderUpgrades();
}

function upgradeCost(upg) {
    const lvl = player.upgrades[upg.id] || 0;
    return Math.floor(upg.base * Math.pow(lvl + 1, 1.4));
}

function renderUpgrades() {
    const list = document.getElementById('upgradeList');
    const upgs = UPGRADES[currentTab];
    list.innerHTML = upgs.map(upg => {
        const lvl  = player.upgrades[upg.id] || 0;
        const cost = upgradeCost(upg);
        const maxed = lvl >= upg.maxLevel;
        const canAfford = player.gold >= cost && !maxed;

        let btnClass = 'upg-btn';
        let btnText  = `🪙 ${cost}`;
        if (maxed) { btnClass += ' maxed'; btnText = 'MAX ✅'; }
        else if (!canAfford) { btnClass += ' disabled'; }

        return `
            <div class="upgrade-card">
                <div class="upg-icon">${upg.icon}</div>
                <div class="upg-info">
                    <div class="upg-name">${upg.name}</div>
                    <div class="upg-desc">${upg.desc}</div>
                    <div class="upg-level">Lv ${lvl}/${upg.maxLevel}</div>
                </div>
                <button class="${btnClass}" onclick="buyUpgrade('${upg.id}')">${btnText}</button>
            </div>
        `;
    }).join('');
}

function buyUpgrade(id) {
    const allUpgs = [...UPGRADES.combat, ...UPGRADES.defense, ...UPGRADES.skills];
    const upg = allUpgs.find(u => u.id === id);
    if (!upg) return;

    const lvl  = player.upgrades[id] || 0;
    const cost = upgradeCost(upg);
    if (player.gold < cost || lvl >= upg.maxLevel) return;

    // خصم الـ Gold
    player.gold -= cost;
    player.upgrades[id] = lvl + 1;

    // تطبيق التحسين على player مباشرة
    if (id === 'dmg')    player.damage   += upg.perLevel;
    if (id === 'hp')     player.maxHp    += upg.perLevel;
    if (id === 'aspd')   player.atkSpd   += upg.perLevel;
    if (id === 'block')  player.blockPow += upg.perLevel;
    if (id === 'dodge')  player.speed    += upg.perLevel;
    if (id === 'sword')  player.swordMastery += upg.perLevel;
    if (id === 'crit')   player.crit     += upg.perLevel;

    // حفظ فوري في الـ shared storage
    character.gold        = player.gold;
    character.upgrades    = player.upgrades;
    character.damage      = player.damage;
    character.maxHp       = player.maxHp;
    character.atkSpd      = player.atkSpd;
    character.speed       = player.speed;
    character.blockPow    = player.blockPow;
    character.swordMastery= player.swordMastery;
    character.crit        = player.crit;
    localStorage.setItem('game_character', JSON.stringify(character));

    updatePlayerUI();
    renderUpgrades();
}

    friction:0.82, airFriction:0.95,
};

// ========== نظام الجسيمات ==========
function spawnHitParticles(x, y, color, type='hit') {
    const count = type==='block'?6:type==='heavy'?20:12;
    for(let i=0;i<count;i++){
        const angle=(Math.PI*2/count)*i+Math.random()*0.5;
        const speed=type==='heavy'?(3+Math.random()*5):(1.5+Math.random()*3);
        particles.push({
            x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,
            size:type==='heavy'?(3+Math.random()*4):(1.5+Math.random()*2.5),
            alpha:1,color:type==='block'?'#3498db':type==='heavy'?'#e74c3c':type==='sparks'?'#f1c40f':color,
            gravity:type==='block'?0:0.15,life:type==='block'?0.04:0.03,type,
            rotation:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.2
        });
    }
    if(type==='hit'||type==='heavy'){
        for(let i=0;i<(type==='heavy'?8:4);i++){
            particles.push({
                x:x+(Math.random()-0.5)*20,y:y+(Math.random()-0.5)*10,
                vx:(Math.random()-0.5)*3,vy:-Math.random()*3,
                size:2+Math.random()*3,alpha:0.9,color:'#e74c3c',
                gravity:0.25,life:0.025,type:'blood',rotation:0,rotSpeed:0
            });
        }
    }
}

function spawnLandingDust(x) {
    for(let i=0;i<8;i++){
        const side=i<4?-1:1;
        particles.push({
            x:x+side*(5+Math.random()*15),y:CONFIG.groundY,
            vx:side*(0.5+Math.random()*2),vy:-(0.5+Math.random()*1.5),
            size:4+Math.random()*6,alpha:0.6,color:'#7f8c8d',
            gravity:0.05,life:0.02,type:'dust',rotation:0,rotSpeed:0.1
        });
    }
}

function spawnComboEffect(x,y,combo){
    if(combo<3)return;
    const colors=['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db'];
    const color=colors[Math.min(combo-3,colors.length-1)];
    for(let i=0;i<combo*2;i++){
        const angle=(Math.PI*2/(combo*2))*i;
        particles.push({
            x,y:y-30,vx:Math.cos(angle)*(2+combo*0.3),vy:Math.sin(angle)*(2+combo*0.3)-1,
            size:2+combo*0.3,alpha:1,color,gravity:0.05,life:0.018,
            type:'combo',rotation:0,rotSpeed:0.15
        });
    }
}

function updateAndDrawParticles(ctx){
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity;
        p.vx*=0.96; p.alpha-=p.life; p.rotation+=p.rotSpeed;
        if(p.alpha<=0){particles.splice(i,1);continue;}
        ctx.save(); ctx.globalAlpha=p.alpha;
        ctx.translate(p.x,p.y); ctx.rotate(p.rotation);
        if(p.type==='dust'){
            ctx.fillStyle=p.color; ctx.beginPath();
            ctx.ellipse(0,0,p.size*1.5,p.size*0.6,0,0,Math.PI*2); ctx.fill();
        } else if(p.type==='blood'){
            ctx.fillStyle=p.color; ctx.beginPath();
            ctx.arc(0,0,p.size*0.5,0,Math.PI*2); ctx.fill();
        } else if(p.type==='block'){
            ctx.strokeStyle=p.color; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(0,0,p.size*2,0,Math.PI*2); ctx.stroke();
        } else {
            ctx.shadowColor=p.color; ctx.shadowBlur=p.size*2;
            ctx.fillStyle=p.color; ctx.beginPath();
            ctx.arc(0,0,p.size*0.6,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }
}

const ScreenShake = {
    intensity:0, duration:0,
    trigger(i,d){ this.intensity=Math.max(this.intensity,i); this.duration=Math.max(this.duration,d); },
    update(){ if(this.duration>0)this.duration--; else this.intensity*=0.85; },
    apply(ctx){ if(this.intensity<0.5)return; ctx.translate((Math.random()-0.5)*this.intensity,(Math.random()-0.5)*this.intensity); }
};

const ScreenFlash = {
    alpha:0, color:'#f1c40f',
    trigger(color='#f1c40f',alpha=0.25){ this.color=color; this.alpha=alpha; },
    draw(ctx){
        if(this.alpha<=0.01)return;
        ctx.save(); ctx.globalAlpha=this.alpha;
        ctx.fillStyle=this.color; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.restore(); this.alpha*=0.82;
    }
};

const AudioManager = {
    baseURL: 'https://midopure883.github.io/Game/',
    cache: {}, muted: false,
    preload() {
        ['punch','hit','jump','block','win','lose','fight'].forEach(n => {
            const a = new Audio(this.baseURL + n + '.mp3');
            a.volume = 0.4; a.load(); this.cache[n] = a;
        });
    },
    play(name) {
        if (this.muted) return;
        try { const a = this.cache[name]; if(a){a.currentTime=0;a.play().catch(()=>{});} } catch(e){}
    }
};

class Fighter {
    constructor(x, color, isPlayer, maxHp, dmg, hasSword=false) {
        this.x=x; this.y=CONFIG.groundY; this.vx=0; this.vy=0;
        this.color=color; this.health=maxHp; this.maxHealth=maxHp;
        this.damage=dmg; this.isGrounded=true;
        this.facing=isPlayer?1:-1;
        this.isAttacking=false; this.isBlocking=false;
        this.lastAttackTime=0; this.stunned=0;
        this.invincible=false; this.invincibleEnd=0;
        this.isPlayer=isPlayer; this.blockStamina=100;
        this.combo=0; this.lastHitTime=0;
        this.hasSword=hasSword; this.landingSquish=0;
    }
    update() {
        if(this.stunned>0){this.stunned--;return;}
        if(this.invincible&&Date.now()>this.invincibleEnd)this.invincible=false;
        if(!this.isBlocking&&this.blockStamina<100)
            this.blockStamina=Math.min(100,this.blockStamina+0.5);
        const wasGrounded=this.isGrounded;
        this.vy+=CONFIG.gravity; this.y+=this.vy;
        if(this.y>=CONFIG.groundY){
        if(!wasGrounded&&this.vy>3){ this.landingSquish=8; spawnLandingDust(this.x); }
            this.y=CONFIG.groundY; this.vy=0; this.isGrounded=true;
            if(!this.isPlayer)this.vx*=CONFIG.friction;
            else if(!keys.left&&!keys.right)this.vx*=CONFIG.friction;
        }else{this.isGrounded=false;this.vx*=CONFIG.airFriction;}
        if(this.landingSquish>0)this.landingSquish-=1.2;
        this.x+=this.vx;
        this.x=Math.max(40,Math.min(canvas.width-40,this.x));
    }
    takeDamage(amount,attacker){
        if(this.invincible||this.health<=0)return false;
        let dmg=amount,kb=5.5;
        if(this.isBlocking&&this.blockStamina>0){
            dmg=Math.floor(amount*(1-player.blockPow/100));
            this.blockStamina-=amount*2; kb=1.5;
            AudioManager.play('block');
            spawnHitParticles(this.x,this.y-33,'#3498db','block');
            ScreenShake.trigger(3,4);
        }else{
            AudioManager.play('hit');
            const heavy=dmg>20;
            spawnHitParticles(this.x,this.y-30,this.color,heavy?'heavy':'hit');
            spawnHitParticles(this.x,this.y-30,'#f1c40f','sparks');
            ScreenShake.trigger(heavy?8:5,heavy?8:5);
        }
        this.health=Math.max(0,this.health-dmg);
        const dir=attacker.x<this.x?1:-1;
        this.vx=dir*kb; this.vy=-4;
        damageNumbers.push({x:this.x,y:this.y-60,vy:-2.5,alpha:1,
            text:`-${Math.round(dmg)}`,color:this.isPlayer?'#e74c3c':'#f1c40f',
            size:Math.min(28,16+dmg*0.3)});
        this.invincible=true; this.invincibleEnd=Date.now()+CONFIG.invincibilityDuration;
        if(attacker?.isPlayer){
            const now=Date.now();
            attacker.combo=(now-attacker.lastHitTime<900)?attacker.combo+1:1;
            attacker.lastHitTime=now;
            if(attacker.combo>=3){
                spawnComboEffect(this.x,this.y,attacker.combo);
                ScreenFlash.trigger(
                    attacker.combo>=7?'#e74c3c':attacker.combo>=5?'#e67e22':'#f1c40f',
                    Math.min(0.35,attacker.combo*0.05)
                );
                if(attacker.combo>=5)ScreenShake.trigger(attacker.combo,6);
            }
        }
        return true;
    }
    draw(ctx){
        ctx.save();
        const sq=this.landingSquish;
        ctx.translate(this.x,this.y); ctx.scale(1+sq*0.04,1-sq*0.04); ctx.translate(-this.x,-this.y);
        ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.lineJoin='round';
        ctx.strokeStyle=this.color;
        if(this.invincible&&Math.floor(Date.now()/80)%2)ctx.strokeStyle='rgba(255,255,255,0.9)';
        const t=Date.now(), moving=this.isGrounded&&Math.abs(this.vx)>0.5, airTime=!this.isGrounded;
        // ظل
        if(this.isGrounded){
            ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';
            ctx.beginPath();ctx.ellipse(this.x,CONFIG.groundY+4,14,4,0,0,Math.PI*2);
            ctx.fill();ctx.restore();
        }
        // bob للمشي
        const bodyBob=moving?Math.sin(t/120)*2:0;
        const bodyLean=moving?this.vx*0.8:0;
        // رأس
        ctx.save();
        ctx.translate(this.x+bodyLean*0.3,this.y-50+bodyBob*0.5);
        ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.facing*4,-2,2.5,0,Math.PI*2);ctx.fill();
        ctx.restore();
        // جسم
        ctx.beginPath();ctx.moveTo(this.x+bodyLean*0.2,this.y-40+bodyBob);ctx.lineTo(this.x,this.y-15);ctx.stroke();
        // ذراعين
        if(this.isAttacking){
            const ap=Math.sin(t/60)*0.5+0.5;
            ctx.beginPath();ctx.moveTo(this.x,this.y-33);ctx.lineTo(this.x+this.facing*(28+ap*6),this.y-30+ap*3);ctx.stroke();
            ctx.beginPath();ctx.moveTo(this.x,this.y-33);ctx.lineTo(this.x-this.facing*10,this.y-25);ctx.stroke();
            if(this.hasSword){
                ctx.save();ctx.lineWidth=3;ctx.strokeStyle='#e74c3c';ctx.shadowColor='#e74c3c';ctx.shadowBlur=12+ap*8;
                ctx.beginPath();ctx.moveTo(this.x+this.facing*32,this.y-28);ctx.lineTo(this.x+this.facing*62,this.y-20);ctx.stroke();
                ctx.strokeStyle='#f39c12';ctx.lineWidth=4;
                ctx.beginPath();ctx.moveTo(this.x+this.facing*28,this.y-36);ctx.lineTo(this.x+this.facing*28,this.y-20);ctx.stroke();
                ctx.restore();
            }
        }else if(this.isBlocking){
            ctx.beginPath();
            ctx.moveTo(this.x,this.y-33);ctx.lineTo(this.x+this.facing*10,this.y-40);
            ctx.moveTo(this.x,this.y-33);ctx.lineTo(this.x+this.facing*10,this.y-26);ctx.stroke();
            ctx.strokeStyle='#3498db';ctx.lineWidth=3;ctx.shadowColor='#3498db';ctx.shadowBlur=8;
            ctx.beginPath();ctx.arc(this.x+18*this.facing,this.y-33,16,0,Math.PI*2);ctx.stroke();
        }else{
            const swingAmt=moving?10:airTime?4:2, swingSpd=moving?150:300;
            const sw=Math.sin(t/swingSpd)*swingAmt;
            ctx.beginPath();
            ctx.moveTo(this.x+bodyLean*0.2,this.y-33+bodyBob);ctx.lineTo(this.x-15+sw,this.y-26+bodyBob*0.5);
            ctx.moveTo(this.x+bodyLean*0.2,this.y-33+bodyBob);ctx.lineTo(this.x+15-sw,this.y-26+bodyBob*0.5);ctx.stroke();
            if(this.hasSword){
                ctx.save();ctx.lineWidth=3;ctx.strokeStyle='#e74c3c';ctx.shadowColor='#e74c3c';ctx.shadowBlur=8;
                ctx.beginPath();ctx.moveTo(this.x+this.facing*16,this.y-26);ctx.lineTo(this.x+this.facing*40,this.y-48);ctx.stroke();
                ctx.strokeStyle='#f39c12';ctx.lineWidth=4;
                ctx.beginPath();ctx.moveTo(this.x+this.facing*12,this.y-20);ctx.lineTo(this.x+this.facing*18,this.y-30);ctx.stroke();
                ctx.restore();
            }
        }
        // أرجل
        if(airTime){
            ctx.beginPath();ctx.moveTo(this.x,this.y-15);ctx.lineTo(this.x-12,this.y+8);
            ctx.moveTo(this.x,this.y-15);ctx.lineTo(this.x+12,this.y+8);ctx.stroke();
        }else{
            const lgAmt=moving?12:0, lgSpd=moving?130:250;
            const lg=Math.sin(t/lgSpd)*lgAmt;
            ctx.beginPath();ctx.moveTo(this.x,this.y-15);ctx.lineTo(this.x-10+lg,this.y);
            ctx.moveTo(this.x,this.y-15);ctx.lineTo(this.x+10-lg,this.y);ctx.stroke();
        }
        ctx.restore();
    }
}

let gameActive=false, gameTimer=0, timerInterval=null;

function startStage(worldIdx, stageIdx) {
    currentWorld = WORLDS[worldIdx];
    currentStage = currentWorld.stages[stageIdx];

    if (currentStage.id > player.unlockedStage) return;

    // إعداد الكانفاس
    const gs = document.getElementById('gameScreen');
    gs.style.display = 'block';
    gs.style.height  = window.innerHeight + 'px';

    requestAnimationFrame(() => {
        canvas = document.getElementById('gameCanvas');
        ctx    = canvas.getContext('2d');
        canvas.width  = canvas.clientWidth  || window.innerWidth;
        canvas.height = canvas.clientHeight || window.innerHeight;
        CONFIG.groundY = canvas.height - 55;

        // خلفية الحلبة
        document.getElementById('arenaDiv').style.background =
            `linear-gradient(180deg,${currentWorld.bg[0]} 0%,${currentWorld.bg[1]} 70%,${currentWorld.bg[2]} 100%)`;

        // إنشاء المقاتلين
        const pColor = {'red':'#e74c3c','blue':'#3498db','green':'#2ecc71',
                        'yellow':'#f1c40f','white':'#ecf0f1','black':'#2c3e50'}[player.selectedColor||'green']||'#2ecc71';
        p1 = new Fighter(canvas.width*0.18, pColor, true, player.maxHp, player.damage, false);
        p2 = new Fighter(canvas.width*0.82, getEnemyColor(currentStage.type), false,
                         currentStage.enemyHp, currentStage.enemyDmg, currentStage.hasSword||false);
        p2.aiLevel = getAILevel(currentStage);

        // HUD
        document.getElementById('p1HealthBar').style.width='100%';
        document.getElementById('p2HealthBar').style.width='100%';
        document.getElementById('timerBar').style.width='100%';
        document.getElementById('enemyLabel').textContent=currentStage.name;
        document.getElementById('comboDisplay').innerHTML='<span>⚡</span> 0';
        document.getElementById('gameMessage').innerHTML='';
        damageNumbers.length=0;
        particles.length=0;
        ScreenShake.intensity=0; ScreenShake.duration=0;
        ScreenFlash.alpha=0;

        // شاشة البداية
        const ready=document.getElementById('readyScreen');
        AudioManager.play('fight');
        ready.style.display='flex'; ready.textContent=currentStage.name;
        setTimeout(()=>{ready.textContent='FIGHT!';},1500);
        setTimeout(()=>{
            ready.style.display='none';
            gameActive=true;
            startGameTimer();
            if(animFrameId)cancelAnimationFrame(animFrameId);
            animFrameId=requestAnimationFrame(gameLoop);
        },2500);
    });
}

function getEnemyColor(type){
    if(type==='boss')    return '#e74c3c';
    if(type==='miniboss')return '#e67e22';
    const cols=['#bdc3c7','#2ecc71','#3498db','#9b59b6','#1abc9c','#f1c40f'];
    return cols[Math.floor(Math.random()*cols.length)];
}

function getAILevel(stage){
    const id=stage.id;
    if(stage.type==='boss')    return {atk:0.065,blk:0.72,jmp:0.016,spd:1.0};
    if(stage.type==='miniboss')return {atk:0.055,blk:0.60,jmp:0.014,spd:0.95};
    if(id<=2)  return {atk:0.020,blk:0.00,jmp:0.003,spd:0.55};
    if(id<=4)  return {atk:0.032,blk:0.18,jmp:0.007,spd:0.70};
    if(id<=6)  return {atk:0.042,blk:0.35,jmp:0.010,spd:0.80};
    if(id<=8)  return {atk:0.052,blk:0.50,jmp:0.013,spd:0.88};
    return          {atk:0.060,blk:0.65,jmp:0.015,spd:0.95};
}

function startGameTimer(){
    if(timerInterval)clearInterval(timerInterval);
    gameTimer=CONFIG.roundTime;
    timerInterval=setInterval(()=>{
        if(!gameActive)return;
        gameTimer--;
        document.getElementById('timerBar').style.width=(gameTimer/CONFIG.roundTime*100)+'%';
        if(gameTimer<=0)endBattle(p1.health>p2.health);
    },1000);
}

function updateEnemyAI(){
    if(!gameActive||p2.stunned>0)return;
    const ai=p2.aiLevel, dist=Math.abs(p1.x-p2.x), dx=p1.x-p2.x, now=Date.now();
    p2.facing=dx>0?1:-1;
    p2.isBlocking=p1.isAttacking&&dist<65&&Math.random()<ai.blk;
    if(!p2.isBlocking){
        if(dist>60)     p2.vx=(dx>0?1:-1)*4.5*ai.spd;
        else if(dist<35)p2.vx=(dx>0?-1:1)*4.5*0.4;
        else            p2.vx*=0.7;
    }
    const swordRange=p2.hasSword?30:0;
    if(!p2.isBlocking&&dist<60+swordRange&&now-p2.lastAttackTime>CONFIG.attackCooldown&&Math.random()<ai.atk){
        p2.isAttacking=true; p2.lastAttackTime=now;
        AudioManager.play('punch');
        setTimeout(()=>{p2.isAttacking=false;},CONFIG.attackDuration);
    }
    if(p2.isGrounded&&Math.random()<ai.jmp){
        p2.vy=CONFIG.jumpForce; AudioManager.play('jump');
    }
}

function checkBattleAttacks(){
    const dist=Math.abs(p1.x-p2.x);
    const swordRange=p2.hasSword?30:0;
    // ضربة اللاعب
    if(p1.isAttacking&&dist<CONFIG.hitRange&&!p2.invincible){
        let dmg=p1.damage;
        // crit
        if(player.crit&&Math.random()<player.crit/100)dmg*=2;
        if(p2.takeDamage(dmg,p1)&&p2.health<=0)endBattle(true);
        p1.isAttacking=false;
    }
    // ضربة AI
    if(p2.isAttacking&&dist<CONFIG.hitRange+swordRange&&!p1.invincible){
        if(p1.takeDamage(p2.damage,p2)&&p1.health<=0)endBattle(false);
        p2.isAttacking=false;
    }
}

function gameLoop(){
    if(!gameActive){animFrameId=null;return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);

    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,CONFIG.groundY+2,canvas.width,canvas.height-CONFIG.groundY);
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,CONFIG.groundY+2);ctx.lineTo(canvas.width,CONFIG.groundY+2);ctx.stroke();

    if(p1.stunned<=0){
        if(keys.left){p1.vx=-4.5*(player.speed/100);p1.facing=-1;}
        else if(keys.right){p1.vx=4.5*(player.speed/100);p1.facing=1;}
    }

    p1.update(); updateEnemyAI(); p2.update(); checkBattleAttacks();

    updateAndDrawParticles(ctx);
    p1.draw(ctx); p2.draw(ctx);

    // damage numbers
    for(let i=damageNumbers.length-1;i>=0;i--){
        const d=damageNumbers[i];
        d.y+=d.vy; d.vy*=0.92; d.alpha-=0.022;
        if(d.alpha<=0){damageNumbers.splice(i,1);continue;}
        ctx.save();ctx.globalAlpha=d.alpha;
        ctx.font=`bold ${d.size}px 'Segoe UI',sans-serif`;
        ctx.fillStyle=d.color;ctx.strokeStyle='rgba(0,0,0,0.8)';
        ctx.lineWidth=3;ctx.textAlign='center';
        ctx.strokeText(d.text,d.x,d.y);ctx.fillText(d.text,d.x,d.y);
        ctx.restore();
    }

    ctx.restore();
    ScreenFlash.draw(ctx);

    document.getElementById('p1HealthBar').style.width=(p1.health/p1.maxHealth*100)+'%';
    document.getElementById('p2HealthBar').style.width=(p2.health/p2.maxHealth*100)+'%';
    document.getElementById('comboDisplay').innerHTML=`<span>⚡</span> ${p1.combo}`;
    animFrameId=requestAnimationFrame(gameLoop);
}

function endBattle(playerWon){
    if(!gameActive)return;
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}

    const res=document.getElementById('battleResult');
    const title=document.getElementById('resultTitle');
    const rewards=document.getElementById('resultRewards');
    const btns=document.getElementById('resultBtns');

    if(playerWon){
        AudioManager.play('win');
        title.textContent='🏆 انتصرت!';
        title.style.color='#2ecc71';

        const xpGain=currentStage.xpGain;
        const goldGain=currentStage.goldGain;
        player.gold+=goldGain;

        // فتح المرحلة التالية
        if(currentStage.id>=player.unlockedStage){
            player.unlockedStage=currentStage.id+1;
        }
        savePlayer();
        addXP(xpGain);

        rewards.innerHTML=`
            <div class="reward-pill xp-gain">✨ +${xpGain} XP</div>
            <div class="reward-pill gold-gain">🪙 +${goldGain} Gold</div>
        `;
        btns.innerHTML=`
            <button class="res-btn btn-continue" onclick="closeBattleResult()">التالي ⬅️</button>
            <button class="res-btn btn-map" onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }else{
        AudioManager.play('lose');
        title.textContent='💀 خسرت!';
        title.style.color='#e74c3c';
        rewards.innerHTML='<div class="reward-pill" style="color:#e74c3c;">حاول مرة أخرى!</div>';
        btns.innerHTML=`
            <button class="res-btn btn-retry" onclick="retryStage()">🔄 إعادة</button>
            <button class="res-btn btn-map"   onclick="closeBattleResult()">🗺️ الخريطة</button>
        `;
    }
    res.style.display='flex';
}

function closeBattleResult(){
    document.getElementById('battleResult').style.display='none';
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

function retryStage(){
    document.getElementById('battleResult').style.display='none';
    const wIdx=WORLDS.findIndex(w=>w.stages.includes(currentStage));
    const sIdx=WORLDS[wIdx].stages.indexOf(currentStage);
    startStage(wIdx,sIdx);
}

function retreatFromBattle(){
    gameActive=false;
    clearInterval(timerInterval);
    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
    document.getElementById('gameScreen').style.display='none';
    showMap();
}

// ===================================================
// ========== التحكم ==========
// ===================================================
function setupControls(){
    const bind=(id,onS,onE)=>{
        const el=document.getElementById(id);
        if(!el)return;
        const s=e=>{e.preventDefault();onS();};
        const e=ev=>{ev.preventDefault();if(onE)onE();};
        el.addEventListener('touchstart',s,{passive:false});
        el.addEventListener('touchend',e,{passive:false});
        el.addEventListener('touchcancel',e,{passive:false});
        el.addEventListener('mousedown',s);
        el.addEventListener('mouseup',e);
        el.addEventListener('mouseleave',e);
    };

    const jBase=document.getElementById('joystickBase');
    const jKnob=document.getElementById('joystickKnob');
    const maxR=32;
    function jC(){const r=jBase.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
    function moveJ(cx,cy){
        const c=jC();let dx=cx-c.x,dy=cy-c.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
        jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
        keys.left=dx<-8;keys.right=dx>8;
    }
    function resetJ(){jKnob.style.transform='translate(-50%,-50%)';keys.left=keys.right=false;}

    jBase.addEventListener('touchstart',e=>{e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchmove', e=>{e.preventDefault();moveJ(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    jBase.addEventListener('touchend',  e=>{e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('touchcancel',e=>{e.preventDefault();resetJ();},{passive:false});
    jBase.addEventListener('mousedown',e=>moveJ(e.clientX,e.clientY));
    jBase.addEventListener('mousemove',e=>{if(e.buttons===1)moveJ(e.clientX,e.clientY);});
    jBase.addEventListener('mouseup',resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    bind('btnJump',()=>{if(p1&&p1.isGrounded&&gameActive){p1.vy=CONFIG.jumpForce;AudioManager.play('jump');}});
    bind('btnAttack',()=>{
        if(!p1||!gameActive||p1.stunned>0)return;
        const now=Date.now();
        const cd=CONFIG.attackCooldown*(1-player.atkSpd/100);
        if(now-p1.lastAttackTime>cd){
            p1.isAttacking=true;p1.lastAttackTime=now;
            AudioManager.play('punch');
            setTimeout(()=>{p1.isAttacking=false;},CONFIG.attackDuration);
        }
    });
    bind('btnBlock',()=>{if(p1&&gameActive&&p1.blockStamina>0)p1.isBlocking=true;},
                   ()=>{if(p1)p1.isBlocking=false;});
}

// ========== التنقل بين الشاشات ==========
// ===================================================
function showMap(){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('mapScreen').classList.add('active');
    buildStageMap();
    updatePlayerUI();
}

function showUpgrades(){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('upgradeScreen').classList.add('active');
    updatePlayerUI();
    renderUpgrades();
}

function goBackToMain(){
    window.location.href='index.html';
}

// ===================================================
// ========== التحميل ==========
// ===================================================
window.onload=()=>{
    function fixVP(){
        const gs=document.getElementById('gameScreen');
        if(gs)gs.style.height=window.innerHeight+'px';
    }
    fixVP();
    window.addEventListener('resize',fixVP);
    window.addEventListener('orientationchange',()=>setTimeout(fixVP,300));

    AudioManager.preload();
    setupControls();
    // منع التمرير فقط أثناء اللعب
    document.getElementById('gameScreen').addEventListener('touchmove', e=>e.preventDefault(), {passive:false});

    function checkOri(){
        const portrait = window.innerHeight > window.innerWidth;
        const gameOn   = document.getElementById('gameScreen').style.display === 'block';
        const rot      = document.getElementById('rotateScreen');
        if (gameOn) { rot.style.display = 'none'; return; }
        rot.style.display = portrait ? 'flex' : 'none';
    }
    window.addEventListener('resize',checkOri);
    window.addEventListener('orientationchange',()=>setTimeout(checkOri,300));
    checkOri();

    showMap();
};
