<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ معركة العصا V2.2 | النسخة الكاملة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0c0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; padding: 10px; overflow: hidden; }
        .game-wrapper { background: linear-gradient(145deg, #1a1e24, #0f1217); border-radius: 48px; padding: 20px; box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8); width: 100%; max-width: 600px; position: relative; }
        .version-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #f1c40f, #e67e22); color: #000; padding: 5px 15px; border-radius: 30px; font-weight: bold; font-size: 14px; z-index: 100; }
        
        .main-menu { display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; min-height: 500px; }
        .game-title { font-size: 3rem; font-weight: 900; background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .menu-btn { background: linear-gradient(145deg, #2c3e50, #1a2632); border: 2px solid #4a5568; color: white; font-size: 1.5rem; padding: 15px 40px; border-radius: 60px; width: 80%; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 0 #0f1419; border: none; }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #0f1419; }
        
        .character-select-screen, .stats-screen { display: none; flex-direction: column; gap: 20px; min-height: 500px; padding: 20px; color: white; text-align: center; }
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .color-option { aspect-ratio: 1; border-radius: 20px; border: 4px solid #4a5568; cursor: pointer; transition: 0.2s; }
        .color-option.selected { border-color: #f1c40f; transform: scale(1.1); box-shadow: 0 0 20px #f1c40f; }
        .color-red { background: #e74c3c; } .color-blue { background: #3498db; } .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; } .color-white { background: #ecf0f1; } .color-black { background: #2c3e50; }
        
        .game-screen { display: none; }
        .arena { position: relative; width: 100%; height: 300px; border-radius: 32px; overflow: hidden; background: #1b232f; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .ready-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:200; border-radius:32px; color:#f1c40f; font-size:4rem; font-weight:900; text-shadow:0 0 20px #e67e22; }
        
        .game-ui { margin-top: 15px; display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.4); padding: 12px 15px; border-radius: 50px; backdrop-filter: blur(5px); }
        .health-container { flex: 1; display: flex; align-items: center; gap: 8px; }
        .health-container span { color: white; font-weight: bold; font-size: 14px; }
        .health-bar { flex: 1; height: 15px; background: #2a2f3a; border-radius: 10px; overflow: hidden; }
        .health-fill { height: 100%; width: 100%; transition: width 0.2s ease; }
        
        .timer-bar { height: 8px; background: #2a2f3a; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c); transition: width 1s linear; }
        
        .combo-counter { background: linear-gradient(135deg, #9b59b6, #8e44ad); padding: 8px 20px; border-radius: 40px; color: white; font-weight: bold; font-size: 1.2rem; text-align: center; margin: 15px 0; box-shadow: 0 0 15px rgba(155,89,182,0.5); }
        .combo-counter span { font-size: 1.8rem; margin-right: 5px; color: #f1c40f; }
        
        .controls-area { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .joystick-area { grid-column: span 2; display: flex; gap: 5px; }
        .control-btn, .joystick { background: #2c3e50; border: 1px solid #4a5568; color: white; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #1a262f; transition: 0.05s linear; }
        .control-btn:active, .joystick:active { transform: translateY(4px); box-shadow: 0 0 0 #1a262f; }
        .attack-btn { background: #c0392b; } .jump-btn { background: #f39c12; } .block-btn { background: #2980b9; }
        
        .power-meter { display: flex; align-items: center; gap: 10px; margin-top: 10px; color: #f1c40f; }
        .power-bar { flex: 1; height: 15px; background: #2a2f3a; border-radius: 10px; overflow: hidden; }
        .power-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c); transition: width 0.1s; }
        
        .sound-controls { display: flex; gap: 10px; margin: 10px 0; }
        .sound-btn { background: rgba(255,255,255,0.1); border: 1px solid #4a5568; color: white; padding: 8px 15px; border-radius: 30px; cursor: pointer; flex: 1; }
        .sound-btn:active { background: #27ae60; }
        
        .game-message { text-align: center; color: #f1c40f; margin: 10px 0; font-weight: bold; min-height: 24px; }
        
        @media (max-width: 450px) { 
            .controls-area { grid-template-columns: repeat(3, 1fr); } 
            .joystick-area { grid-column: span 3; } 
            .game-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="version-badge">⚡ V2.2 ULTIMATE</div>

        <div class="main-menu" id="mainMenu">
            <div class="game-title">⚡ معركة العصا</div>
            <button class="menu-btn" onclick="startNewGame()">🆕 بدء قتال جديد</button>
            <button class="menu-btn" onclick="showStats()">📊 الإحصائيات</button>
            <button class="menu-btn" onclick="showCharacterSelect()">🎨 تخصيص البطل</button>
        </div>

        <div class="character-select-screen" id="characterSelect">
            <h2>🎨 اختر لون مقاتلك</h2>
            <div class="color-grid">
                <div class="color-option color-red" onclick="selectColor('red')" id="colorRed"></div>
                <div class="color-option color-blue" onclick="selectColor('blue')" id="colorBlue"></div>
                <div class="color-option color-green" onclick="selectColor('green')" id="colorGreen"></div>
                <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
                <div class="color-option color-white" onclick="selectColor('white')" id="colorWhite"></div>
                <div class="color-option color-black" onclick="selectColor('black')" id="colorBlack"></div>
            </div>
            <button class="menu-btn" onclick="backToMain()">🔙 عودة</button>
        </div>

        <div class="stats-screen" id="statsScreen">
            <h2>📊 سجلك القتالي</h2>
            <div style="font-size: 2rem; margin: 30px 0;" id="statsDisplay"></div>
            <button class="menu-btn" onclick="backToMain()">🔙 عودة</button>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="arena">
                <canvas id="gameCanvas"></canvas>
                <div class="ready-screen" id="readyScreen">READY?</div>
            </div>

            <div class="game-ui">
                <div class="health-container">
                    <span style="color: #e74c3c;">أنت</span>
                    <div class="health-bar"><div class="health-fill" id="p1HealthBar" style="background:#e74c3c; width:100%"></div></div>
                </div>
                <div style="color:#f1c40f; font-weight:bold; font-size:1.2rem;">VS</div>
                <div class="health-container">
                    <div class="health-bar"><div class="health-fill" id="p2HealthBar" style="background:#3498db; width:100%"></div></div>
                    <span style="color: #3498db;">AI</span>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerBar" style="width:100%"></div>
            </div>

            <div class="combo-counter" id="comboDisplay">
                <span>⚡</span> 0
            </div>

            <div class="power-meter">
                <span>💪 قوة الهجوم</span>
                <div class="power-bar"><div class="power-fill" id="powerMeter"></div></div>
            </div>

            <div class="controls-area">
                <div class="joystick-area">
                    <div class="joystick" id="btnLeft">←</div>
                    <div class="joystick" id="btnRight">→</div>
                </div>
                <div class="control-btn jump-btn" id="btnJump">⬆️ قفز</div>
                <div class="control-btn attack-btn" id="btnAttack">👊 هجوم</div>
                <div class="control-btn block-btn" id="btnBlock">🛡️ تصدي</div>
            </div>

            <div class="sound-controls">
                <button class="sound-btn" id="muteBtn">🔊 تشغيل الصوت</button>
                <button class="sound-btn" id="rematchBtn">🔄 لعب مجدداً</button>
            </div>

            <div class="game-message" id="gameMessage"></div>
            <button class="menu-btn" style="width:100%; margin-top:5px;" onclick="backToMainFromGame()">🏠 العودة للقائمة</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            gravity: 0.6,
            groundY: 250,
            playerSpeed: 4,
            jumpForce: -12,
            hitRange: 45,
            baseDamage: 12,
            attackCooldown: 350,
            attackDuration: 150,
            invincibilityDuration: 500,
            roundTime: 60,
            blockReduction: 0.5,
            maxPower: 100,
            powerChargeRate: 0.8,
            comboWindow: 800
        };

        const Stats = {
            wins: parseInt(localStorage.getItem('v2_wins')) || 0,
            losses: parseInt(localStorage.getItem('v2_losses')) || 0,
            addWin() { this.wins++; this.save(); },
            addLoss() { this.losses++; this.save(); },
            save() {
                localStorage.setItem('v2_wins', this.wins);
                localStorage.setItem('v2_losses', this.losses);
            },
            getWinRate() {
                const total = this.wins + this.losses;
                return total === 0 ? 0 : Math.round((this.wins / total) * 100);
            }
        };

        const COLORS = {
            red: '#e74c3c', blue: '#3498db', green: '#2ecc71',
            yellow: '#f1c40f', white: '#ecf0f1', black: '#2c3e50'
        };

        const GameState = {
            active: false,
            p1Color: 'red',
            p2Color: 'blue',
            timeLeft: CONFIG.roundTime,
            timerInterval: null,
            powerCharge: 0,
            mouseDown: false
        };

        // AudioManager يشغل الأصوات من GitHub مباشرة
        const AudioManager = {
            muted: false,
            baseURL: 'https://raw.githubusercontent.com/MidoPure883/Game/main/',
            cache: {},

            // تحميل مسبق لكل الأصوات عشان تشتغل بسرعة
            preload() {
                const files = ['punch', 'hit', 'jump', 'block', 'win', 'lose', 'fight'];
                files.forEach(name => {
                    const audio = new Audio(this.baseURL + name + '.mp3');
                    audio.volume = 0.4;
                    audio.load();
                    this.cache[name] = audio;
                });
            },

            play(name) {
                if (this.muted) return;
                try {
                    const cached = this.cache[name];
                    if (cached) {
                        // لو الصوت بيشتغل، ابدأه من الأول
                        cached.currentTime = 0;
                        cached.play().catch(() => {});
                    }
                } catch(e) {}
            },

            toggle() {
                this.muted = !this.muted;
                document.getElementById('muteBtn').innerHTML =
                    this.muted ? '🔇 كتم الصوت' : '🔊 تشغيل الصوت';
            }
        };



        class Fighter {
            constructor(x, color, isPlayer) {
                this.x = x;
                this.y = CONFIG.groundY;
                this.startX = x;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.health = 100;
                this.maxHealth = 100;
                this.isGrounded = true;
                this.facing = isPlayer ? 1 : -1;
                this.isAttacking = false;
                this.isBlocking = false;
                this.lastAttackTime = 0;
                this.stunned = 0;
                this.invincible = false;
                this.invincibleEnd = 0;
                this.isPlayer = isPlayer;
                this.blockStamina = 100;
                this.combo = 0;
                this.lastHitTime = 0;
            }

            update() {
                if (this.stunned > 0) { this.stunned--; return; }

                if (this.invincible && Date.now() > this.invincibleEnd) {
                    this.invincible = false;
                }

                if (!this.isBlocking && this.blockStamina < 100) {
                    this.blockStamina = Math.min(100, this.blockStamina + 0.5);
                }

                this.y += this.vy;
                this.vy += CONFIG.gravity;

                if (this.y >= CONFIG.groundY) {
                    this.y = CONFIG.groundY;
                    this.vy = 0;
                    this.isGrounded = true;
                } else {
                    this.isGrounded = false;
                }

                this.x += this.vx;

                const canvas = document.getElementById('gameCanvas');
                const minX = 40;
                const maxX = canvas.width - 40;
                this.x = Math.max(minX, Math.min(maxX, this.x));
            }

            takeDamage(amount, attacker) {
                if (this.invincible || this.health <= 0) return false;

                AudioManager.play('hit');

                let finalDamage = amount;
                let knockback = 5;

                if (this.isBlocking && this.blockStamina > 0) {
                    finalDamage = Math.floor(amount * CONFIG.blockReduction);
                    this.blockStamina -= amount * 2;
                    knockback = 2;
                    AudioManager.play('block');
                }

                this.health = Math.max(0, this.health - finalDamage);

                const direction = attacker.x < this.x ? 1 : -1;
                this.vx = direction * knockback;
                this.vy = -3;

                this.invincible = true;
                this.invincibleEnd = Date.now() + CONFIG.invincibilityDuration;

                if (attacker && attacker.isPlayer) {
                    const now = Date.now();
                    if (now - attacker.lastHitTime < CONFIG.comboWindow) {
                        attacker.combo++;
                    } else {
                        attacker.combo = 1;
                    }
                    attacker.lastHitTime = now;
                }

                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = this.color;

                if (this.invincible && Math.floor(Date.now()/100)%2) {
                    ctx.strokeStyle = 'white';
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y - 50, 10, 0, Math.PI*2);
                ctx.stroke();

                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x + (this.facing * 3), this.y - 52, 2, 0, Math.PI*2);
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 40);
                ctx.lineTo(this.x, this.y - 15);
                ctx.stroke();

                if (this.isAttacking) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - 35);
                    ctx.lineTo(this.x + (this.facing * 30), this.y - 30);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - 35);
                    ctx.lineTo(this.x - (this.facing * 10), this.y - 25);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y - 35);
                    ctx.lineTo(this.x - 15, this.y - 30);
                    ctx.moveTo(this.x, this.y - 35);
                    ctx.lineTo(this.x + 15, this.y - 30);
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 15);
                ctx.lineTo(this.x - 10, this.y);
                ctx.moveTo(this.x, this.y - 15);
                ctx.lineTo(this.x + 10, this.y);
                ctx.stroke();

                if (this.isBlocking && this.blockStamina > 0) {
                    ctx.strokeStyle = '#3498db';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + (15 * this.facing), this.y - 35, 15, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        let p1, p2;
        let keys = { left: false, right: false };
        // FIX 1 & 7: Replace boolean flag with a frame ID so we can cancel
        // the old loop before starting a new one, preventing stacked loops.
        let animFrameId = null;
        let canvas, ctx;

        function initGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            // FIX 5: Force canvas pixel dimensions from the layout dimensions,
            // which are only valid once the game screen is visible.
            canvas.width = canvas.clientWidth || 560;
            canvas.height = canvas.clientHeight || 300;

            CONFIG.groundY = canvas.height - 60;

            // FIX 2 & 6: Pick the AI color BEFORE creating fighters so the
            // fighter object is constructed with the correct color immediately.
            const colorKeys = Object.keys(COLORS);
            GameState.p2Color = colorKeys[Math.floor(Math.random() * colorKeys.length)];

            p1 = new Fighter(100, COLORS[GameState.p1Color], true);
            p2 = new Fighter(canvas.width - 100, COLORS[GameState.p2Color], false);

            GameState.active = false;
            GameState.timeLeft = CONFIG.roundTime;
            GameState.powerCharge = 0;
            p1.combo = 0;

            document.getElementById('p1HealthBar').style.width = '100%';
            document.getElementById('p2HealthBar').style.width = '100%';
            document.getElementById('timerBar').style.width = '100%';
            document.getElementById('powerMeter').style.width = '0%';
            document.getElementById('comboDisplay').innerHTML = '<span>⚡</span> 0';
            document.getElementById('gameMessage').innerHTML = '';
        }

        function checkAttacks() {
            const distance = Math.abs(p1.x - p2.x);

            if (p1.isAttacking && distance < CONFIG.hitRange && !p2.invincible) {
                const damage = CONFIG.baseDamage + (GameState.powerCharge * 0.2);
                if (p2.takeDamage(damage, p1)) {
                    GameState.powerCharge = 0;
                    if (p2.health <= 0) endGame(true);
                }
                p1.isAttacking = false;
            }

            if (p2.isAttacking && distance < CONFIG.hitRange && !p1.invincible) {
                if (p1.takeDamage(CONFIG.baseDamage, p2)) {
                    p1.combo = 0;
                    if (p1.health <= 0) endGame(false);
                }
                p2.isAttacking = false;
            }
        }

        function updateAI() {
            if (p2.stunned > 0 || !GameState.active) return;

            const distance = Math.abs(p1.x - p2.x);
            const dx = p1.x - p2.x;

            p2.facing = dx > 0 ? 1 : -1;

            if (p1.isAttacking && distance < 60 && Math.random() < 0.7) {
                p2.isBlocking = true;
            } else {
                p2.isBlocking = false;
            }

            if (distance > 50) {
                p2.vx = (dx > 0 ? 1 : -1) * CONFIG.playerSpeed * 0.6;
            } else if (distance < 30) {
                p2.vx = (dx > 0 ? -1 : 1) * CONFIG.playerSpeed * 0.3;
            } else {
                p2.vx = 0;
            }

            if (distance < 50 && Math.random() < 0.02 && Date.now() - p2.lastAttackTime > CONFIG.attackCooldown) {
                p2.isAttacking = true;
                p2.lastAttackTime = Date.now();
                AudioManager.play('punch');
                setTimeout(() => { p2.isAttacking = false; }, CONFIG.attackDuration);
            }

            if (p2.isGrounded && Math.random() < 0.005 && distance > 40) {
                p2.vy = CONFIG.jumpForce;
                AudioManager.play('jump');
            }
        }

        // FIX 7: gameLoop now self-cancels when inactive and will not stack.
        function gameLoop() {
            if (!GameState.active) {
                animFrameId = null;
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#2a3440';
            ctx.fillRect(0, CONFIG.groundY, canvas.width, canvas.height - CONFIG.groundY);

            if (p1.stunned <= 0) {
                if (keys.left) {
                    p1.vx = -CONFIG.playerSpeed;
                    // FIX 4: Always update facing when moving so attack arm
                    // points the correct direction even after stopping.
                    p1.facing = -1;
                } else if (keys.right) {
                    p1.vx = CONFIG.playerSpeed;
                    p1.facing = 1;
                } else {
                    p1.vx = 0;
                }
            }

            if (GameState.mouseDown && !p1.isAttacking) {
                GameState.powerCharge = Math.min(CONFIG.maxPower, GameState.powerCharge + CONFIG.powerChargeRate);
            } else {
                GameState.powerCharge = Math.max(0, GameState.powerCharge - 0.5);
            }

            p1.update();
            updateAI();
            p2.update();
            checkAttacks();

            p1.draw(ctx);
            p2.draw(ctx);

            document.getElementById('p1HealthBar').style.width = p1.health + '%';
            document.getElementById('p2HealthBar').style.width = p2.health + '%';
            document.getElementById('powerMeter').style.width = GameState.powerCharge + '%';
            document.getElementById('comboDisplay').innerHTML = `<span>⚡</span> ${p1.combo}`;

            animFrameId = requestAnimationFrame(gameLoop);
        }

        function startTimer() {
            if (GameState.timerInterval) clearInterval(GameState.timerInterval);

            GameState.timerInterval = setInterval(() => {
                if (!GameState.active) return;
                GameState.timeLeft--;
                const percent = (GameState.timeLeft / CONFIG.roundTime) * 100;
                document.getElementById('timerBar').style.width = percent + '%';
                if (GameState.timeLeft <= 0) endGame(p1.health > p2.health);
            }, 1000);
        }

        function endGame(playerWon) {
            if (!GameState.active) return;
            GameState.active = false;
            clearInterval(GameState.timerInterval);

            if (playerWon) {
                Stats.addWin();
                document.getElementById('gameMessage').innerHTML = '🏆 انتصرت في المعركة!';
                AudioManager.play('win');
            } else {
                Stats.addLoss();
                document.getElementById('gameMessage').innerHTML = '💀 سقطت في القتال..';
                AudioManager.play('lose');
            }
        }

        function startNewGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            // FIX 1 & 7: Cancel any running loop before initialising a fresh game.
            GameState.active = false;
            if (animFrameId !== null) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }

            // initGame now also picks the AI color (FIX 2 & 6).
            initGame();

            const readyScreen = document.getElementById('readyScreen');
            readyScreen.style.display = 'flex';
            readyScreen.innerHTML = 'READY?';
            AudioManager.play('fight');

            setTimeout(() => {
                readyScreen.innerHTML = 'FIGHT!';
                setTimeout(() => {
                    readyScreen.style.display = 'none';
                    GameState.active = true;
                    startTimer();
                    // FIX 1: No boolean guard needed — always safe to start here.
                    animFrameId = requestAnimationFrame(gameLoop);
                }, 800);
            }, 1000);
        }

        function rematch() { startNewGame(); }

        function backToMainFromGame() {
            GameState.active = false;
            clearInterval(GameState.timerInterval);
            if (animFrameId !== null) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
        }

        function setupControls() {
            const bind = (id, startCb, endCb) => {
                const el = document.getElementById(id);
                if (!el) return;
                const start = (e) => { e.preventDefault(); startCb(); };
                const end   = (e) => { e.preventDefault(); if (endCb) endCb(); };
                el.addEventListener('touchstart',  start, { passive: false });
                el.addEventListener('touchend',    end,   { passive: false });
                el.addEventListener('touchcancel', end,   { passive: false });
                el.addEventListener('mousedown', start);
                el.addEventListener('mouseup',   end);
                el.addEventListener('mouseleave',end);
            };

            bind('btnLeft',  () => keys.left  = true,  () => keys.left  = false);
            bind('btnRight', () => keys.right = true,  () => keys.right = false);

            bind('btnJump', () => {
                if (p1 && p1.isGrounded && GameState.active) {
                    p1.vy = CONFIG.jumpForce;
                    AudioManager.play('jump');
                }
            });

            bind('btnAttack', () => {
                if (!p1 || !GameState.active || p1.stunned > 0) return;
                const now = Date.now();
                if (now - p1.lastAttackTime > CONFIG.attackCooldown) {
                    p1.isAttacking = true;
                    p1.lastAttackTime = now;
                    GameState.mouseDown = true;
                    AudioManager.play('punch');
                    setTimeout(() => {
                        p1.isAttacking = false;
                        GameState.mouseDown = false;
                    }, CONFIG.attackDuration);
                }
            }, () => { GameState.mouseDown = false; });

            bind('btnBlock', () => {
                if (p1 && GameState.active && p1.blockStamina > 0) p1.isBlocking = true;
            }, () => {
                if (p1) p1.isBlocking = false;
            });
        }

        function selectColor(color) {
            GameState.p1Color = color;
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            const el = document.getElementById(`color${color.charAt(0).toUpperCase() + color.slice(1)}`);
            if (el) el.classList.add('selected');
            setTimeout(backToMain, 300);
        }

        function showCharacterSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'flex';
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            const cur = document.getElementById(`color${GameState.p1Color.charAt(0).toUpperCase() + GameState.p1Color.slice(1)}`);
            if (cur) cur.classList.add('selected');
        }

        function showStats() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'flex';
            document.getElementById('statsDisplay').innerHTML = `
                <div style="margin:20px 0;">🏆 الفوز: ${Stats.wins}</div>
                <div style="margin:20px 0;">💔 الخسارة: ${Stats.losses}</div>
                <div style="margin:20px 0;">📈 نسبة الفوز: ${Stats.getWinRate()}%</div>
            `;
        }

        function backToMain() {
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
        }

        window.onload = () => {
            AudioManager.preload();
            setupControls();
            document.getElementById('muteBtn').addEventListener('click', () => AudioManager.toggle());
            document.getElementById('rematchBtn').addEventListener('click', rematch);
            document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        };
    </script>
</body>
</html>
