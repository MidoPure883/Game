<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ معركة العصا V1.2 | ساحة القتال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a1e24, #0f1217);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8), inset 0 1px 4px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(241,196,15,0.5);
            z-index: 100;
        }

        /* شاشة القائمة الرئيسية */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(241,196,15,0.3);
        }

        .menu-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: 2px solid #4a5568;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 8px 0 #0f1419;
        }

        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .menu-btn:hover {
            border-color: #f1c40f;
        }

        /* شاشة اختيار الشخصية */
        .character-select-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
        }

        .character-select-screen h2 {
            color: white;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 4px solid #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #0f1419;
        }

        .color-option.selected {
            border-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 20px #f1c40f;
        }

        .color-option:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f1419;
        }

        /* الألوان المتاحة */
        .color-red { background: #e74c3c; }
        .color-blue { background: #3498db; }
        .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; }
        .color-white { background: #ecf0f1; }
        .color-black { background: #2c3e50; }

        .back-btn {
            background: #7f8c8d;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* شاشة الإحصائيات */
        .stats-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
            color: white;
        }

        .stats-screen h2 {
            text-align: center;
            font-size: 2rem;
            color: #f1c40f;
        }

        .stats-card {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .stat-item {
            margin: 20px 0;
            font-size: 1.3rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: #f1c40f;
        }

        /* شاشة اللعبة (مخفية في البداية) */
        .game-screen {
            display: none;
        }

        /* شاشة READY FIGHT */
        .ready-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            border-radius: 48px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ready-screen.show {
            opacity: 1;
            pointer-events: none;
        }

        .ready-text {
            font-size: 5rem;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 0 0 30px #e67e22;
            animation: pulse 0.5s infinite alternate;
        }

        .fight-text {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shake 0.3s infinite;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-5px,5px); }
            50% { transform: translate(5px,-5px); }
            75% { transform: translate(-5px,-5px); }
            100% { transform: translate(0,0); }
        }

        /* باقي التنسيقات من الإصدار السابق */
        .arena {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #2a2f38, 0 20px 30px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #2d3b4f, #1b232f);
        }

        .game-ui {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
            border: 1px solid #3a4050;
        }

        .health-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .health-container span {
            font-size: 14px;
            font-weight: bold;
        }

        .health-bar {
            flex: 1;
            height: 20px;
            background: #2a2f3a;
            border-radius: 100px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
        }

        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #e67e22);
            border-radius: 100px;
            transition: width 0.1s ease;
        }

        .health-fill.player2 {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }

        .versus-badge {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .timer-bar {
            height: 10px;
            background: #2a2f3a;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 1s linear;
        }

        .combo-counter {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(155,89,182,0.5);
        }

        .combo-counter span {
            font-size: 1.8rem;
            margin-right: 5px;
            color: #f1c40f;
        }

        .controls-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .joystick-area {
            background: #1e272e;
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .joystick {
            width: 70px;
            height: 70px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -5px 0 #1a262f, 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.05s linear;
            border: 2px solid #4a5b6b;
            -webkit-touch-callout: none;
        }

        .joystick:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 0 #1a262f;
            background: #3d5166;
        }

        .joystick span {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 5px 0 #1a262f;
            pointer-events: none;
        }

        .control-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1419, 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.08s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4a5568;
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .attack-btn {
            background: linear-gradient(145deg, #c0392b, #a8231a);
            width: 90px;
            box-shadow: 0 8px 0 #6b1e14, 0 8px 25px rgba(192,57,43,0.5);
            border-color: #e74c3c;
        }

        .block-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            width: 70px;
            box-shadow: 0 8px 0 #0f1419, 0 8px 20px rgba(0,0,0,0.6);
            border-color: #3498db;
        }

        .block-btn.active {
            background: linear-gradient(145deg, #27ae60, #229954);
            border-color: #2ecc71;
        }

        .jump-btn {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            width: 70px;
            box-shadow: 0 8px 0 #b85e0a, 0 8px 20px rgba(0,0,0,0.6);
            border-color: #f1c40f;
        }

        .power-meter {
            width: 100px;
            height: 20px;
            background: #1e272e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px #0a0e11;
        }

        .power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.1s;
        }

        .power-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f1c40f;
            font-weight: bold;
        }

        .game-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f1c40f;
            min-height: 30px;
        }

        .restart-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .sound-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .sound-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        .sound-btn:active {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="version-badge">⚡ الإصدار 1.2</div>

        <!-- شاشة القائمة الرئيسية -->
        <div class="main-menu" id="mainMenu">
            <div class="game-title">⚡ معركة العصا</div>
            <button class="menu-btn" onclick="startNewGame()">🆕 New Game</button>
            <button class="menu-btn" onclick="showStats()">📊 Continue Game</button>
            <button class="menu-btn" onclick="showCharacterSelect()">🎨 Select Character</button>
        </div>

        <!-- شاشة اختيار الشخصية -->
        <div class="character-select-screen" id="characterSelect">
            <h2>🎨 اختر لون شخصيتك</h2>
            <div class="color-grid">
                <div class="color-option color-red" onclick="selectColor('red')" id="colorRed"></div>
                <div class="color-option color-blue" onclick="selectColor('blue')" id="colorBlue"></div>
                <div class="color-option color-green" onclick="selectColor('green')" id="colorGreen"></div>
                <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
                <div class="color-option color-white" onclick="selectColor('white')" id="colorWhite"></div>
                <div class="color-option color-black" onclick="selectColor('black')" id="colorBlack"></div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة الإحصائيات -->
        <div class="stats-screen" id="statsScreen">
            <h2>📊 إحصائياتك</h2>
            <div class="stats-card">
                <div class="stat-item">
                    <div>عدد مرات الفوز</div>
                    <div class="stat-value" id="winsCount">0</div>
                </div>
                <div class="stat-item">
                    <div>عدد مرات الخسارة</div>
                    <div class="stat-value" id="lossesCount">0</div>
                </div>
                <div class="stat-item">
                    <div>نسبة الفوز</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة اللعبة (مخفية في البداية) -->
        <div class="game-screen" id="gameScreen">
            <div class="arena">
                <canvas id="gameCanvas" width="600" height="300"></canvas>
            </div>

            <!-- شاشة READY FIGHT -->
            <div class="ready-screen" id="readyScreen">
                <div class="ready-text" id="readyText">READY?</div>
            </div>

            <div class="game-ui">
                <div class="health-container">
                    <span style="color: #e74c3c;" id="playerName">أنت</span>
                    <div class="health-bar">
                        <div class="health-fill" id="player1Health" style="width: 100%"></div>
                    </div>
                </div>
                
                <div class="versus-badge">VS</div>
                
                <div class="health-container">
                    <div class="health-bar">
                        <div class="health-fill player2" id="player2Health" style="width: 100%"></div>
                    </div>
                    <span style="color: #3498db;" id="aiName">AI</span>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill" style="width: 100%"></div>
            </div>

            <div class="difficulty-select" style="display: flex; gap: 10px; margin: 10px 0;">
                <button class="diff-btn" onclick="setDifficulty('easy')">🌟 سهل</button>
                <button class="diff-btn selected" id="diffNormal" onclick="setDifficulty('normal')">⚡ متوسط</button>
                <button class="diff-btn" onclick="setDifficulty('hard')">🔥 صعب</button>
            </div>

            <div class="combo-counter" id="comboDisplay">
                <span>⚡</span> 0
            </div>

            <div class="controls-area">
                <div class="joystick-area">
                    <div class="joystick" id="joystickLeft">
                        <span>←</span>
                    </div>
                    <div class="joystick" id="joystickRight">
                        <span>→</span>
                    </div>
                </div>

                <button class="control-btn jump-btn" id="jumpButton">
                    <span>⬆️</span>
                </button>

                <button class="control-btn attack-btn" id="attackButton">
                    <span>👊</span>
                </button>

                <button class="control-btn block-btn" id="blockButton">
                    <span>🛡️</span>
                </button>

                <div class="power-label">
                    <div class="power-meter">
                        <div class="power-fill" id="powerMeter"></div>
                    </div>
                    <span>قوة</span>
                </div>
            </div>

            <div class="sound-controls">
                <button class="sound-btn" id="muteBtn">🔊 تشغيل الصوت</button>
                <button class="sound-btn" id="testSoundBtn">🔊 اختبار الصوت</button>
            </div>

            <div class="game-message" id="gameMessage"></div>
            <button class="restart-btn" id="restartBtn">العودة للقائمة</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ========== إدارة الإحصائيات (localStorage) ==========
        const Stats = {
            wins: parseInt(localStorage.getItem('wins')) || 0,
            losses: parseInt(localStorage.getItem('losses')) || 0,
            
            save() {
                localStorage.setItem('wins', this.wins);
                localStorage.setItem('losses', this.losses);
            },
            
            addWin() {
                this.wins++;
                this.save();
            },
            
            addLoss() {
                this.losses++;
                this.save();
            },
            
            getWinRate() {
                const total = this.wins + this.losses;
                return total === 0 ? 0 : Math.round((this.wins / total) * 100);
            }
        };

        // ========== إعدادات اللعبة ==========
        const Settings = {
            playerColor: 'red',
            aiColor: 'blue',
            difficulty: 'normal',
            roundTime: 60,
            timeLeft: 60,
            timerInterval: null
        };

        // ألوان اللاعبين المتاحة
        const colorMap = {
            red: '#e74c3c',
            blue: '#3498db',
            green: '#2ecc71',
            yellow: '#f1c40f',
            white: '#ecf0f1',
            black: '#2c3e50'
        };

        // ========== نظام الصوت ==========
        const SoundManager = {
            sounds: {},
            enabled: true,
            muted: false,
            volume: 0.5,
            
            loadSounds() {
                const soundFiles = {
                    punch: 'punch.mp3',
                    block: 'block.mp3',
                    hit: 'hit.mp3',
                    jump: 'jump.mp3',
                    win: 'win.mp3',
                    lose: 'lose.mp3',
                    fight: 'fight.mp3'
                };
                
                for (let [name, path] of Object.entries(soundFiles)) {
                    this.sounds[name] = new Audio(path);
                    this.sounds[name].volume = this.volume;
                }
            },
            
            play(name) {
                if (this.muted || !this.enabled) return;
                const sound = this.sounds[name];
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().catch(e => {});
                }
            },
            
            toggleMute() {
                this.muted = !this.muted;
                const btn = document.getElementById('muteBtn');
                btn.innerHTML = this.muted ? '🔇 كتم الصوت' : '🔊 تشغيل الصوت';
            },
            
            testAll() {
                this.play('punch');
                setTimeout(() => this.play('block'), 300);
                setTimeout(() => this.play('hit'), 600);
                setTimeout(() => this.play('jump'), 900);
            }
        };

        SoundManager.loadSounds();

        // ========== التنقل بين الشاشات ==========
        function showMainMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
        }

        function showCharacterSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'flex';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            
            // إظهار اللون المختار حالياً
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`color${Settings.playerColor.charAt(0).toUpperCase() + Settings.playerColor.slice(1)}`).classList.add('selected');
        }

        function showStats() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'flex';
            document.getElementById('gameScreen').style.display = 'none';
            
            // تحديث الإحصائيات
            document.getElementById('winsCount').textContent = Stats.wins;
            document.getElementById('lossesCount').textContent = Stats.losses;
            document.getElementById('winRate').textContent = Stats.getWinRate() + '%';
        }

        function backToMain() {
            showMainMenu();
        }

        function selectColor(color) {
            Settings.playerColor = color;
            // تحديث لون الخصم (عكس لون اللاعب)
            const colors = Object.keys(colorMap);
            const currentIndex = colors.indexOf(color);
            Settings.aiColor = colors[(currentIndex + 3) % colors.length]; // اختيار لون مختلف
            
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`color${color.charAt(0).toUpperCase() + color.slice(1)}`).classList.add('selected');
        }

        function setDifficulty(level) {
            Settings.difficulty = level;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // ========== بدء لعبة جديدة ==========
        function startNewGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            // إظهار شاشة READY FIGHT
            const readyScreen = document.getElementById('readyScreen');
            const readyText = document.getElementById('readyText');
            
            readyScreen.classList.add('show');
            readyText.textContent = 'READY?';
            
            // تشغيل صوت fight
            SoundManager.play('fight');
            
            setTimeout(() => {
                readyText.textContent = 'FIGHT!';
                SoundManager.play('fight'); // ممكن صوت آخر
            }, 1000);
            
            setTimeout(() => {
                readyScreen.classList.remove('show');
                startRound();
            }, 2000);
        }

        function startRound() {
            // إعادة تعيين حالة اللعبة
            Game.player1.health = 100;
            Game.player2.health = 100;
            Game.player1.x = canvas.width * 0.2;
            Game.player2.x = canvas.width * 0.8;
            Game.player1.combo = 0;
            Game.player1.stunTimer = 0;
            Game.player2.stunTimer = 0;
            Game.player1.blockStamina = PHYSICS.BLOCK_STAMINA;
            Game.player2.blockStamina = PHYSICS.BLOCK_STAMINA;
            Game.gameActive = true;
            Game.effects = [];
            
            Settings.timeLeft = Settings.roundTime;
            updateTimerBar();
            startTimer();
            
            document.getElementById('gameMessage').textContent = '⚡ قاتل!';
        }

        // ========== باقي دوال اللعبة (من الإصدار السابق) ==========
        const PHYSICS = {
            GRAVITY: 0.5,
            FRICTION: 0.9,
            GROUND_Y: canvas.height - 60,
            MOVE_SPEED: 3.5,
            JUMP_FORCE: -10,
            ATTACK_RANGE: 55,
            ATTACK_DURATION: 12,
            STUN_DURATION: 15,
            KNOCKBACK: 12,
            COMBO_WINDOW: 40,
            POWER_MAX: 100,
            POWER_CHARGE_RATE: 2,
            DAMAGE_BASE: 12,
            AI_AGGRESSION: 0.04,
            BLOCK_REDUCTION: 0.4,
            BLOCK_STAMINA: 50,
            BLOCK_RECHARGE: 1,
            AI_SPEED_MULTIPLIER: 1.0,
            AI_DAMAGE_MULTIPLIER: 1.0
        };

        const Game = {
            player1: {
                x: canvas.width * 0.2, y: PHYSICS.GROUND_Y,
                vx: 0, vy: 0,
                health: 100,
                facing: 1,
                isGrounded: true,
                isAttacking: false,
                attackTimer: 0,
                attackPower: 0,
                stunTimer: 0,
                combo: 0,
                lastHitTime: 0,
                invincible: false,
                invincibleTimer: 0,
                isBlocking: false,
                blockStamina: PHYSICS.BLOCK_STAMINA
            },
            
            player2: {
                x: canvas.width * 0.8, y: PHYSICS.GROUND_Y,
                vx: 0, vy: 0,
                health: 100,
                facing: -1,
                isGrounded: true,
                isAttacking: false,
                attackTimer: 0,
                stunTimer: 0,
                attackCooldown: 0,
                decisionTimer: 0,
                jumpTimer: 0,
                invincible: false,
                invincibleTimer: 0,
                isBlocking: false,
                blockStamina: PHYSICS.BLOCK_STAMINA
            },
            
            gameActive: true,
            gameStarted: false,
            frame: 0,
            leftPressed: false,
            rightPressed: false,
            jumpPressed: false,
            blockPressed: false,
            powerCharge: 0,
            mouseDown: false,
            effects: []
        };

        // ========== نظام المؤقت ==========
        function startTimer() {
            Settings.timeLeft = Settings.roundTime;
            updateTimerBar();
            
            if (Settings.timerInterval) clearInterval(Settings.timerInterval);
            
            Settings.timerInterval = setInterval(() => {
                if (!Game.gameActive) return;
                
                Settings.timeLeft--;
                updateTimerBar();
                
                if (Settings.timeLeft <= 0) {
                    endRoundByTime();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const percentage = (Settings.timeLeft / Settings.roundTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function endRoundByTime() {
            clearInterval(Settings.timerInterval);
            Game.gameActive = false;
            
            if (Game.player1.health > Game.player2.health) {
                Stats.addWin();
                document.getElementById('gameMessage').innerHTML = '🏆 فزت بالوقت!';
                SoundManager.play('win');
            } else if (Game.player2.health > Game.player1.health) {
                Stats.addLoss();
                document.getElementById('gameMessage').innerHTML = '💀 الخصم فاز بالوقت!';
                SoundManager.play('lose');
            } else {
                document.getElementById('gameMessage').innerHTML = '🤝 تعادل!';
            }
        }

        // دالة الضرب (محدثة لتسجيل الإحصائيات)
        function applyHit(attacker, defender, damage, knockback) {
            if (defender.invincible || defender.stunTimer > 0 || !Game.gameActive) return false;
            
            if (attacker === Game.player2) {
                damage *= PHYSICS.AI_DAMAGE_MULTIPLIER;
            }
            
            let finalDamage = damage;
            let wasBlocked = false;
            
            if (defender.isBlocking && defender.blockStamina > 0) {
                finalDamage = Math.floor(damage * PHYSICS.BLOCK_REDUCTION);
                defender.blockStamina = Math.max(0, defender.blockStamina - damage * 2);
                wasBlocked = true;
                
                if (defender.blockStamina <= 0) defender.isBlocking = false;
                
                SoundManager.play('block');
                
                Game.effects.push({ x: defender.x, y: defender.y - 40, text: "🛡️", timer: 15, type: 'block' });
            } else {
                defender.stunTimer = PHYSICS.STUN_DURATION;
                SoundManager.play('hit');
            }
            
            defender.health = Math.max(0, defender.health - finalDamage);
            
            const actualKnockback = wasBlocked ? knockback * 0.3 : knockback;
            const direction = attacker.facing;
            defender.vx = direction * actualKnockback;
            defender.vy = wasBlocked ? -2 : -4;
            
            defender.invincible = true;
            defender.invincibleTimer = 25;
            
            if (!wasBlocked) {
                Game.effects.push({ x: defender.x, y: defender.y - 40, text: `-${Math.floor(finalDamage)}`, timer: 20, type: 'damage' });
            }
            
            const particleColor = wasBlocked ? '#3498db' : '#e74c3c';
            for (let i = 0; i < (wasBlocked ? 4 : 8); i++) {
                Game.effects.push({ x: defender.x, y: defender.y - 30, vx: (Math.random() - 0.5) * 5, vy: Math.random() * -4, timer: 12, type: 'particle', color: particleColor });
            }
            
            // التحقق من الموت لتسجيل الإحصائيات
            if (defender.health <= 0 && Game.gameActive) {
                if (defender === Game.player2) {
                    Stats.addWin();
                    SoundManager.play('win');
                } else {
                    Stats.addLoss();
                    SoundManager.play('lose');
                }
            }
            
            return true;
        }

            clearInterval(Settings.timerInterval);

        // ========== تهيئة الصوت ==========
        document.getElementById('muteBtn').addEventListener('click', () => SoundManager.toggleMute());
        document.getElementById('testSoundBtn').addEventListener('click', () => SoundManager.testAll());

        function enableAudio() {
            SoundManager.enabled = true;
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        }
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        // بدء اللعبة
        showMainMenu();
        setupControls();
        gameLoop();
    </script>
