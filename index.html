<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ معركة العصا V1.4 | ساحة القتال</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            padding: 10px;
            /* دعم الوضع الأفقي */
            @media (orientation: portrait) {
                transform: rotate(0deg);
            }
            @media (orientation: landscape) {
                padding: 5px;
            }
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a1e24, #0f1217);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8), inset 0 1px 4px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
            position: relative;
            /* في الوضع الأفقي نزيد العرض */
            @media (orientation: landscape) {
                max-width: 800px;
            }
        }

        .version-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(241,196,15,0.5);
            z-index: 100;
        }

        /* شاشة القائمة الرئيسية */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(241,196,15,0.3);
        }

        .menu-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: 2px solid #4a5568;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 8px 0 #0f1419;
        }

        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .menu-btn:hover {
            border-color: #f1c40f;
        }

        /* شاشة اختيار الشخصية */
        .character-select-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
        }

        .character-select-screen h2 {
            color: white;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 4px solid #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #0f1419;
        }

        .color-option.selected {
            border-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 20px #f1c40f;
        }

        .color-option:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f1419;
        }

        .color-red { background: #e74c3c; }
        .color-blue { background: #3498db; }
        .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; }
        .color-white { background: #ecf0f1; }
        .color-black { background: #2c3e50; }

        .back-btn {
            background: #7f8c8d;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* شاشة الإحصائيات */
        .stats-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
            color: white;
        }

        .stats-screen h2 {
            text-align: center;
            font-size: 2rem;
            color: #f1c40f;
        }

        .stats-card {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .stat-item {
            margin: 20px 0;
            font-size: 1.3rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: #f1c40f;
        }

        /* شاشة اللعبة */
        .game-screen {
            display: none;
        }

        /* شاشة READY FIGHT */
        .ready-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            border-radius: 48px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ready-screen.show {
            opacity: 1;
            pointer-events: none;
        }

        .ready-text {
            font-size: 5rem;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 0 0 30px #e67e22;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .arena {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #2a2f38, 0 20px 30px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #2d3b4f, #1b232f);
        }

        .game-ui {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
            border: 1px solid #3a4050;
        }

        .health-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .health-container span {
            font-size: 14px;
            font-weight: bold;
        }

        .health-bar {
            flex: 1;
            height: 20px;
            background: #2a2f3a;
            border-radius: 100px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
        }

        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #e67e22);
            border-radius: 100px;
            transition: width 0.1s ease;
        }

        .health-fill.player2 {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }

        .versus-badge {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .timer-bar {
            height: 10px;
            background: #2a2f3a;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 1s linear;
        }

        .combo-counter {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(155,89,182,0.5);
        }

        .combo-counter span {
            font-size: 1.8rem;
            margin-right: 5px;
            color: #f1c40f;
        }

        /* تحسين تخطيط الأزرار - استخدام Grid ثابت */
        .controls-area {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            justify-content: center;
        }

        .joystick-area {
            grid-column: span 2;
            background: #1e272e;
            border-radius: 40px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .joystick {
            width: 60px;
            height: 60px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -5px 0 #1a262f, 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.05s linear;
            border: 2px solid #4a5b6b;
            -webkit-touch-callout: none;
        }

        .joystick:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 0 #1a262f;
            background: #3d5166;
        }

        .joystick span {
            font-size: 2rem;
            color: white;
            text-shadow: 0 5px 0 #1a262f;
            pointer-events: none;
        }

        .control-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 100%;
            height: 60px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0f1419, 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.08s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4a5568;
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .attack-btn {
            background: linear-gradient(145deg, #c0392b, #a8231a);
            box-shadow: 0 6px 0 #6b1e14, 0 8px 25px rgba(192,57,43,0.5);
            border-color: #e74c3c;
        }

        .block-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border-color: #3498db;
        }

        .block-btn.active {
            background: linear-gradient(145deg, #27ae60, #229954);
            border-color: #2ecc71;
        }

        .jump-btn {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            border-color: #f1c40f;
        }

        .power-meter {
            width: 80px;
            height: 20px;
            background: #1e272e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px #0a0e11;
        }

        .power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.1s;
        }

        .power-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f1c40f;
            font-weight: bold;
        }

        .game-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f1c40f;
            min-height: 30px;
        }

        .restart-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .sound-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .sound-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        .sound-btn:active {
            background: #27ae60;
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            justify-content: center;
        }

        .diff-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }

        .diff-btn.selected {
            background: #27ae60;
            border-color: #2ecc71;
        }

        /* للشاشات الصغيرة جداً */
        @media (max-width: 450px) {
            .controls-area {
                grid-template-columns: repeat(3, 1fr);
            }
            .joystick-area {
                grid-column: span 3;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="version-badge">⚡ الإصدار 1.4</div>

        <!-- شاشة القائمة الرئيسية -->
        <div class="main-menu" id="mainMenu">
            <div class="game-title">⚡ معركة العصا</div>
            <button class="menu-btn" onclick="startNewGame()">🆕 New Game</button>
            <button class="menu-btn" onclick="showStats()">📊 Continue Game</button>
            <button class="menu-btn" onclick="showCharacterSelect()">🎨 Select Character</button>
        </div>

        <!-- شاشة اختيار الشخصية -->
        <div class="character-select-screen" id="characterSelect">
            <h2>🎨 اختر لون شخصيتك</h2>
            <div class="color-grid">
                <div class="color-option color-red" onclick="selectColor('red')" id="colorRed"></div>
                <div class="color-option color-blue" onclick="selectColor('blue')" id="colorBlue"></div>
                <div class="color-option color-green" onclick="selectColor('green')" id="colorGreen"></div>
                <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
                <div class="color-option color-white" onclick="selectColor('white')" id="colorWhite"></div>
                <div class="color-option color-black" onclick="selectColor('black')" id="colorBlack"></div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة الإحصائيات -->
        <div class="stats-screen" id="statsScreen">
            <h2>📊 إحصائياتك</h2>
            <div class="stats-card">
                <div class="stat-item">
                    <div>عدد مرات الفوز</div>
                    <div class="stat-value" id="winsCount">0</div>
                </div>
                <div class="stat-item">
                    <div>عدد مرات الخسارة</div>
                    <div class="stat-value" id="lossesCount">0</div>
                </div>
                <div class="stat-item">
                    <div>نسبة الفوز</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة اللعبة -->
        <div class="game-screen" id="gameScreen">
            <div class="arena">
                <canvas id="gameCanvas" width="600" height="300"></canvas>
            </div>

            <!-- شاشة READY FIGHT -->
            <div class="ready-screen" id="readyScreen">
                <div class="ready-text" id="readyText">READY?</div>
            </div>

            <div class="game-ui">
                <div class="health-container">
                    <span style="color: #e74c3c;" id="playerName">أنت</span>
                    <div class="health-bar">
                        <div class="health-fill" id="player1Health" style="width: 100%"></div>
                    </div>
                </div>
                
                <div class="versus-badge">VS</div>
                
                <div class="health-container">
                    <div class="health-bar">
                        <div class="health-fill player2" id="player2Health" style="width: 100%"></div>
                    </div>
                    <span style="color: #3498db;" id="aiName">AI</span>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill" style="width: 100%"></div>
            </div>

            <div class="difficulty-select">
                <button class="diff-btn" onclick="setDifficulty(event, 'easy')">🌟 سهل</button>
                <button class="diff-btn selected" id="diffNormal" onclick="setDifficulty(event, 'normal')">⚡ متوسط</button>
                <button class="diff-btn" onclick="setDifficulty(event, 'hard')">🔥 صعب</button>
            </div>

            <div class="combo-counter" id="comboDisplay">
                <span>⚡</span> 0
            </div>

            <div class="controls-area">
                <div class="joystick-area">
                    <div class="joystick" id="joystickLeft">
                        <span>←</span>
                    </div>
                    <div class="joystick" id="joystickRight">
                        <span>→</span>
                    </div>
                </div>

                <button class="control-btn jump-btn" id="jumpButton">
                    <span>⬆️</span>
                </button>

                <button class="control-btn attack-btn" id="attackButton">
                    <span>👊</span>
                </button>

                <button class="control-btn block-btn" id="blockButton">
                    <span>🛡️</span>
                </button>

                <div class="power-label">
                    <div class="power-meter">
                        <div class="power-fill" id="powerMeter"></div>
                    </div>
                    <span>قوة</span>
                </div>
            </div>

            <div class="sound-controls">
                <button class="sound-btn" id="muteBtn">🔊 تشغيل الصوت</button>
                <button class="sound-btn" id="testSoundBtn">🔊 اختبار الصوت</button>
            </div>

            <div class="game-message" id="gameMessage"></div>
            <button class="restart-btn" id="restartBtn">العودة للقائمة</button>
        </div>
    </div>

    <script>
        // ========== إعدادات الرسم مع دعم devicePixelRatio ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            
            // نستخدم getBoundingClientRect لأن clientWidth قد يكون صفرًا عند إخفاء العنصر
            if (rect.width === 0 || rect.height === 0) return;
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            
            // تصحيح مقياس الرسم
            ctx.setTransform(1, 0, 0, 1, 0, 0); // reset
            ctx.scale(dpr, dpr);
            
            // إعادة تعيين مواقع اللاعبين إذا كانت اللعبة نشطة
            if (document.getElementById('gameScreen').style.display === 'block' && Game) {
                Game.player1.y = getGroundY();
                Game.player2.y = getGroundY();
                Game.player1.x = Math.min(Game.player1.x, canvas.width / dpr * 0.4);
                Game.player2.x = Math.max(Game.player2.x, canvas.width / dpr * 0.6);
            }
        }

        // نستخدم ResizeObserver فقط عندما تكون الشاشة ظاهرة
        let resizeObserver;
        function observeResize(enable) {
            if (enable) {
                if (!resizeObserver) {
                    resizeObserver = new ResizeObserver(() => {
                        if (document.getElementById('gameScreen').style.display === 'block') {
                            resizeCanvas();
                        }
                    });
                }
                resizeObserver.observe(canvas.parentElement);
            } else {
                if (resizeObserver) {
                    resizeObserver.disconnect();
                }
            }
        }

        // دالة لحساب GROUND_Y ديناميكيًا
        function getGroundY() {
            const dpr = window.devicePixelRatio || 1;
            return (canvas.height / dpr) - 60;
        }

        // ========== نظام الإحصائيات ==========
        const Stats = {
            wins: parseInt(localStorage.getItem('wins')) || 0,
            losses: parseInt(localStorage.getItem('losses')) || 0,
            
            save() {
                localStorage.setItem('wins', this.wins);
                localStorage.setItem('losses', this.losses);
            },
            
            addWin() {
                this.wins++;
                this.save();
                updateStatsDisplay();
            },
            
            addLoss() {
                this.losses++;
                this.save();
                updateStatsDisplay();
            },
            
            getWinRate() {
                const total = this.wins + this.losses;
                return total === 0 ? 0 : Math.round((this.wins / total) * 100);
            }
        };

        function updateStatsDisplay() {
            document.getElementById('winsCount').textContent = Stats.wins;
            document.getElementById('lossesCount').textContent = Stats.losses;
            document.getElementById('winRate').textContent = Stats.getWinRate() + '%';
        }

        // ========== إعدادات اللعبة ==========
        const Settings = {
            playerColor: 'red',
            aiColor: 'blue',
            difficulty: 'normal',
            roundTime: 60,
            timeLeft: 60,
            timerInterval: null,
            lastTimestamp: 0
        };

        const colorMap = {
            red: '#e74c3c',
            blue: '#3498db',
            green: '#2ecc71',
            yellow: '#f1c40f',
            white: '#ecf0f1',
            black: '#2c3e50'
        };

        // ========== نظام الصوت المحسن (مع Audio Pool) ==========
        const SoundManager = {
            sounds: {},
            enabled: true,
            muted: false,
            volume: 0.5,
            soundPath: '',
            maxPoolSize: 5,
            
            loadSounds() {
                const soundNames = ['punch', 'block', 'hit', 'jump', 'win', 'lose', 'fight'];
                soundNames.forEach(name => {
                    this.sounds[name] = [];
                    for (let i = 0; i < this.maxPoolSize; i++) {
                        const audio = new Audio(this.soundPath + name + '.mp3');
                        audio.volume = this.volume;
                        audio.preload = 'auto';
                        this.sounds[name].push(audio);
                    }
                });
            },
            
            play(name) {
                if (this.muted || !this.enabled) return;
                const pool = this.sounds[name];
                if (!pool) return;
                // ابحث عن أول عنصر غير مشغل
                for (let i = 0; i < pool.length; i++) {
                    if (pool[i].paused) {
                        pool[i].currentTime = 0;
                        pool[i].play().catch(() => {});
                        return;
                    }
                }
                // إذا كان الكل مشغولاً، استخدم أول عنصر
                pool[0].pause();
                pool[0].currentTime = 0;

        // ========== الفيزياء (بدون ضرب *16 لأننا نستخدم dt) ==========
        const PHYSICS = {

        };

        // ========== نظام المؤقت ==========
        function startTimer() {
            Settings.timeLeft = Settings.roundTime;
            updateTimerBar();
            
            if (Settings.timerInterval) clearInterval(Settings.timerInterval);
            
            Settings.timerInterval = setInterval(() => {
                if (!Game.gameActive) return;
                
                Settings.timeLeft--;
                updateTimerBar();
                
                if (Settings.timeLeft <= 0) {
                    endRoundByTime();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const percentage = (Settings.timeLeft / Settings.roundTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function endRoundByTime() {
            clearInterval(Settings.timerInterval);
            Game.gameActive = false;
            
            if (Game.player1.health > Game.player2.health) {
                Stats.addWin();
                document.getElementById('gameMessage').innerHTML = '🏆 فزت بالوقت!';
                SoundManager.play('win');
            } else if (Game.player2.health > Game.player1.health) {
                Stats.addLoss();
                document.getElementById('gameMessage').innerHTML = '💀 الخصم فاز بالوقت!';
                SoundManager.play('lose');
            } else {
                document.getElementById('gameMessage').innerHTML = '🤝 تعادل!';
            }
        }

        // ========== دالة الضرب (مع حد أقصى للتأثيرات) ==========
        function applyHit(attacker, defender, damage, knockback) {
            if (defender.invincible || defender.stunTimer > 0 || !Game.gameActive) return false;
            
            if (attacker === Game.player2) {
                damage *= PHYSICS.AI_DAMAGE_MULTIPLIER;
            }
            
            let finalDamage = damage;
            let wasBlocked = false;
            
            if (defender.isBlocking && defender.blockStamina > 0) {
                finalDamage = Math.floor(damage * PHYSICS.BLOCK_REDUCTION);
                defender.blockStamina = Math.max(0, defender.blockStamina - damage * 2);
                wasBlocked = true;
                
                if (defender.blockStamina <= 0) defender.isBlocking = false;
                
                SoundManager.play('block');
                addEffect({ x: defender.x, y: defender.y - 40, text: "🛡️", timer: 15, type: 'block' });
            } else {
                defender.stunTimer = PHYSICS.STUN_DURATION;
                SoundManager.play('hit');
            }
            
            defender.health = Math.max(0, defender.health - finalDamage);
            
            const direction = attacker.facing;
            defender.vx += direction * knockback;
            defender.vy = wasBlocked ? -2 : -4;
            
            defender.invincible = true;
            defender.invincibleTimer = 25;
            
            if (!wasBlocked) {
                addEffect({ x: defender.x, y: defender.y - 40, text: `-${Math.floor(finalDamage)}`, timer: 20, type: 'damage' });
            }
            
            // تقليل عدد الجسيمات ديناميكيًا
            let particleCount = wasBlocked ? 4 : 6;
            if (Game.effects.length > 150) particleCount = 2;
            else if (Game.effects.length > 100) particleCount = 4;
            
            const particleColor = wasBlocked ? '#3498db' : '#e74c3c';
            for (let i = 0; i < particleCount; i++) {
                addEffect({ 
                    x: defender.x, y: defender.y - 30, 
                    vx: (Math.random() - 0.5) * 5, 
                    vy: Math.random() * -4, 
                    timer: 12, 
                    type: 'particle', 
                    color: particleColor 
                });
            }
            
            if (defender.health <= 0 && Game.gameActive) {
                Game.gameActive = false;
                clearInterval(Settings.timerInterval);
                if (defender === Game.player2) {
                    Stats.addWin();
                    document.getElementById('gameMessage').innerHTML = '🏆 أنت البطل!';
                    SoundManager.play('win');
                } else {
                    Stats.addLoss();
                    document.getElementById('gameMessage').innerHTML = '💀 الخصم انتصر!';
                    SoundManager.play('lose');
                }
            }
            
            return true;
        }

        // دالة مساعدة لإضافة تأثيرات مع حد أقصى
        function addEffect(effect) {
            if (Game.effects.length > 300) {
                Game.effects.shift(); // إزالة الأقدم
            }
            Game.effects.push(effect);
        }

        // ========== تحديث AI (مع cooldown ثابت) ==========
        function updateAI(dt) {
            const p2 = Game.player2;
            const p1 = Game.player1;
            
            if (!Game.gameActive) return;
            
            if (p2.blockStamina < PHYSICS.BLOCK_STAMINA && !p2.isBlocking) {
                p2.blockStamina = Math.min(PHYSICS.BLOCK_STAMINA, p2.blockStamina + PHYSICS.BLOCK_RECHARGE * dt);
            }
            
            if (p2.invincibleTimer > 0) {
                p2.invincibleTimer -= dt;
                if (p2.invincibleTimer <= 0) {
                    p2.invincible = false;
                    p2.invincibleTimer = 0;
                }
            }
            
            if (p2.stunTimer > 0) {
                p2.stunTimer -= dt;
                return;
            }
            
            const dx = p1.x - p2.x;
            const distance = Math.abs(dx);
            
            if (p2.decisionTimer <= 0) {
                p2.decisionTimer = 10 + Math.random() * 20;
                
                if (p2.health < 30) {
                    p2.behavior = 'desperate';
                } else if (p1.health < 20 && distance < 200) {
                    p2.behavior = 'finish';
                } else if (p1.isAttacking && distance < 80 && p2.blockStamina > 20) {
                    p2.behavior = 'block';
                } else if (distance > 150) {
                    p2.behavior = 'approach';
                } else if (distance < 60 && p2.health > 50) {
                    p2.behavior = 'retreat';
                } else {
                    p2.behavior = 'circle';
                }
            } else {
                p2.decisionTimer -= dt;
            }
            
            p2.isBlocking = false;
            const speedMult = PHYSICS.AI_SPEED_MULTIPLIER;
            
            switch(p2.behavior) {
                case 'approach':
                case 'finish':
                    p2.vx += (dx > 0 ? 1 : -1) * PHYSICS.MOVE_SPEED * 1.3 * speedMult * dt;
                    break;
                case 'desperate':
                    p2.vx += (dx > 0 ? 1 : -1) * PHYSICS.MOVE_SPEED * 1.5 * speedMult * dt;
                    break;
                case 'block':
                    if (p2.blockStamina > 0) p2.isBlocking = true;
                    break;
                case 'retreat':
                    p2.vx += (dx > 0 ? -1 : 1) * PHYSICS.MOVE_SPEED * 0.7 * speedMult * dt;
                    break;
                case 'circle':
                    p2.vx += (Math.random() - 0.5) * PHYSICS.MOVE_SPEED * 2 * speedMult * dt;
                    break;
            }
            
            p2.facing = dx > 0 ? 1 : -1;
            
            if (p2.jumpTimer <= 0 && p2.isGrounded) {
                if ((p1.vy < -5 && distance < 100) || Math.random() < 0.02) {
                    p2.vy = PHYSICS.JUMP_FORCE;
                    p2.jumpTimer = 40;
                    SoundManager.play('jump');
                }
            } else {
                p2.jumpTimer -= dt;
            }
            
            // هجوم AI مع cooldown ثابت (بالثواني)
            if (p2.attackCooldown <= 0 && distance < PHYSICS.ATTACK_RANGE * 1.8 && !p2.isBlocking) {
                let shouldAttack = false;
                
                if (p2.behavior === 'desperate') shouldAttack = true;
                else if (p2.behavior === 'finish') shouldAttack = true;
                else if (p1.isAttacking && distance < PHYSICS.ATTACK_RANGE) shouldAttack = Math.random() < 0.5;
                else shouldAttack = Math.random() < PHYSICS.AI_AGGRESSION * 2;
                
                if (shouldAttack) {
                    p2.isAttacking = true;
                    p2.attackTimer = PHYSICS.ATTACK_DURATION;
                    p2.attackCooldown = PHYSICS.ATTACK_COOLDOWN; // ثابت
                    
                    SoundManager.play('punch');
                    
                    setTimeout(() => {
                        const newDistance = Math.abs(p1.x - p2.x);
                        if (newDistance < PHYSICS.ATTACK_RANGE && !p1.invincible && Game.gameActive) {
                            applyHit(p2, p1, 10, PHYSICS.KNOCKBACK);
                        }
                    }, 100);
                }
            }
            
            if (p2.attackCooldown > 0) p2.attackCooldown -= dt;
            if (p2.attackTimer > 0) p2.attackTimer -= dt;
            else p2.isAttacking = false;
        }

        // ========== تحديث اللعبة الرئيسي ==========
        function updateGame(dt) {
            if (!Game.gameActive) return;
            
            const p1 = Game.player1;
            const p2 = Game.player2;
            
            Game.frame++;
            
            if (p1.blockStamina < PHYSICS.BLOCK_STAMINA && !p1.isBlocking) {
                p1.blockStamina = Math.min(PHYSICS.BLOCK_STAMINA, p1.blockStamina + PHYSICS.BLOCK_RECHARGE * dt);
            }
            
            if (p1.invincibleTimer > 0) {
                p1.invincibleTimer -= dt;
                if (p1.invincibleTimer <= 0) {
                    p1.invincible = false;
                    p1.invincibleTimer = 0;
                }
            }
            
            if (p1.stunTimer <= 0) {
                p1.vx = 0;
                if (Game.leftPressed && !p1.isBlocking) {
                    p1.vx = -PHYSICS.MOVE_SPEED * dt;
                    p1.facing = -1;
                }
                if (Game.rightPressed && !p1.isBlocking) {
                    p1.vx = PHYSICS.MOVE_SPEED * dt;
                    p1.facing = 1;
                }
                
                if (Game.jumpPressed && p1.isGrounded && !p1.isBlocking) {
                    p1.vy = PHYSICS.JUMP_FORCE;
                    SoundManager.play('jump');
                }
                
                p1.isBlocking = Game.blockPressed && p1.blockStamina > 0;
            } else {
                p1.stunTimer -= dt;
            }
            
            p1.x += p1.vx;
            p1.y += p1.vy;
            p1.vy += PHYSICS.GRAVITY * dt;
            p1.vx *= Math.pow(PHYSICS.FRICTION, dt);
            
            const groundY = getGroundY();
            if (p1.y >= groundY) {
                p1.y = groundY;
                p1.vy = 0;
                p1.isGrounded = true;
            } else {
                p1.isGrounded = false;
            }
            
            const dpr = window.devicePixelRatio || 1;
            const maxX = (canvas.width / dpr) - 50;
            p1.x = Math.max(50, Math.min(maxX, p1.x));
            
            if (p1.x > p2.x - 40) {
                p1.x = p2.x - 40;
            }
            if (p2.x < p1.x + 40) {
                p2.x = p1.x + 40;
            }
            
            if (p1.isAttacking) {
                p1.attackTimer -= dt;
                
                if (p1.attackTimer <= PHYSICS.ATTACK_DURATION - 5 && p1.attackTimer > PHYSICS.ATTACK_DURATION - 6) {
                    const distance = Math.abs(p1.x - p2.x);
                    if (distance < PHYSICS.ATTACK_RANGE) {
                        const damage = PHYSICS.DAMAGE_BASE + (Game.powerCharge * 0.25);
                        
                        if (applyHit(p1, p2, damage, PHYSICS.KNOCKBACK)) {
                            if (Game.frame - p1.lastHitTime < PHYSICS.COMBO_WINDOW) {
                                p1.combo++;
                            } else {
                                p1.combo = 1;
                            }
                            p1.lastHitTime = Game.frame;
                        }
                    }
                }
                
                if (p1.attackTimer <= 0) {
                    p1.isAttacking = false;
                }
            } else {
                if (p1.combo > 0 && Game.frame - p1.lastHitTime > PHYSICS.COMBO_WINDOW) {
                    p1.combo = 0;
                }
            }
            
            updateAI(dt);
            
            if (Game.mouseDown) {
                Game.powerCharge = Math.min(PHYSICS.POWER_MAX, Game.powerCharge + PHYSICS.POWER_CHARGE_RATE * dt);
            } else {
                Game.powerCharge = Math.max(0, Game.powerCharge - 0.5 * dt);
            }
            
            // تحديث التأثيرات (مع إزالة المنتهية)
            Game.effects = Game.effects.filter(e => {
                if (e.type === 'particle') {
                    e.x += (e.vx || 0) * dt;
                    e.y += (e.vy || 0) * dt;
                }
                e.timer -= dt;
                return e.timer > 0;
            });
            
            document.getElementById('player1Health').style.width = p1.health + '%';
            document.getElementById('player2Health').style.width = p2.health + '%';
            document.getElementById('powerMeter').style.width = Game.powerCharge + '%';
            document.getElementById('comboDisplay').innerHTML = `<span>⚡</span> ${p1.combo}`;
            
            const blockBtn = document.getElementById('blockButton');
            if (p1.isBlocking) {
                blockBtn.style.background = 'linear-gradient(145deg, #27ae60, #229954)';
                blockBtn.style.borderColor = '#2ecc71';
            } else {
                blockBtn.style.background = 'linear-gradient(145deg, #2c3e50, #1a2632)';
                blockBtn.style.borderColor = '#3498db';
            }
        }

        // ========== دوال الرسم ==========
        function drawStickFigure(x, y, isPlayer, state) {
            const color = isPlayer ? colorMap[Settings.playerColor] : colorMap[Settings.aiColor];
            const headSize = 12;
            const headY = y - 45;
            
            ctx.save();
            
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(x, y + 5, 15, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            if (state.invincible) {
                ctx.globalAlpha = 0.5 + Math.sin(Game.frame * 0.3) * 0.3;
            }
            
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.strokeStyle = color;
            
            ctx.beginPath();
            ctx.arc(x, headY, headSize, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x + state.facing * 4, headY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x, headY + headSize);
            ctx.lineTo(x, y - 10);
            ctx.stroke();
            
            const armY = headY + headSize + 5;
            ctx.beginPath();
            
            if (state.isAttacking) {
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 35, armY - 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x - state.facing * 15, armY);
            } else if (state.isBlocking) {
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 15, armY - 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 15, armY + 5);
                
                ctx.strokeStyle = 'rgba(52, 152, 219, 0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x + state.facing * 20, armY, 18, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.moveTo(x, armY);
                ctx.lineTo(x - 15, armY + 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x + 15, armY + 5);
            }
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y - 10);
            ctx.lineTo(x - 12, y + 5);
            ctx.moveTo(x, y - 10);
            ctx.lineTo(x + 12, y + 5);
            ctx.stroke();
            
            if (state.blockStamina < PHYSICS.BLOCK_STAMINA) {
                ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
                ctx.fillRect(x - 20, y - 80, 40 * (state.blockStamina / PHYSICS.BLOCK_STAMINA), 4);
            }
            
            ctx.restore();
        }

        function drawEffects() {
            Game.effects.forEach(e => {
                if (e.type === 'damage') {
                    ctx.font = 'bold 20px Arial';
                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 5;
                    ctx.fillText(e.text, e.x, e.y);
                } else if (e.type === 'block') {
                    ctx.font = 'bold 24px Arial';
                    ctx.fillStyle = '#3498db';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 5;
                    ctx.fillText(e.text, e.x, e.y);
                } else if (e.type === 'particle') {
                    ctx.fillStyle = e.color || '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
            
            const groundY = getGroundY();
            ctx.fillStyle = '#2a3440';
            ctx.fillRect(0, groundY, canvas.width / (window.devicePixelRatio || 1), 40);
            
            drawStickFigure(Game.player1.x, Game.player1.y, true, Game.player1);
            drawStickFigure(Game.player2.x, Game.player2.y, false, Game.player2);
            
            drawEffects();
        }

        // حلقة اللعبة مع delta time
        let lastTimestamp = 0;
        function gameLoop(timestamp) {
            if (!lastTimestamp) {
                lastTimestamp = timestamp;
                requestAnimationFrame(gameLoop);
                return;
            }
            
            const dt = Math.min(32, timestamp - lastTimestamp); // حد أقصى 32ms
            lastTimestamp = timestamp;
            
            updateGame(dt);
            drawGame();
            
            requestAnimationFrame(gameLoop);
        }

        // ========== أحداث التحكم ==========
        function setupControls() {
            const leftBtn = document.getElementById('joystickLeft');
            const rightBtn = document.getElementById('joystickRight');
            const jumpBtn = document.getElementById('jumpButton');
            const attackBtn = document.getElementById('attackButton');
            const blockBtn = document.getElementById('blockButton');
            
            function setLeft(state) { Game.leftPressed = state; }
            function setRight(state) { Game.rightPressed = state; }
            function setJump(state) { Game.jumpPressed = state; }
            function setBlock(state) { Game.blockPressed = state; }
            function setAttack(state) { 
                Game.mouseDown = state; 
                if (!state && Game.gameActive && !Game.player1.isAttacking && Game.player1.stunTimer <= 0 && !Game.player1.isBlocking) {
                    Game.player1.isAttacking = true;
                    Game.player1.attackTimer = PHYSICS.ATTACK_DURATION;
                    SoundManager.play('punch');
                }
            }
            
            leftBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setLeft(true); });
            leftBtn.addEventListener('mouseup', () => setLeft(false));
            leftBtn.addEventListener('mouseleave', () => setLeft(false));
            leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setLeft(true); });
            leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); setLeft(false); });
            
            rightBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setRight(true); });
            rightBtn.addEventListener('mouseup', () => setRight(false));
            rightBtn.addEventListener('mouseleave', () => setRight(false));
            rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setRight(true); });
            rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); setRight(false); });
            
            jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setJump(true); });
            jumpBtn.addEventListener('mouseup', () => setJump(false));
            jumpBtn.addEventListener('mouseleave', () => setJump(false));
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setJump(true); });
            jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); setJump(false); });
            
            blockBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setBlock(true); });
            blockBtn.addEventListener('mouseup', () => setBlock(false));
            blockBtn.addEventListener('mouseleave', () => setBlock(false));
            blockBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setBlock(true); });
            blockBtn.addEventListener('touchend', (e) => { e.preventDefault(); setBlock(false); });
            
            attackBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setAttack(true); });
            attackBtn.addEventListener('mouseup', () => setAttack(false));
            attackBtn.addEventListener('mouseleave', () => setAttack(false));
            attackBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setAttack(true); });
            attackBtn.addEventListener('touchend', (e) => { e.preventDefault(); setAttack(false); });
            
            document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        }

        // ========== أزرار الصوت ==========
        document.getElementById('muteBtn').addEventListener('click', () => SoundManager.toggleMute());
        document.getElementById('testSoundBtn').addEventListener('click', () => SoundManager.testAll());

        // ========== العودة للقائمة ==========
        document.getElementById('restartBtn').addEventListener('click', () => {
            clearInterval(Settings.timerInterval);
            if (readyTimeout) clearTimeout(readyTimeout);
            showMainMenu();
        });

        // ========== تفعيل الصوت (مطلوب للمتصفحات) ==========
        function enableAudio() {
            SoundManager.enabled = true;
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        }
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        // ========== بدء اللعبة ==========
        showMainMenu();
        setupControls();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
