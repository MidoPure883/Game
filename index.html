<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ معركة العصا V2.3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
body {
    background:#0a0c0f; width:100vw; height:100vh; height:100dvh;
    display:flex; justify-content:center; align-items:center;
    font-family:'Segoe UI',system-ui,sans-serif;
    touch-action:none; overflow:hidden;
}

/* ===== شاشة التدوير ===== */
#rotateScreen {
    display:none; position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    background:#0a0c0f; z-index:9999;
    flex-direction:column; align-items:center;
    justify-content:center; text-align:center; gap:20px; color:white;
}
#rotateScreen .ri { font-size:5rem; animation:rspin 2s ease-in-out infinite; }
@keyframes rspin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
#rotateScreen p     { font-size:1.3rem; color:#f1c40f; font-weight:bold; }
#rotateScreen small { color:#aaa; font-size:0.9rem; }

.game-wrapper {
    background:linear-gradient(145deg,#1a1e24,#0f1217);
    border-radius:32px; padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.8);
    width:100%; max-width:420px; position:relative;
}
.version-badge {
    position:absolute; top:10px; right:10px;
    background:linear-gradient(135deg,#f1c40f,#e67e22);
    color:#000; padding:4px 12px; border-radius:30px;
    font-weight:bold; font-size:12px; z-index:100;
}
.main-menu { display:flex; flex-direction:column; gap:16px; align-items:center; justify-content:center; min-height:380px; }
.game-title {
    font-size:2.5rem; font-weight:900;
    background:linear-gradient(135deg,#f1c40f,#e67e22,#e74c3c);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center;
}
.gold-display {
    background:rgba(241,196,15,0.1); border:1px solid rgba(241,196,15,0.3);
    color:#f1c40f; padding:6px 16px; border-radius:20px;
    font-size:0.9rem; font-weight:bold;
}
.menu-btn {
    background:linear-gradient(145deg,#2c3e50,#1a2632);
    color:white; font-size:1.2rem; padding:12px 30px;
    border-radius:60px; width:80%; cursor:pointer;
    transition:0.2s; box-shadow:0 6px 0 #0f1419; border:none;
}
.menu-btn:active { transform:translateY(5px); box-shadow:0 1px 0 #0f1419; }

/* شاشات فرعية */
.sub-screen { display:none; flex-direction:column; gap:16px; min-height:380px; padding:8px; color:white; text-align:center; }

/* Mode Cards */
.mode-card {
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(145deg,#1e2530,#161c24);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px; padding:14px 16px;
    cursor:pointer; transition:0.2s;
}
.mode-card:active { transform:scale(0.97); }
.mode-card:not(.mode-locked):hover { border-color:#f1c40f; box-shadow:0 0 15px rgba(241,196,15,0.2); }
.mode-locked { opacity:0.4; cursor:default; pointer-events:none; }
.mode-icon { font-size:2rem; min-width:44px; text-align:center; }
.mode-info { flex:1; text-align:right; }
.mode-name { color:white; font-weight:bold; font-size:1.1rem; }
.mode-desc { color:#7f8c8d; font-size:0.8rem; margin-top:3px; }
.mode-arrow { color:#f1c40f; font-size:1.3rem; }

/* Color picker */
.color-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0; }
.color-option { aspect-ratio:1; border-radius:16px; border:4px solid #4a5568; cursor:pointer; transition:0.2s; }
.color-option.selected { border-color:#f1c40f; transform:scale(1.1); box-shadow:0 0 20px #f1c40f; }
.color-red{background:#e74c3c;} .color-blue{background:#3498db;} .color-green{background:#2ecc71;}
.color-yellow{background:#f1c40f;} .color-white{background:#ecf0f1;} .color-black{background:#2c3e50;}

/* Stats */
.stat-row { margin:10px 0; font-size:1.1rem; }
</style>
</head>
<body>
<div id="rotateScreen">
    <div class="ri">📱</div>
    <p>يرجى تدوير الشاشة</p>
    <small>اللعبة تعمل بالوضع الأفقي فقط</small>
</div>

<div class="game-wrapper" id="gameWrapper" style="display:none;">
    <div class="version-badge">⚡ V2.3</div>

    <!-- القائمة الرئيسية -->
    <div class="main-menu" id="mainMenu">
        <div class="game-title">⚡ معركة العصا</div>
        <div class="gold-display">🪙 <span id="goldDisplay">0</span> Gold</div>
        <button class="menu-btn" onclick="showScreen('modesScreen')">🎮 Modes</button>
        <button class="menu-btn" onclick="showCharacter()">👤 Character</button>
        <button class="menu-btn" onclick="showStats()">📊 الإحصائيات</button>
        <button class="menu-btn" onclick="showScreen('colorScreen')">🎨 تخصيص البطل</button>
    </div>

    <!-- Modes -->
    <div class="sub-screen" id="modesScreen">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <h2 style="color:#f1c40f;">🎮 اختر الوضع</h2>
            <button class="menu-btn" style="width:auto;padding:8px 16px;font-size:0.9rem;" onclick="showMain()">🔙</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="mode-card" onclick="goTo('arcade_mode.html')">
                <div class="mode-icon">🕹️</div>
                <div class="mode-info"><div class="mode-name">Arcade Mode</div></div>
                <div class="mode-arrow">←</div>
            </div>
            <div class="mode-card" onclick="goTo('adventure_mode.html')">
                <div class="mode-icon">🗺️</div>
                <div class="mode-info">
                    <div class="mode-name">Adventure Mode</div>
                    <div class="mode-desc">Leveling + Farming</div>
                </div>
                <div class="mode-arrow">←</div>
            </div>
            <div class="mode-card mode-locked">
                <div class="mode-icon">🔒</div>
                <div class="mode-info"><div class="mode-name">قريباً...</div></div>
            </div>
        </div>
    </div>

    <!-- اختيار اللون -->
    <div class="sub-screen" id="colorScreen">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <h2>🎨 اختر لون مقاتلك</h2>
            <button class="menu-btn" style="width:auto;padding:8px 16px;font-size:0.9rem;" onclick="showMain()">🔙</button>
        </div>
        <div class="color-grid">
            <div class="color-option color-red"    onclick="selectColor('red')"    id="colorRed"></div>
            <div class="color-option color-blue"   onclick="selectColor('blue')"   id="colorBlue"></div>
            <div class="color-option color-green"  onclick="selectColor('green')"  id="colorGreen"></div>
            <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
            <div class="color-option color-white"  onclick="selectColor('white')"  id="colorWhite"></div>
            <div class="color-option color-black"  onclick="selectColor('black')"  id="colorBlack"></div>
        </div>
    </div>

    <!-- Character -->
    <div class="sub-screen" id="characterScreen">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <h2 style="color:#f1c40f;">👤 Character</h2>
            <button class="menu-btn" style="width:auto;padding:8px 16px;font-size:0.9rem;" onclick="showMain()">🔙</button>
        </div>
        <div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,0.08);">
            <div style="font-size:0.85rem;color:#aaa;margin-bottom:10px;">📊 إحصائيات الشخصية</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="charStats"></div>
        </div>
        <div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,0.08);">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <span style="color:#00cec9;font-size:0.85rem;" id="charLevelLabel">Level 1</span>
                <span style="color:#aaa;font-size:0.8rem;" id="charXpLabel">0 / 100 XP</span>
            </div>
            <div style="height:8px;background:rgba(255,255,255,0.1);border-radius:6px;overflow:hidden;">
                <div id="charXpBar" style="height:100%;background:linear-gradient(90deg,#00cec9,#6c5ce7);border-radius:6px;width:0%;transition:width 0.5s;"></div>
            </div>
        </div>
        <button class="menu-btn" onclick="goTo('adventure_mode.html')">🔧 Upgrades & Adventure</button>
        <button class="menu-btn" onclick="showMain()">🔙 عودة</button>
    </div>

    <!-- الإحصائيات -->
    <div class="sub-screen" id="statsScreen">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <h2>📊 سجلك القتالي</h2>
            <button class="menu-btn" style="width:auto;padding:8px 16px;font-size:0.9rem;" onclick="showMain()">🔙</button>
        </div>
        <div id="statsDisplay" style="font-size:1.1rem; line-height:2; color:white;"></div>
    </div>
</div>

<script>
// ===== الـ Gold المشترك =====
function getCharacter() {
    const c = localStorage.getItem('game_character');
    return c ? JSON.parse(c) : { gold:0, gems:0, selectedColor:'green' };
}

// ===== اللون المحفوظ =====
function selectColor(color) {
    const c = getCharacter();
    c.selectedColor = color;
    localStorage.setItem('game_character', JSON.stringify(c));
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    const el = document.getElementById(`color${color[0].toUpperCase()+color.slice(1)}`);
    if (el) el.classList.add('selected');
    setTimeout(showMain, 300);
}

// ===== التنقل =====
function showScreen(id) {
    document.getElementById('mainMenu').style.display = 'none';
    document.querySelectorAll('.sub-screen').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'flex';

    if (id === 'colorScreen') {
        const color = getCharacter().selectedColor || 'green';
        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
        const el = document.getElementById(`color${color[0].toUpperCase()+color.slice(1)}`);
        if (el) el.classList.add('selected');
    }
}

function showMain() {
    document.querySelectorAll('.sub-screen').forEach(s => s.style.display = 'none');
    document.getElementById('mainMenu').style.display = 'flex';
    updateGold();
}

function goTo(url) { window.location.href = url; }

function showCharacter() {
    const c    = getCharacter();
    const prog = JSON.parse(localStorage.getItem('adv_progress') || '{}');
    const lvl  = prog.level || 1;
    const xp   = prog.xp   || 0;
    const XP_TABLE = [100,150,220,300,400,520,660,820,1000,1200];
    const needed = XP_TABLE[Math.min(lvl-1, XP_TABLE.length-1)];
    const pct = Math.min(100, Math.round(xp / needed * 100));

    document.getElementById('charLevelLabel').textContent = `Level ${lvl}`;
    document.getElementById('charXpLabel').textContent    = `${xp} / ${needed} XP`;
    document.getElementById('charXpBar').style.width      = pct + '%';

    document.getElementById('charStats').innerHTML = `
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#e74c3c;">${c.damage || 12}</div>
            <div style="font-size:0.7rem;color:#aaa;">⚔️ ضرر</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#2ecc71;">${c.maxHp || 100}</div>
            <div style="font-size:0.7rem;color:#aaa;">❤️ HP</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#3498db;">${c.blockPow || 45}%</div>
            <div style="font-size:0.7rem;color:#aaa;">🛡️ تصدي</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#f1c40f;">${c.gold || 0}</div>
            <div style="font-size:0.7rem;color:#aaa;">🪙 Gold</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#e67e22;">${c.speed || 100}%</div>
            <div style="font-size:0.7rem;color:#aaa;">⚡ سرعة</div>
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:10px;text-align:center;">
            <div style="font-size:1.2rem;font-weight:bold;color:#9b59b6;">${prog.skillPoints || 0}</div>
            <div style="font-size:0.7rem;color:#aaa;">⭐ Skill Pts</div>
        </div>
    `;
    showScreen('characterScreen');
}

function showStats() {
    const wins   = parseInt(localStorage.getItem('arcade_wins'))   || 0;
    const losses = parseInt(localStorage.getItem('arcade_losses')) || 0;
    const total  = wins + losses;
    const rate   = total ? Math.round(wins/total*100) : 0;
    const gold   = getCharacter().gold || 0;
    const advLvl = JSON.parse(localStorage.getItem('adv_progress')||'{}').level || 1;

    document.getElementById('statsDisplay').innerHTML = `
        <div class="stat-row">🏆 الفوز: ${wins}</div>
        <div class="stat-row">💔 الخسارة: ${losses}</div>
        <div class="stat-row">📈 نسبة الفوز: ${rate}%</div>
        <div class="stat-row">🪙 Gold المجموع: ${gold}</div>
        <div class="stat-row">⭐ مستوى Adventure: ${advLvl}</div>
    `;
    showScreen('statsScreen');
}

function updateGold() {
    document.getElementById('goldDisplay').textContent = getCharacter().gold || 0;
}

// شغل فحص الاتجاه فوراً قبل أي حاجة
(function() {
    const portrait = window.innerHeight > window.innerWidth;
    const rot  = document.getElementById('rotateScreen');
    const wrap = document.getElementById('gameWrapper');
    if (portrait) {
        rot.style.display  = 'flex';
        wrap.style.display = 'none';
    } else {
        rot.style.display  = 'none';
        wrap.style.display = 'block';
    }
})();

window.onload = () => {
    function checkOri() {
        const portrait = window.innerHeight > window.innerWidth;
        const rot      = document.getElementById('rotateScreen');
        const wrap     = document.getElementById('gameWrapper');
        if (portrait) {
            rot.style.display  = 'flex';
            wrap.style.display = 'none';
        } else {
            rot.style.display  = 'none';
            wrap.style.display = 'block';
        }
    }
    window.addEventListener('resize', checkOri);
    window.addEventListener('orientationchange', () => setTimeout(checkOri, 300));
    checkOri();
    updateGold();
};
</script>
</body>
</html>
