<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ معركة العصا V1.2 | ساحة القتال</title>
    <style>
        /* (نفس التنسيقات السابقة مع إضافة تعديلات بسيطة) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            padding: 10px;
        }

        .game-wrapper {
            background: linear-gradient(145deg, #1a1e24, #0f1217);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8), inset 0 1px 4px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .version-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 20px rgba(241,196,15,0.5);
            z-index: 100;
        }

        /* شاشة القائمة الرئيسية */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(241,196,15,0.3);
        }

        .menu-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: 2px solid #4a5568;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 60px;
            width: 80%;
            max-width: 300px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 8px 0 #0f1419;
        }

        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .menu-btn:hover {
            border-color: #f1c40f;
        }

        /* شاشة اختيار الشخصية */
        .character-select-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
        }

        .character-select-screen h2 {
            color: white;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }

        .color-option {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 4px solid #4a5568;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #0f1419;
        }

        .color-option.selected {
            border-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 20px #f1c40f;
        }

        .color-option:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f1419;
        }

        .color-red { background: #e74c3c; }
        .color-blue { background: #3498db; }
        .color-green { background: #2ecc71; }
        .color-yellow { background: #f1c40f; }
        .color-white { background: #ecf0f1; }
        .color-black { background: #2c3e50; }

        .back-btn {
            background: #7f8c8d;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* شاشة الإحصائيات */
        .stats-screen {
            display: none;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
            padding: 20px;
            color: white;
        }

        .stats-screen h2 {
            text-align: center;
            font-size: 2rem;
            color: #f1c40f;
        }

        .stats-card {
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .stat-item {
            margin: 20px 0;
            font-size: 1.3rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: #f1c40f;
        }

        /* شاشة اللعبة */
        .game-screen {
            display: none;
        }

        /* شاشة READY FIGHT */
        .ready-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            border-radius: 48px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ready-screen.show {
            opacity: 1;
            pointer-events: none;
        }

        .ready-text {
            font-size: 5rem;
            font-weight: 900;
            color: #f1c40f;
            text-shadow: 0 0 30px #e67e22;
            animation: pulse 0.5s infinite alternate;
        }

        .fight-text {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e74c3c, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shake 0.3s infinite;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-5px,5px); }
            50% { transform: translate(5px,-5px); }
            75% { transform: translate(-5px,-5px); }
            100% { transform: translate(0,0); }
        }

        /* باقي تنسيقات اللعبة */
        .arena {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #2a2f38, 0 20px 30px rgba(0, 0, 0, 0.6);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #2d3b4f, #1b232f);
        }

        .game-ui {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 10px 15px;
            border: 1px solid #3a4050;
        }

        .health-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .health-container span {
            font-size: 14px;
            font-weight: bold;
        }

        .health-bar {
            flex: 1;
            height: 20px;
            background: #2a2f3a;
            border-radius: 100px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
        }

        .health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #e67e22);
            border-radius: 100px;
            transition: width 0.1s ease;
        }

        .health-fill.player2 {
            background: linear-gradient(90deg, #3498db, #2980b9);
        }

        .versus-badge {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .timer-bar {
            height: 10px;
            background: #2a2f3a;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 1s linear;
        }

        .combo-counter {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 0 15px rgba(155,89,182,0.5);
        }

        .combo-counter span {
            font-size: 1.8rem;
            margin-right: 5px;
            color: #f1c40f;
        }

        .controls-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .joystick-area {
            background: #1e272e;
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .joystick {
            width: 70px;
            height: 70px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -5px 0 #1a262f, 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.05s linear;
            border: 2px solid #4a5b6b;
            -webkit-touch-callout: none;
        }

        .joystick:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 0 #1a262f;
            background: #3d5166;
        }

        .joystick span {
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 5px 0 #1a262f;
            pointer-events: none;
        }

        .control-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            border: none;
            color: white;
            font-size: 1.8rem;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 8px 0 #0f1419, 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.08s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #4a5568;
        }

        .control-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1419;
        }

        .attack-btn {
            background: linear-gradient(145deg, #c0392b, #a8231a);
            width: 90px;
            box-shadow: 0 8px 0 #6b1e14, 0 8px 25px rgba(192,57,43,0.5);
            border-color: #e74c3c;
        }

        .block-btn {
            background: linear-gradient(145deg, #2c3e50, #1a2632);
            width: 70px;
            box-shadow: 0 8px 0 #0f1419, 0 8px 20px rgba(0,0,0,0.6);
            border-color: #3498db;
        }

        .block-btn.active {
            background: linear-gradient(145deg, #27ae60, #229954);
            border-color: #2ecc71;
        }

        .jump-btn {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            width: 70px;
            box-shadow: 0 8px 0 #b85e0a, 0 8px 20px rgba(0,0,0,0.6);
            border-color: #f1c40f;
        }

        .power-meter {
            width: 100px;
            height: 20px;
            background: #1e272e;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px #0a0e11;
        }

        .power-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, #e67e22, #e74c3c);
            transition: width 0.1s;
        }

        .power-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f1c40f;
            font-weight: bold;
        }

        .game-message {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f1c40f;
            min-height: 30px;
        }

        .restart-btn {
            background: #34495e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        .sound-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            justify-content: center;
        }

        .sound-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        .sound-btn:active {
            background: #27ae60;
        }

        .difficulty-select {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            justify-content: center;
        }

        .diff-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }

        .diff-btn.selected {
            background: #27ae60;
            border-color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="version-badge">⚡ الإصدار 1.2</div>

        <!-- شاشة القائمة الرئيسية -->
        <div class="main-menu" id="mainMenu">
            <div class="game-title">⚡ معركة العصا</div>
            <button class="menu-btn" onclick="startNewGame()">🆕 New Game</button>
            <button class="menu-btn" onclick="showStats()">📊 Continue Game</button>
            <button class="menu-btn" onclick="showCharacterSelect()">🎨 Select Character</button>
        </div>

        <!-- شاشة اختيار الشخصية -->
        <div class="character-select-screen" id="characterSelect">
            <h2>🎨 اختر لون شخصيتك</h2>
            <div class="color-grid">
                <div class="color-option color-red" onclick="selectColor('red')" id="colorRed"></div>
                <div class="color-option color-blue" onclick="selectColor('blue')" id="colorBlue"></div>
                <div class="color-option color-green" onclick="selectColor('green')" id="colorGreen"></div>
                <div class="color-option color-yellow" onclick="selectColor('yellow')" id="colorYellow"></div>
                <div class="color-option color-white" onclick="selectColor('white')" id="colorWhite"></div>
                <div class="color-option color-black" onclick="selectColor('black')" id="colorBlack"></div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة الإحصائيات -->
        <div class="stats-screen" id="statsScreen">
            <h2>📊 إحصائياتك</h2>
            <div class="stats-card">
                <div class="stat-item">
                    <div>عدد مرات الفوز</div>
                    <div class="stat-value" id="winsCount">0</div>
                </div>
                <div class="stat-item">
                    <div>عدد مرات الخسارة</div>
                    <div class="stat-value" id="lossesCount">0</div>
                </div>
                <div class="stat-item">
                    <div>نسبة الفوز</div>
                    <div class="stat-value" id="winRate">0%</div>
                </div>
            </div>
            <button class="back-btn" onclick="backToMain()">🔙 رجوع</button>
        </div>

        <!-- شاشة اللعبة -->
        <div class="game-screen" id="gameScreen">
            <div class="arena">
                <canvas id="gameCanvas" width="600" height="300"></canvas>
            </div>

            <!-- شاشة READY FIGHT -->
            <div class="ready-screen" id="readyScreen">
                <div class="ready-text" id="readyText">READY?</div>
            </div>

            <div class="game-ui">
                <div class="health-container">
                    <span style="color: #e74c3c;" id="playerName">أنت</span>
                    <div class="health-bar">
                        <div class="health-fill" id="player1Health" style="width: 100%"></div>
                    </div>
                </div>
                
                <div class="versus-badge">VS</div>
                
                <div class="health-container">
                    <div class="health-bar">
                        <div class="health-fill player2" id="player2Health" style="width: 100%"></div>
                    </div>
                    <span style="color: #3498db;" id="aiName">AI</span>
                </div>
            </div>

            <div class="timer-bar">
                <div class="timer-fill" id="timerFill" style="width: 100%"></div>
            </div>

            <div class="difficulty-select">
                <button class="diff-btn" onclick="setDifficulty('easy')">🌟 سهل</button>
                <button class="diff-btn selected" id="diffNormal" onclick="setDifficulty('normal')">⚡ متوسط</button>
                <button class="diff-btn" onclick="setDifficulty('hard')">🔥 صعب</button>
            </div>

            <div class="combo-counter" id="comboDisplay">
                <span>⚡</span> 0
            </div>

            <div class="controls-area">
                <div class="joystick-area">
                    <div class="joystick" id="joystickLeft">
                        <span>←</span>
                    </div>
                    <div class="joystick" id="joystickRight">
                        <span>→</span>
                    </div>
                </div>

                <button class="control-btn jump-btn" id="jumpButton">
                    <span>⬆️</span>
                </button>

                <button class="control-btn attack-btn" id="attackButton">
                    <span>👊</span>
                </button>

                <button class="control-btn block-btn" id="blockButton">
                    <span>🛡️</span>
                </button>

                <div class="power-label">
                    <div class="power-meter">
                        <div class="power-fill" id="powerMeter"></div>
                    </div>
                    <span>قوة</span>
                </div>
            </div>

            <div class="sound-controls">
                <button class="sound-btn" id="muteBtn">🔊 تشغيل الصوت</button>
                <button class="sound-btn" id="testSoundBtn">🔊 اختبار الصوت</button>
            </div>

            <div class="game-message" id="gameMessage"></div>
            <button class="restart-btn" id="restartBtn">العودة للقائمة</button>
        </div>
    </div>

    <script>
        // ========== إعدادات الرسم ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ========== نظام الإحصائيات ==========
        const Stats = {
            wins: parseInt(localStorage.getItem('wins')) || 0,
            losses: parseInt(localStorage.getItem('losses')) || 0,
            
            save() {
                localStorage.setItem('wins', this.wins);
                localStorage.setItem('losses', this.losses);
            },
            
            addWin() {
                this.wins++;
                this.save();
                updateStatsDisplay();
            },
            
            addLoss() {
                this.losses++;
                this.save();
                updateStatsDisplay();
            },
            
            getWinRate() {
                const total = this.wins + this.losses;
                return total === 0 ? 0 : Math.round((this.wins / total) * 100);
            }
        };

        function updateStatsDisplay() {
            document.getElementById('winsCount').textContent = Stats.wins;
            document.getElementById('lossesCount').textContent = Stats.losses;
            document.getElementById('winRate').textContent = Stats.getWinRate() + '%';
        }

        // ========== إعدادات اللعبة ==========
        const Settings = {
            playerColor: 'red',
            aiColor: 'blue',
            difficulty: 'normal',
            roundTime: 60,
            timeLeft: 60,
            timerInterval: null
        };

        // ألوان اللاعبين
        const colorMap = {
            red: '#e74c3c',
            blue: '#3498db',
            green: '#2ecc71',
            yellow: '#f1c40f',
            white: '#ecf0f1',
            black: '#2c3e50'
        };

        // ========== نظام الصوت ==========
        const SoundManager = {
            sounds: {},
            enabled: true,
            muted: false,
            volume: 0.5,
            
            loadSounds() {
                const soundFiles = {
                    punch: 'punch.mp3',
                    block: 'block.mp3',
                    hit: 'hit.mp3',
                    jump: 'jump.mp3',
                    win: 'win.mp3',
                    lose: 'lose.mp3',
                    fight: 'fight.mp3'
                };
                
                for (let [name, path] of Object.entries(soundFiles)) {
                    this.sounds[name] = new Audio(path);
                    this.sounds[name].volume = this.volume;
                }
            },
            
            play(name) {
                if (this.muted || !this.enabled) return;
                const sound = this.sounds[name];
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().catch(e => {});
                }
            },
            
            toggleMute() {
                this.muted = !this.muted;
                const btn = document.getElementById('muteBtn');
                btn.innerHTML = this.muted ? '🔇 كتم الصوت' : '🔊 تشغيل الصوت';
            },
            
            testAll() {
                this.play('punch');
                setTimeout(() => this.play('block'), 300);
                setTimeout(() => this.play('hit'), 600);
                setTimeout(() => this.play('jump'), 900);
            }
        };

        SoundManager.loadSounds();

        // ========== التنقل بين الشاشات ==========
        function showMainMenu() {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
        }

        function showCharacterSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'flex';
            document.getElementById('statsScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            
            // إظهار اللون المختار حالياً
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            const colorId = `color${Settings.playerColor.charAt(0).toUpperCase() + Settings.playerColor.slice(1)}`;
            const el = document.getElementById(colorId);
            if (el) el.classList.add('selected');
        }

        function showStats() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('statsScreen').style.display = 'flex';
            document.getElementById('gameScreen').style.display = 'none';
            updateStatsDisplay();
        }

        function backToMain() {
            showMainMenu();
        }

        function selectColor(color) {
            Settings.playerColor = color;
            // اختيار لون مختلف للخصم (عكس اللون)
            const colors = Object.keys(colorMap);
            const currentIndex = colors.indexOf(color);
            Settings.aiColor = colors[(currentIndex + 3) % colors.length];
            
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`color${color.charAt(0).toUpperCase() + color.slice(1)}`).classList.add('selected');
        }

        function setDifficulty(level) {
            Settings.difficulty = level;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            
            // تحديث معاملات AI حسب الصعوبة
            if (level === 'easy') {
                PHYSICS.AI_SPEED_MULTIPLIER = 0.7;
                PHYSICS.AI_DAMAGE_MULTIPLIER = 0.8;
            } else if (level === 'normal') {
                PHYSICS.AI_SPEED_MULTIPLIER = 1.0;
                PHYSICS.AI_DAMAGE_MULTIPLIER = 1.0;
            } else {
                PHYSICS.AI_SPEED_MULTIPLIER = 1.3;
                PHYSICS.AI_DAMAGE_MULTIPLIER = 1.2;
            }
        }

        // ========== بدء لعبة جديدة ==========
        function startNewGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            // إظهار شاشة READY FIGHT
            const readyScreen = document.getElementById('readyScreen');
            const readyText = document.getElementById('readyText');
            
            readyScreen.classList.add('show');
            readyText.textContent = 'READY?';
            
            // تشغيل صوت fight
            SoundManager.play('fight');
            
            setTimeout(() => {
                readyText.textContent = 'FIGHT!';
                SoundManager.play('fight'); // نفس الصوت مرة ثانية
            }, 1000);
            
            setTimeout(() => {
                readyScreen.classList.remove('show');
                startRound();
            }, 2000);
        }

        function startRound() {
            // إعادة تعيين حالة اللعبة
            Game.player1.health = 100;
            Game.player2.health = 100;
            Game.player1.x = canvas.width * 0.2;
            Game.player2.x = canvas.width * 0.8;
            Game.player1.combo = 0;
            Game.player1.stunTimer = 0;
            Game.player2.stunTimer = 0;
            Game.player1.blockStamina = PHYSICS.BLOCK_STAMINA;
            Game.player2.blockStamina = PHYSICS.BLOCK_STAMINA;
            Game.gameActive = true;
            Game.effects = [];
            
            Settings.timeLeft = Settings.roundTime;
            updateTimerBar();
            startTimer();
            
            document.getElementById('gameMessage').textContent = '⚡ قاتل!';
        }

        // ========== الفيزياء وحالة اللعبة ==========
        const PHYSICS = {
            GRAVITY: 0.5,
            FRICTION: 0.9,
            GROUND_Y: canvas.height - 60,
            MOVE_SPEED: 3.5,
            JUMP_FORCE: -10,
            ATTACK_RANGE: 55,
            ATTACK_DURATION: 12,
            STUN_DURATION: 15,
            KNOCKBACK: 12,
            COMBO_WINDOW: 40,
            POWER_MAX: 100,
            POWER_CHARGE_RATE: 2,
            DAMAGE_BASE: 12,
            AI_AGGRESSION: 0.04,
            BLOCK_REDUCTION: 0.4,
            BLOCK_STAMINA: 50,
            BLOCK_RECHARGE: 1,
            AI_SPEED_MULTIPLIER: 1.0,
            AI_DAMAGE_MULTIPLIER: 1.0
        };

        const Game = {
            player1: {
                x: canvas.width * 0.2, y: PHYSICS.GROUND_Y,
                vx: 0, vy: 0,
                health: 100,
                facing: 1,
                isGrounded: true,
                isAttacking: false,
                attackTimer: 0,
                attackPower: 0,
                stunTimer: 0,
                combo: 0,
                lastHitTime: 0,
                invincible: false,
                invincibleTimer: 0,
                isBlocking: false,
                blockStamina: PHYSICS.BLOCK_STAMINA
            },
            
            player2: {
                x: canvas.width * 0.8, y: PHYSICS.GROUND_Y,
                vx: 0, vy: 0,
                health: 100,
                facing: -1,
                isGrounded: true,
                isAttacking: false,
                attackTimer: 0,
                stunTimer: 0,
                attackCooldown: 0,
                decisionTimer: 0,
                jumpTimer: 0,
                invincible: false,
                invincibleTimer: 0,
                isBlocking: false,
                blockStamina: PHYSICS.BLOCK_STAMINA
            },
            
            gameActive: true,
            frame: 0,
            leftPressed: false,
            rightPressed: false,
            jumpPressed: false,
            blockPressed: false,
            powerCharge: 0,
            mouseDown: false,
            effects: []
        };

        // ========== نظام المؤقت ==========
        function startTimer() {
            Settings.timeLeft = Settings.roundTime;
            updateTimerBar();
            
            if (Settings.timerInterval) clearInterval(Settings.timerInterval);
            
            Settings.timerInterval = setInterval(() => {
                if (!Game.gameActive) return;
                
                Settings.timeLeft--;
                updateTimerBar();
                
                if (Settings.timeLeft <= 0) {
                    endRoundByTime();
                }
            }, 1000);
        }

        function updateTimerBar() {
            const percentage = (Settings.timeLeft / Settings.roundTime) * 100;
            document.getElementById('timerFill').style.width = percentage + '%';
        }

        function endRoundByTime() {
            clearInterval(Settings.timerInterval);
            Game.gameActive = false;
            
            if (Game.player1.health > Game.player2.health) {
                Stats.addWin();
                document.getElementById('gameMessage').innerHTML = '🏆 فزت بالوقت!';
                SoundManager.play('win');
            } else if (Game.player2.health > Game.player1.health) {
                Stats.addLoss();
                document.getElementById('gameMessage').innerHTML = '💀 الخصم فاز بالوقت!';
                SoundManager.play('lose');
            } else {
                document.getElementById('gameMessage').innerHTML = '🤝 تعادل!';
            }
        }

        // ========== دالة الضرب ==========
        function applyHit(attacker, defender, damage, knockback) {
            if (defender.invincible || defender.stunTimer > 0 || !Game.gameActive) return false;
            
            if (attacker === Game.player2) {
                damage *= PHYSICS.AI_DAMAGE_MULTIPLIER;
            }
            
            let finalDamage = damage;
            let wasBlocked = false;
            
            if (defender.isBlocking && defender.blockStamina > 0) {
                finalDamage = Math.floor(damage * PHYSICS.BLOCK_REDUCTION);
                defender.blockStamina = Math.max(0, defender.blockStamina - damage * 2);
                wasBlocked = true;
                
                if (defender.blockStamina <= 0) defender.isBlocking = false;
                
                SoundManager.play('block');
                
                Game.effects.push({ x: defender.x, y: defender.y - 40, text: "🛡️", timer: 15, type: 'block' });
            } else {
                defender.stunTimer = PHYSICS.STUN_DURATION;
                SoundManager.play('hit');
            }
            
            defender.health = Math.max(0, defender.health - finalDamage);
            
            const actualKnockback = wasBlocked ? knockback * 0.3 : knockback;
            const direction = attacker.facing;
            defender.vx = direction * actualKnockback;
            defender.vy = wasBlocked ? -2 : -4;
            
            defender.invincible = true;
            defender.invincibleTimer = 25;
            
            if (!wasBlocked) {
                Game.effects.push({ x: defender.x, y: defender.y - 40, text: `-${Math.floor(finalDamage)}`, timer: 20, type: 'damage' });
            }
            
            const particleColor = wasBlocked ? '#3498db' : '#e74c3c';
            for (let i = 0; i < (wasBlocked ? 4 : 8); i++) {
                Game.effects.push({ x: defender.x, y: defender.y - 30, vx: (Math.random() - 0.5) * 5, vy: Math.random() * -4, timer: 12, type: 'particle', color: particleColor });
            }
            
            // تسجيل الإحصائيات عند الموت
            if (defender.health <= 0 && Game.gameActive) {
                Game.gameActive = false;
                clearInterval(Settings.timerInterval);
                if (defender === Game.player2) {
                    Stats.addWin();
                    document.getElementById('gameMessage').innerHTML = '🏆 أنت البطل!';
                    SoundManager.play('win');
                } else {
                    Stats.addLoss();
                    document.getElementById('gameMessage').innerHTML = '💀 الخصم انتصر!';
                    SoundManager.play('lose');
                }
            }
            
            return true;
        }

        // ========== تحديث AI (كامل) ==========
        function updateAI() {
            const p2 = Game.player2;
            const p1 = Game.player1;
            
            if (!Game.gameActive) return;
            
            if (p2.blockStamina < PHYSICS.BLOCK_STAMINA && !p2.isBlocking) {
                p2.blockStamina = Math.min(PHYSICS.BLOCK_STAMINA, p2.blockStamina + PHYSICS.BLOCK_RECHARGE);
            }
            
            if (p2.invincibleTimer > 0) {
                p2.invincibleTimer--;
                p2.invincible = p2.invincibleTimer > 0;
            }
            
            if (p2.stunTimer > 0) {
                p2.stunTimer--;
                return;
            }
            
            const dx = p1.x - p2.x;
            const distance = Math.abs(dx);
            
            if (p2.decisionTimer <= 0) {
                p2.decisionTimer = 10 + Math.floor(Math.random() * 20);
                
                if (p2.health < 30) {
                    p2.behavior = 'desperate';
                } else if (p1.health < 20 && distance < 200) {
                    p2.behavior = 'finish';
                } else if (p1.isAttacking && distance < 80 && p2.blockStamina > 20) {
                    p2.behavior = 'block';
                } else if (distance > 150) {
                    p2.behavior = 'approach';
                } else if (distance < 60 && p2.health > 50) {
                    p2.behavior = 'retreat';
                } else {
                    p2.behavior = 'circle';
                }
            } else {
                p2.decisionTimer--;
            }
            
            p2.isBlocking = false;
            const speedMult = PHYSICS.AI_SPEED_MULTIPLIER;
            
            switch(p2.behavior) {
                case 'approach':
                case 'finish':
                    p2.vx = (dx > 0 ? 1 : -1) * PHYSICS.MOVE_SPEED * 1.3 * speedMult;
                    break;
                case 'desperate':
                    p2.vx = (dx > 0 ? 1 : -1) * PHYSICS.MOVE_SPEED * 1.5 * speedMult;
                    break;
                case 'block':
                    p2.vx = 0;
                    if (p2.blockStamina > 0) {
                        p2.isBlocking = true;
                    }
                    break;
                case 'retreat':
                    p2.vx = (dx > 0 ? -1 : 1) * PHYSICS.MOVE_SPEED * 0.7 * speedMult;
                    break;
                case 'circle':
                    p2.vx = (Math.random() - 0.5) * PHYSICS.MOVE_SPEED * 2 * speedMult;
                    break;
            }
            
            p2.facing = dx > 0 ? 1 : -1;
            
            if (p2.jumpTimer <= 0 && p2.isGrounded) {
                if ((p1.vy < -5 && distance < 100) || Math.random() < 0.02) {
                    p2.vy = PHYSICS.JUMP_FORCE * 0.9;
                    p2.jumpTimer = 40;
                    SoundManager.play('jump');
                }
            } else {
                p2.jumpTimer--;
            }
            
            if (p2.attackCooldown <= 0 && distance < PHYSICS.ATTACK_RANGE * 1.8 && !p2.isBlocking) {
                let shouldAttack = false;
                
                if (p2.behavior === 'desperate') shouldAttack = true;
                else if (p2.behavior === 'finish') shouldAttack = true;
                else if (p1.isAttacking && distance < PHYSICS.ATTACK_RANGE) shouldAttack = Math.random() < 0.5;
                else shouldAttack = Math.random() < PHYSICS.AI_AGGRESSION * 2;
                
                if (shouldAttack) {
                    p2.isAttacking = true;
                    p2.attackTimer = PHYSICS.ATTACK_DURATION;
                    p2.attackCooldown = p2.behavior === 'desperate' ? 20 : 35;
                    
                    SoundManager.play('punch');
                    
                    setTimeout(() => {
                        const newDistance = Math.abs(p1.x - p2.x);
                        if (newDistance < PHYSICS.ATTACK_RANGE && !p1.invincible && Game.gameActive) {
                            applyHit(p2, p1, 10, PHYSICS.KNOCKBACK);
                        }
                    }, 100);
                }
            }
            
            if (p2.attackCooldown > 0) p2.attackCooldown--;
            if (p2.attackTimer > 0) p2.attackTimer--;
            else p2.isAttacking = false;
            
            p2.x += p2.vx;
            p2.y += p2.vy;
            p2.vy += PHYSICS.GRAVITY;
            p2.vx *= PHYSICS.FRICTION;
            
            if (p2.y >= PHYSICS.GROUND_Y) {
                p2.y = PHYSICS.GROUND_Y;
                p2.vy = 0;
                p2.isGrounded = true;
            } else {
                p2.isGrounded = false;
            }
            
            p2.x = Math.max(50, Math.min(canvas.width - 50, p2.x));
        }

        // ========== تحديث اللعبة الرئيسي ==========
        function updateGame() {
            if (!Game.gameActive) return;
            
            const p1 = Game.player1;
            const p2 = Game.player2;
            
            Game.frame++;
            
            if (p1.blockStamina < PHYSICS.BLOCK_STAMINA && !p1.isBlocking) {
                p1.blockStamina = Math.min(PHYSICS.BLOCK_STAMINA, p1.blockStamina + PHYSICS.BLOCK_RECHARGE);
            }
            
            if (p1.invincibleTimer > 0) {
                p1.invincibleTimer--;
                p1.invincible = p1.invincibleTimer > 0;
            }
            
            if (p1.stunTimer <= 0) {
                p1.vx = 0;
                if (Game.leftPressed && !p1.isBlocking) {
                    p1.vx = -PHYSICS.MOVE_SPEED;
                    p1.facing = -1;
                }
                if (Game.rightPressed && !p1.isBlocking) {
                    p1.vx = PHYSICS.MOVE_SPEED;
                    p1.facing = 1;
                }
                
                if (Game.jumpPressed && p1.isGrounded && !p1.isBlocking) {
                    p1.vy = PHYSICS.JUMP_FORCE;
                    SoundManager.play('jump');
                }
                
                p1.isBlocking = Game.blockPressed && p1.blockStamina > 0;
            } else {
                p1.stunTimer--;
            }
            
            p1.x += p1.vx;
            p1.y += p1.vy;
            p1.vy += PHYSICS.GRAVITY;
            p1.vx *= PHYSICS.FRICTION;
            
            if (p1.y >= PHYSICS.GROUND_Y) {
                p1.y = PHYSICS.GROUND_Y;
                p1.vy = 0;
                p1.isGrounded = true;
            } else {
                p1.isGrounded = false;
            }
            
            p1.x = Math.max(50, Math.min(canvas.width - 50, p1.x));
            
            if (p1.x > p2.x - 40) {
                p1.x = p2.x - 40;
            }
            if (p2.x < p1.x + 40) {
                p2.x = p1.x + 40;
            }
            
            if (p1.isAttacking) {
                p1.attackTimer--;
                
                if (p1.attackTimer === PHYSICS.ATTACK_DURATION - 5) {
                    const distance = Math.abs(p1.x - p2.x);
                    if (distance < PHYSICS.ATTACK_RANGE) {
                        const damage = PHYSICS.DAMAGE_BASE + (Game.powerCharge * 0.25);
                        
                        if (applyHit(p1, p2, damage, PHYSICS.KNOCKBACK * 1.5)) {
                            if (Game.frame - p1.lastHitTime < PHYSICS.COMBO_WINDOW) {
                                p1.combo++;
                            } else {
                                p1.combo = 1;
                            }
                            p1.lastHitTime = Game.frame;
                        }
                    }
                }
                
                if (p1.attackTimer <= 0) {
                    p1.isAttacking = false;
                }
            } else {
                if (p1.combo > 0 && Game.frame - p1.lastHitTime > PHYSICS.COMBO_WINDOW) {
                    p1.combo = 0;
                }
            }
            
            updateAI();
            
            if (Game.mouseDown) {
                Game.powerCharge = Math.min(PHYSICS.POWER_MAX, Game.powerCharge + PHYSICS.POWER_CHARGE_RATE);
            } else {
                Game.powerCharge = Math.max(0, Game.powerCharge - 1);
            }
            
            Game.effects = Game.effects.filter(e => {
                if (e.type === 'particle') {
                    e.x += e.vx || 0;
                    e.y += e.vy || 0;
                }
                e.timer--;
                return e.timer > 0;
            });
            
            document.getElementById('player1Health').style.width = p1.health + '%';
            document.getElementById('player2Health').style.width = p2.health + '%';
            document.getElementById('powerMeter').style.width = Game.powerCharge + '%';
            document.getElementById('comboDisplay').innerHTML = `<span>⚡</span> ${p1.combo}`;
            
            const blockBtn = document.getElementById('blockButton');
            if (p1.isBlocking) {
                blockBtn.style.background = 'linear-gradient(145deg, #27ae60, #229954)';
                blockBtn.style.borderColor = '#2ecc71';
            } else {
                blockBtn.style.background = 'linear-gradient(145deg, #2c3e50, #1a2632)';
                blockBtn.style.borderColor = '#3498db';
            }
        }

        // ========== دوال الرسم ==========
        function drawStickFigure(x, y, isPlayer, state) {
            const color = isPlayer ? colorMap[Settings.playerColor] : colorMap[Settings.aiColor];
            const headSize = 12;
            const headY = y - 45;
            
            ctx.save();
            
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(x, y + 5, 15, 5, 0, 0, Math.PI*2);
            ctx.fill();
            
            if (state.invincible) {
                ctx.globalAlpha = 0.5 + Math.sin(Game.frame * 0.3) * 0.3;
            }
            
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.strokeStyle = color;
            
            ctx.beginPath();
            ctx.arc(x, headY, headSize, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x + state.facing * 4, headY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x, headY + headSize);
            ctx.lineTo(x, y - 10);
            ctx.stroke();
            
            const armY = headY + headSize + 5;
            ctx.beginPath();
            
            if (state.isAttacking) {
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 35, armY - 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x - state.facing * 15, armY);
            } else if (state.isBlocking) {
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 15, armY - 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x + state.facing * 15, armY + 5);
                
                ctx.strokeStyle = 'rgba(52, 152, 219, 0.5)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x + state.facing * 20, armY, 18, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                ctx.moveTo(x, armY);
                ctx.lineTo(x - 15, armY + 5);
                ctx.moveTo(x, armY);
                ctx.lineTo(x + 15, armY + 5);
            }
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y - 10);
            ctx.lineTo(x - 12, y + 5);
            ctx.moveTo(x, y - 10);
            ctx.lineTo(x + 12, y + 5);
            ctx.stroke();
            
            if (state.blockStamina < PHYSICS.BLOCK_STAMINA) {
                ctx.fillStyle = 'rgba(52, 152, 219, 0.3)';
                ctx.fillRect(x - 20, y - 80, 40 * (state.blockStamina / PHYSICS.BLOCK_STAMINA), 4);
            }
            
            ctx.restore();
        }

        function drawEffects() {
            Game.effects.forEach(e => {
                if (e.type === 'damage') {
                    ctx.font = 'bold 20px Arial';
                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 5;
                    ctx.fillText(e.text, e.x, e.y);
                } else if (e.type === 'block') {
                    ctx.font = 'bold 24px Arial';
                    ctx.fillStyle = '#3498db';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 5;
                    ctx.fillText(e.text, e.x, e.y);
                } else if (e.type === 'particle') {
                    ctx.fillStyle = e.color || '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#2a3440';
            ctx.fillRect(0, PHYSICS.GROUND_Y, canvas.width, 40);
            
            drawStickFigure(Game.player1.x, Game.player1.y, true, Game.player1);
            drawStickFigure(Game.player2.x, Game.player2.y, false, Game.player2);
            
            drawEffects();
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        // ========== أحداث التحكم ==========
        function setupControls() {
            const leftBtn = document.getElementById('joystickLeft');
            const rightBtn = document.getElementById('joystickRight');
            const jumpBtn = document.getElementById('jumpButton');
            const attackBtn = document.getElementById('attackButton');
            const blockBtn = document.getElementById('blockButton');
            
            function setLeft(state) { Game.leftPressed = state; }
            function setRight(state) { Game.rightPressed = state; }
            function setJump(state) { Game.jumpPressed = state; }
            function setBlock(state) { Game.blockPressed = state; }
            function setAttack(state) { 
                Game.mouseDown = state; 
                if (!state && Game.gameActive && !Game.player1.isAttacking && Game.player1.stunTimer <= 0 && !Game.player1.isBlocking) {
                    Game.player1.isAttacking = true;
                    Game.player1.attackTimer = PHYSICS.ATTACK_DURATION;
                    SoundManager.play('punch');
                }
            }
            
            leftBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setLeft(true); });
            leftBtn.addEventListener('mouseup', () => setLeft(false));
            leftBtn.addEventListener('mouseleave', () => setLeft(false));
            leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setLeft(true); });
            leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); setLeft(false); });
            
            rightBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setRight(true); });
            rightBtn.addEventListener('mouseup', () => setRight(false));
            rightBtn.addEventListener('mouseleave', () => setRight(false));
            rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setRight(true); });
            rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); setRight(false); });
            
            jumpBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setJump(true); });
            jumpBtn.addEventListener('mouseup', () => setJump(false));
            jumpBtn.addEventListener('mouseleave', () => setJump(false));
            jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setJump(true); });
            jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); setJump(false); });
            
            blockBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setBlock(true); });
            blockBtn.addEventListener('mouseup', () => setBlock(false));
            blockBtn.addEventListener('mouseleave', () => setBlock(false));
            blockBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setBlock(true); });
            blockBtn.addEventListener('touchend', (e) => { e.preventDefault(); setBlock(false); });
            
            attackBtn.addEventListener('mousedown', (e) => { e.preventDefault(); setAttack(true); });
            attackBtn.addEventListener('mouseup', () => setAttack(false));
            attackBtn.addEventListener('mouseleave', () => setAttack(false));
            attackBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setAttack(true); });
            attackBtn.addEventListener('touchend', (e) => { e.preventDefault(); setAttack(false); });
            
            document.body.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        }

        // ========== أزرار الصوت ==========
        document.getElementById('muteBtn').addEventListener('click', () => SoundManager.toggleMute());
        document.getElementById('testSoundBtn').addEventListener('click', () => SoundManager.testAll());

        // ========== العودة للقائمة ==========
        document.getElementById('restartBtn').addEventListener('click', () => {
            clearInterval(Settings.timerInterval);
            showMainMenu();
        });

        // ========== تفعيل الصوت ==========
        function enableAudio() {
            SoundManager.enabled = true;
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        }
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        // ========== بدء اللعبة ==========
        showMainMenu();
        setupControls();
        gameLoop();
    </script>
</body>
</html>
