<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ معركة العصا V2.3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }

body {
    background:#0a0c0f;
    width:100vw; height:100vh; height:100dvh;
    display:flex; justify-content:center; align-items:center;
    font-family:'Segoe UI',system-ui,sans-serif;
    touch-action:none; overflow:hidden;
}

/* ===== شاشة التدوير ===== */
#rotateScreen {
    display:none; position:fixed; inset:0;
    background:#0a0c0f; z-index:9999;
    flex-direction:column; align-items:center; justify-content:center;
    color:white; text-align:center; gap:20px;
}
#rotateScreen .ri { font-size:5rem; animation:rspin 2s ease-in-out infinite; }
@keyframes rspin { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
#rotateScreen p  { font-size:1.3rem; color:#f1c40f; font-weight:bold; }
#rotateScreen small { color:#aaa; font-size:0.9rem; }

/* ===== القوائم ===== */
.game-wrapper {
    background:linear-gradient(145deg,#1a1e24,#0f1217);
    border-radius:32px; padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.8);
    width:100%; max-width:420px; position:relative;
}
.version-badge {
    position:absolute; top:10px; right:10px;
    background:linear-gradient(135deg,#f1c40f,#e67e22);
    color:#000; padding:4px 12px; border-radius:30px;
    font-weight:bold; font-size:12px; z-index:100;
}
.main-menu { display:flex; flex-direction:column; gap:16px; align-items:center; justify-content:center; min-height:380px; }
.game-title {
    font-size:2.5rem; font-weight:900;
    background:linear-gradient(135deg,#f1c40f,#e67e22,#e74c3c);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center;
}
.menu-btn {
    background:linear-gradient(145deg,#2c3e50,#1a2632);
    color:white; font-size:1.2rem; padding:12px 30px;
    border-radius:60px; width:80%; cursor:pointer;
    transition:0.2s; box-shadow:0 6px 0 #0f1419; border:none;
}
.menu-btn:active { transform:translateY(5px); box-shadow:0 1px 0 #0f1419; }

/* شاشة اختيار الشخصية */
.character-select-screen,.stats-screen {
    display:none; flex-direction:column; gap:16px;
    min-height:380px; padding:16px; color:white; text-align:center;
}
.color-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0; }
.color-option { aspect-ratio:1; border-radius:16px; border:4px solid #4a5568; cursor:pointer; transition:0.2s; }
.color-option.selected { border-color:#f1c40f; transform:scale(1.1); box-shadow:0 0 20px #f1c40f; }
.color-red{background:#e74c3c;} .color-blue{background:#3498db;} .color-green{background:#2ecc71;}
.color-yellow{background:#f1c40f;} .color-white{background:#ecf0f1;} .color-black{background:#2c3e50;}

/* ===== بطاقات الـ Modes ===== */
.mode-card {
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(145deg,#1e2530,#161c24);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px; padding:14px 16px;
    cursor:pointer; transition:0.2s;
}
.mode-card:active { transform:scale(0.97); }
.mode-card:not(.mode-locked):hover { border-color:#f1c40f; box-shadow:0 0 15px rgba(241,196,15,0.2); }
.mode-locked { opacity:0.4; cursor:default; pointer-events:none; }
.mode-icon { font-size:2rem; min-width:44px; text-align:center; }
.mode-info { flex:1; text-align:right; }
.mode-name { color:white; font-weight:bold; font-size:1.1rem; }
.mode-desc { color:#7f8c8d; font-size:0.8rem; margin-top:3px; }
.mode-arrow { color:#f1c40f; font-size:1.3rem; }

/* ===== شاشة Settings ===== */
#settingsScreen {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.85); z-index:5000;
    align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
}
.settings-box {
    background:linear-gradient(145deg,#1a1e24,#0f1217);
    border-radius:24px; padding:28px; width:85%; max-width:340px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 20px 40px rgba(0,0,0,0.8);
}
.settings-box h2 { color:#f1c40f; font-size:1.4rem; margin-bottom:20px; text-align:center; }
.setting-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.07); color:white;
}
.setting-row:last-child { border-bottom:none; }
.setting-label { font-size:1rem; }
.toggle-btn {
    width:52px; height:28px; border-radius:14px;
    background:#2a3440; border:none; cursor:pointer;
    position:relative; transition:0.3s;
}
.toggle-btn.on { background:#2ecc71; }
.toggle-btn::after {
    content:''; position:absolute;
    width:22px; height:22px; border-radius:50%;
    background:white; top:3px; left:3px; transition:0.3s;
}
.toggle-btn.on::after { left:27px; }
.close-settings {
    margin-top:20px; width:100%; padding:10px;
    background:linear-gradient(145deg,#2c3e50,#1a2632);
    border:none; border-radius:12px; color:white;
    font-size:1rem; cursor:pointer;
}
.close-settings:active { opacity:0.7; }

/* ===== شاشة نهاية الجولة ===== */
#endScreen {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.88); z-index:4000;
    flex-direction:column; align-items:center; justify-content:center;
    gap:20px; backdrop-filter:blur(8px);
}
.end-title {
    font-size:3rem; font-weight:900;
    text-shadow:0 0 30px currentColor;
    animation:endPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes endPop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.end-subtitle { color:#aaa; font-size:1rem; }
.end-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.end-btn {
    padding:12px 28px; border-radius:50px; border:none;
    font-size:1rem; font-weight:bold; cursor:pointer;
    transition:0.15s; box-shadow:0 4px 0 rgba(0,0,0,0.4);
}
.end-btn:active { transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,0.4); }
.btn-retry  { background:linear-gradient(135deg,#e74c3c,#c0392b); color:white; }
.btn-next   { background:linear-gradient(135deg,#2ecc71,#27ae60); color:white; }
.btn-home   { background:linear-gradient(135deg,#2c3e50,#1a2632); color:white; border:1px solid #4a5568; }

/* مؤشر المستوى */
.level-indicator {
    display:flex; gap:8px; align-items:center;
    background:rgba(0,0,0,0.4); padding:6px 14px; border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
}
.level-dot {
    width:12px; height:12px; border-radius:50%;
    background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.2);
    transition:0.3s;
}
.level-dot.done  { background:#2ecc71; border-color:#2ecc71; box-shadow:0 0 6px #2ecc71; }
.level-dot.active{ background:#f1c40f; border-color:#f1c40f; box-shadow:0 0 8px #f1c40f; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ===== شاشة اللعبة ===== */
.game-screen {
    display:none; position:fixed; top:0; left:0;
    width:100vw; width:100dvw;
    height:100vh; height:100dvh;
    z-index:1000; overflow:hidden;
}

/* الحلبة تملأ كل شيء */
.arena {
    position:absolute; top:0; left:0; width:100%; height:100%;
    overflow:hidden;
}
canvas { display:block; width:100%; height:100%; }

.ready-screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:transparent; display:none;
    align-items:center; justify-content:center; z-index:200;
    color:#f1c40f; font-size:3rem; font-weight:900;
    text-shadow:0 0 20px #e67e22,0 0 40px #e67e22;
    pointer-events:none; letter-spacing:6px;
}

/* HUD علوي */
.game-hud {
    position:absolute; top:8px; left:10px; right:10px;
    display:flex; align-items:center; gap:8px; z-index:10;
}
.health-container { flex:1; display:flex; align-items:center; gap:5px; }
.health-label { color:white; font-weight:bold; font-size:11px; white-space:nowrap; text-shadow:0 1px 3px #000; }
.health-bar { flex:1; height:10px; background:rgba(0,0,0,0.5); border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
.health-fill { height:100%; width:100%; transition:width 0.2s ease; border-radius:8px; }
.vs-text { color:#f1c40f; font-weight:900; font-size:0.85rem; text-shadow:0 1px 3px #000; }
.round-dot {
    width:8px; height:8px; border-radius:50%;
    background:rgba(255,255,255,0.15);
    border:1.5px solid rgba(255,255,255,0.3);
    transition:0.3s;
}
.round-dot.p1-won { background:#2ecc71; border-color:#2ecc71; box-shadow:0 0 5px #2ecc71; }
.round-dot.p2-won { background:#e74c3c; border-color:#e74c3c; box-shadow:0 0 5px #e74c3c; }

.timer-bar {
    position:absolute; top:26px; left:10px; right:10px;
    height:3px; background:rgba(0,0,0,0.4); border-radius:10px; overflow:hidden; z-index:10;
}
.timer-fill { height:100%; width:100%; background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c); transition:width 1s linear; }

/* أيقونات أعلى يسار (2 فقط) */
.top-btns {
    position:absolute; top:8px; left:10px;
    display:flex; gap:6px; z-index:20;
}
.icon-btn {
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
    color:white; width:36px; height:36px; border-radius:10px;
    cursor:pointer; font-size:1rem;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); transition:0.1s;
}
.icon-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.9); }

/* مستويات أعلى وسط */
.hud-levels {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px; z-index:10;
}
.hud-level-dot {
    width:10px; height:10px; border-radius:50%;
    background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.2);
    transition:0.3s;
}
.hud-level-dot.done   { background:#2ecc71; border-color:#2ecc71; }
.hud-level-dot.active { background:#f1c40f; border-color:#f1c40f; animation:pulse 1s infinite; }

/* كومبو + قوة أسفل وسط */
.game-bottom {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; z-index:10;
}
.combo-counter {
    background:rgba(142,68,173,0.75); padding:3px 10px; border-radius:20px;
    color:white; font-weight:bold; font-size:0.7rem;
    backdrop-filter:blur(4px); border:1px solid rgba(255,255,255,0.1);
    white-space:nowrap;
}
.combo-counter span { color:#f1c40f; }
.power-meter { display:flex; align-items:center; gap:4px; color:#f1c40f; font-size:0.65rem; }
.power-bar { width:70px; height:5px; background:rgba(0,0,0,0.5); border-radius:6px; overflow:hidden; }
.power-fill { height:100%; width:0%; background:linear-gradient(90deg,#f1c40f,#e67e22,#e74c3c); }

.game-message {
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    color:#f1c40f; font-weight:bold; font-size:0.95rem;
    text-shadow:0 0 10px #e67e22; z-index:10; white-space:nowrap;
}

/* ===== Joystick أسفل يسار ===== */
.joystick-container {
    position:absolute; bottom:18px; left:20px;
    width:100px; height:100px;
    background:rgba(255,255,255,0.06);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:50%; z-index:20; backdrop-filter:blur(2px);
}
.joystick-knob {
    position:absolute; width:42px; height:42px;
    background:radial-gradient(circle at 35% 35%,rgba(149,165,166,0.9),rgba(44,62,80,0.9));
    border-radius:50%; top:50%; left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 3px 10px rgba(0,0,0,0.7); pointer-events:none;
}

/* ===== أزرار الأكشن أسفل يمين ===== */
.action-btns {
    position:absolute; bottom:18px; right:20px;
    display:grid; grid-template-columns:1fr 1fr; gap:6px; z-index:20;
}
.action-btn {
    width:52px; height:52px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; cursor:pointer; border:none;
    box-shadow:0 4px 0 rgba(0,0,0,0.5); transition:0.05s; color:white;
    backdrop-filter:blur(2px);
}
.action-btn:active { transform:scale(0.88); box-shadow:0 1px 0 rgba(0,0,0,0.5); }
.attack-btn { background:rgba(231,76,60,0.85); border:2px solid rgba(255,255,255,0.2); grid-column:span 2; width:110px; height:46px; border-radius:25px; justify-self:center; }
.jump-btn   { background:rgba(243,156,18,0.85);  border:2px solid rgba(255,255,255,0.2); }
.block-btn  { background:rgba(52,152,219,0.85);   border:2px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>

<!-- شاشة التدوير -->
<div id="rotateScreen">
    <div class="ri">📱</div>
    <p>يرجى تدوير الشاشة</p>
    <small>اللعبة تعمل بالوضع الأفقي فقط</small>
</div>

<!-- شاشة الإعدادات -->
<div id="settingsScreen">
    <div class="settings-box">
        <h2>⚙️ الإعدادات</h2>
        <div class="setting-row">
            <span class="setting-label">🔊 الأصوات</span>
            <button class="toggle-btn on" id="soundToggle" onclick="toggleSound()"></button>
        </div>
        <button class="close-settings" onclick="closeSettings()">إغلاق</button>
    </div>
</div>

<!-- شاشة نهاية الجولة -->
<div id="endScreen">
    <div class="end-title" id="endTitle"></div>
    <div class="end-subtitle" id="endSubtitle"></div>
    <div class="level-indicator" id="endLevelDots"></div>
    <div class="end-btns" id="endBtns"></div>
</div>

<!-- القوائم الرئيسية - غير موجودة في arcade mode، اللعبة تبدأ مباشرة -->
<div class="game-wrapper" id="arcadeMenuWrapper">
    <div class="version-badge">⚡ Arcade</div>
    <div class="main-menu" id="mainMenu">
        <div class="game-title">🕹️ Arcade Mode</div>
        <div style="color:#7f8c8d;font-size:0.9rem;margin-top:-10px;">Fight 1 → Mini Boss → Final Boss</div>
        <button class="menu-btn" onclick="startCampaign()">⚔️ ابدأ القتال</button>
        <button class="menu-btn" onclick="window.location.href='index.html'">🏠 القائمة الرئيسية</button>
    </div>
</div><!-- end arcadeMenuWrapper -->

<!-- شاشة اللعبة -->
<div class="game-screen" id="gameScreen">

    <div class="arena">
        <canvas id="gameCanvas"></canvas>
        <div class="ready-screen" id="readyScreen">READY?</div>
    </div>

    <!-- HUD -->
    <div class="game-hud">
        <div class="health-container">
            <span class="health-label" style="color:#e74c3c;">أنت</span>
            <div class="health-bar"><div class="health-fill" id="p1HealthBar" style="background:linear-gradient(90deg,#e74c3c,#c0392b);width:100%"></div></div>
        </div>
        <span class="vs-text">VS</span>
        <div id="roundIndicators" style="display:flex;flex-direction:column;align-items:center;gap:3px;">
            <div style="color:rgba(255,255,255,0.5);font-size:9px;text-align:center;">R</div>
            <div style="display:flex;gap:4px;" id="p1RoundDots"></div>
            <div style="display:flex;gap:4px;" id="p2RoundDots"></div>
        </div>
        <div class="health-container">
            <div class="health-bar"><div class="health-fill" id="p2HealthBar" style="background:linear-gradient(90deg,#3498db,#2980b9);width:100%"></div></div>
            <span class="health-label" id="aiLabel" style="color:#3498db;">AI</span>
        </div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerBar"></div></div>

    <!-- مستويات أعلى وسط -->
    <div class="hud-levels" id="hudLevels"></div>

    <!-- 2 أيقونات فقط أعلى يسار -->
    <div class="top-btns">
        <div class="icon-btn" onclick="backToMainFromGame()" title="القائمة">🏠</div>
        <div class="icon-btn" onclick="openSettings()"      title="الإعدادات">⚙️</div>
    </div>

    <!-- كومبو + قوة -->
    <div class="game-bottom">
        <div class="combo-counter" id="comboDisplay"><span>⚡</span> 0</div>
        <div class="power-meter">
            <span>💪</span>
            <div class="power-bar"><div class="power-fill" id="powerMeter"></div></div>
        </div>
    </div>

    <div class="game-message" id="gameMessage"></div>

    <!-- أزرار الأكشن يمين -->
    <div class="action-btns">
        <div class="action-btn attack-btn" id="btnAttack">👊</div>
        <div class="action-btn jump-btn"   id="btnJump">⬆️</div>
        <div class="action-btn block-btn"  id="btnBlock">🛡️</div>
    </div>

    <!-- Joystick يسار -->
    <div class="joystick-container" id="joystickBase">
        <div class="joystick-knob" id="joystickKnob"></div>
    </div>

</div>

// ========== نظام الجسيمات المتطور ==========
const particles = [];
const damageNumbers = [];

function spawnHitParticles(x, y, color, type = 'hit') {
    const count = type === 'block' ? 6 : type === 'heavy' ? 20 : 12;
    for (let i = 0; i < count; i++) {
        const angle  = (Math.PI * 2 / count) * i + Math.random() * 0.5;
        const speed  = type === 'heavy' ? (3 + Math.random() * 5) : (1.5 + Math.random() * 3);
        const size   = type === 'heavy' ? (3 + Math.random() * 4) : (1.5 + Math.random() * 2.5);
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            size,
            alpha: 1,
            color: type === 'block'  ? '#3498db'
                 : type === 'heavy'  ? '#e74c3c'
                 : type === 'sparks' ? '#f1c40f'
                 : color,
            gravity: type === 'block' ? 0 : 0.15,
            life: type === 'block' ? 0.04 : 0.03,
            type,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2,
        });
    }

    // جسيمات الدم
    if (type === 'hit' || type === 'heavy') {
        for (let i = 0; i < (type === 'heavy' ? 8 : 4); i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 20,
                y: y + (Math.random() - 0.5) * 10,
                vx: (Math.random() - 0.5) * 3,
                vy: -Math.random() * 3,
                size: 2 + Math.random() * 3,
                alpha: 0.9,
                color: '#e74c3c',
                gravity: 0.25,
                life: 0.025,
                type: 'blood',
                rotation: 0, rotSpeed: 0,
            });
        }
    }
}

function spawnLandingDust(x) {
    for (let i = 0; i < 8; i++) {
        const side = i < 4 ? -1 : 1;
        particles.push({
            x: x + side * (5 + Math.random() * 15),
            y: CONFIG.groundY,
            vx: side * (0.5 + Math.random() * 2),
            vy: -(0.5 + Math.random() * 1.5),
            size: 4 + Math.random() * 6,
            alpha: 0.6,
            color: '#7f8c8d',
            gravity: 0.05,
            life: 0.02,
            type: 'dust',
            rotation: 0, rotSpeed: 0.1,
        });
    }
}

function spawnComboEffect(x, y, combo) {
    if (combo < 3) return;
    const colors = ['#f1c40f','#e67e22','#e74c3c','#9b59b6','#3498db'];
    const color  = colors[Math.min(combo - 3, colors.length - 1)];
    for (let i = 0; i < combo * 2; i++) {
        const angle = (Math.PI * 2 / (combo * 2)) * i;
        particles.push({
            x, y: y - 30,
            vx: Math.cos(angle) * (2 + combo * 0.3),
            vy: Math.sin(angle) * (2 + combo * 0.3) - 1,
            size: 2 + combo * 0.3,
            alpha: 1,
            color,
            gravity: 0.05,
            life: 0.018,
            type: 'combo',
            rotation: 0, rotSpeed: 0.15,
        });
    }
}

function updateAndDrawParticles(ctx) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x   += p.vx;
        p.y   += p.vy;
        p.vy  += p.gravity;
        p.vx  *= 0.96;
        p.alpha -= p.life;
        p.rotation += p.rotSpeed;
        if (p.alpha <= 0) { particles.splice(i, 1); continue; }

        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);

        if (p.type === 'dust') {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size * 1.5, p.size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'blood') {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        } else if (p.type === 'block') {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 2, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            // شرر
            ctx.shadowColor  = p.color;
            ctx.shadowBlur   = p.size * 2;
            ctx.fillStyle    = p.color;
            ctx.beginPath();
            ctx.arc(0, 0, p.size * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

// ========== تأثير ارتجاج الشاشة ==========
const ScreenShake = {
    intensity: 0,
    duration:  0,
    trigger(intensity, duration) {
        this.intensity = Math.max(this.intensity, intensity);
        this.duration  = Math.max(this.duration,  duration);
    },
    update() {
        if (this.duration > 0) this.duration--;
        else this.intensity *= 0.85;
    },
    apply(ctx) {
        if (this.intensity < 0.5) return;
        const dx = (Math.random() - 0.5) * this.intensity;
        const dy = (Math.random() - 0.5) * this.intensity;
        ctx.translate(dx, dy);
    }
};

// ========== تأثير فلاش الشاشة عند الكومبو ==========
const ScreenFlash = {
    alpha: 0,
    color: '#f1c40f',
    trigger(color = '#f1c40f', alpha = 0.25) {
        this.color = color;
        this.alpha = alpha;
    },
    draw(ctx) {
        if (this.alpha <= 0.01) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle   = this.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
        this.alpha *= 0.82;
    }
};

function spawnDamageNumber(x, y, amount, isPlayer) {
    damageNumbers.push({
        x, y,
        vy: -2.5,
        alpha: 1,
        text: `-${Math.round(amount)}`,
        color: isPlayer ? '#e74c3c' : '#f1c40f',
        size: Math.min(28, 16 + amount * 0.4),
        age: 0
    });
}

// ========== فئة المقاتل ==========
class Fighter {
    constructor(x, color, isPlayer, maxHp = 100, hasSword = false) {
        this.x = x; this.y = CONFIG.groundY;
        this.vx = 0; this.vy = 0;
        this.color = color;
        this.health = maxHp; this.maxHealth = maxHp;
        this.isGrounded = true;
        this.facing = isPlayer ? 1 : -1;
        this.isAttacking = false; this.isBlocking = false;
        this.lastAttackTime = 0;
        this.stunned = 0;
        this.invincible = false; this.invincibleEnd = 0;
        this.isPlayer = isPlayer;
        this.blockStamina = 100;
        this.combo = 0; this.lastHitTime = 0;
        this.hasSword = hasSword;
        // فيزياء
        this.landingSquish = 0; // تأثير الهبوط
        this.attackKickback = 0;
    }

    update() {
        if (this.stunned > 0) { this.stunned--; return; }
        if (this.invincible && Date.now() > this.invincibleEnd) this.invincible = false;
        if (!this.isBlocking && this.blockStamina < 100)
            this.blockStamina = Math.min(100, this.blockStamina + 0.5);

        // فيزياء حقيقية - احتكاك
        const wasGrounded = this.isGrounded;
        this.vy += CONFIG.gravity;
        this.y  += this.vy;

        if (this.y >= CONFIG.groundY) {
            if (!wasGrounded && this.vy > 3) {
                this.landingSquish = 8;
                spawnLandingDust(this.x);
            }
            this.y = CONFIG.groundY;
            this.vy = 0;
            this.isGrounded = true;
            // احتكاك الأرض
            if (!this.isPlayer) this.vx *= CONFIG.friction;
            else if (!keys.left && !keys.right) this.vx *= CONFIG.friction;
        } else {
            this.isGrounded = false;
            this.vx *= CONFIG.airFriction;
        }

        // تأثير squish الهبوط يتلاشى
        if (this.landingSquish > 0) this.landingSquish -= 1.2;

        this.x += this.vx;
        const minX = 40, maxX = canvas.width - 40;
        this.x = Math.max(minX, Math.min(maxX, this.x));
    }

    takeDamage(amount, attacker) {
        if (this.invincible || this.health <= 0) return false;

        let finalDamage = amount;
        let knockback = 5.5;

        if (this.isBlocking && this.blockStamina > 0) {
            finalDamage = Math.floor(amount * CONFIG.blockReduction);
            this.blockStamina -= amount * 2;
            knockback = 1.5;
            AudioManager.play('block');
            // جسيمات التصدي
            spawnHitParticles(this.x, this.y - 33, '#3498db', 'block');
            ScreenShake.trigger(3, 4);
        } else {
            AudioManager.play('hit');
            // جسيمات الضرب
            const heavy = finalDamage > 20;
            spawnHitParticles(this.x, this.y - 30, this.color, heavy ? 'heavy' : 'hit');
            spawnHitParticles(this.x, this.y - 30, '#f1c40f', 'sparks');
            ScreenShake.trigger(heavy ? 8 : 5, heavy ? 8 : 5);
        }

        this.health = Math.max(0, this.health - finalDamage);

        const dir = attacker.x < this.x ? 1 : -1;
        this.vx = dir * knockback;
        this.vy = -4;

        // نقاط الضرر الطيارة
        spawnDamageNumber(this.x, this.y - 60, finalDamage, !this.isPlayer);

        this.invincible = true;
        this.invincibleEnd = Date.now() + CONFIG.invincibilityDuration;

        if (attacker?.isPlayer) {
            const now = Date.now();
            attacker.combo = (now - attacker.lastHitTime < CONFIG.comboWindow) ? attacker.combo + 1 : 1;
            attacker.lastHitTime = now;
            // تأثير الكومبو
            if (attacker.combo >= 3) {
                spawnComboEffect(this.x, this.y, attacker.combo);
                ScreenFlash.trigger(
                    attacker.combo >= 7 ? '#e74c3c' :
                    attacker.combo >= 5 ? '#e67e22' : '#f1c40f',
                    Math.min(0.35, attacker.combo * 0.05)
                );
                if (attacker.combo >= 5) ScreenShake.trigger(attacker.combo, 6);
            }
        }
        return true;
    }

    draw(ctx) {
        ctx.save();

        const squish = this.landingSquish;
        ctx.translate(this.x, this.y);
        ctx.scale(1 + squish * 0.04, 1 - squish * 0.04);
        ctx.translate(-this.x, -this.y);

        ctx.lineWidth = 3.5;
        ctx.lineCap   = 'round';
        ctx.lineJoin  = 'round';
        ctx.strokeStyle = this.color;

        // وميض عند الأذى
        if (this.invincible && Math.floor(Date.now()/80)%2)
            ctx.strokeStyle = 'rgba(255,255,255,0.9)';

        const t       = Date.now();
        const moving  = this.isGrounded && Math.abs(this.vx) > 0.5;
        const airTime = !this.isGrounded;
        const headY   = this.y - 50;

        // ظل
        if (this.isGrounded) {
            const shadowW = 14 + squish * 0.5;
            ctx.save();
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.ellipse(this.x, CONFIG.groundY + 4, shadowW, 4, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        // حركة الجسم أثناء المشي
        const bodyBob   = moving ? Math.sin(t / 120) * 2 : 0;
        const bodyLean  = moving ? this.vx * 0.8 : 0;

        // الرأس
        ctx.save();
        ctx.translate(this.x + bodyLean * 0.3, headY + bodyBob * 0.5);
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI*2);
        ctx.stroke();
        // العين
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.facing * 4, -2, 2.5, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // الجسم
        ctx.beginPath();
        ctx.moveTo(this.x + bodyLean * 0.2, this.y - 40 + bodyBob);
        ctx.lineTo(this.x,                   this.y - 15);
        ctx.stroke();

        // الذراعين
        if (this.isAttacking) {
            // هجوم: ذراع ممدودة بشكل أسلس
            const attackProg = Math.sin(t / 60) * 0.5 + 0.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 33);
            ctx.lineTo(this.x + this.facing * (28 + attackProg * 6), this.y - 30 + attackProg * 3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 33);
            ctx.lineTo(this.x - this.facing * 10, this.y - 25);
            ctx.stroke();

            if (this.hasSword) {
                ctx.save();
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#e74c3c';
                ctx.shadowColor = '#e74c3c';
                ctx.shadowBlur  = 12 + attackProg * 8;
                ctx.beginPath();
                ctx.moveTo(this.x + this.facing * 32, this.y - 28);
                ctx.lineTo(this.x + this.facing * 62, this.y - 20);
                ctx.stroke();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.x + this.facing * 28, this.y - 36);
                ctx.lineTo(this.x + this.facing * 28, this.y - 20);
                ctx.stroke();
                ctx.restore();
            }
        } else if (this.isBlocking) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 33);
            ctx.lineTo(this.x + this.facing * 10, this.y - 40);
            ctx.moveTo(this.x, this.y - 33);
            ctx.lineTo(this.x + this.facing * 10, this.y - 26);
            ctx.stroke();
            ctx.strokeStyle = '#3498db'; ctx.lineWidth = 3;
            ctx.shadowColor = '#3498db'; ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(this.x + 18 * this.facing, this.y - 33, 16, 0, Math.PI*2);
            ctx.stroke();
        } else {
            // وضعية عادية — أنيميشن أسلس
            const swingAmt = moving ? 10 : (airTime ? 4 : 2);
            const swingSpd = moving ? 150 : 300;
            const swing    = Math.sin(t / swingSpd) * swingAmt;

            ctx.beginPath();
            ctx.moveTo(this.x + bodyLean * 0.2, this.y - 33 + bodyBob);
            ctx.lineTo(this.x - 15 + swing,  this.y - 26 + bodyBob * 0.5);
            ctx.moveTo(this.x + bodyLean * 0.2, this.y - 33 + bodyBob);
            ctx.lineTo(this.x + 15 - swing,  this.y - 26 + bodyBob * 0.5);
            ctx.stroke();

            if (this.hasSword) {
                ctx.save();
                ctx.lineWidth = 3; ctx.strokeStyle = '#e74c3c';
                ctx.shadowColor = '#e74c3c'; ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.moveTo(this.x + this.facing * 16, this.y - 26);
                ctx.lineTo(this.x + this.facing * 40, this.y - 48);
                ctx.stroke();
                ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.x + this.facing * 12, this.y - 20);
                ctx.lineTo(this.x + this.facing * 18, this.y - 30);
                ctx.stroke();
                ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + this.facing * 10, this.y - 26);
                ctx.lineTo(this.x + this.facing * 22, this.y - 26);
                ctx.stroke();
                ctx.restore();
            }
        }

        // الأرجل — مشي أسلس
        const legSpd  = moving ? 130 : 250;
        const legAmt  = moving ? 12 : (airTime ? 6 : 0);
        const legSwing = Math.sin(t / legSpd) * legAmt;

        // أثناء الطيران: أرجل مفتوحة
        if (airTime) {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 15);
            ctx.lineTo(this.x - 12, this.y + 8);
            ctx.moveTo(this.x, this.y - 15);
            ctx.lineTo(this.x + 12, this.y + 8);
            ctx.stroke();
        } else {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - 15);
            ctx.lineTo(this.x - 10 + legSwing,  this.y);
            ctx.moveTo(this.x, this.y - 15);
            ctx.lineTo(this.x + 10 - legSwing,  this.y);
            ctx.stroke();
        }

        ctx.restore();
    }
}

// ========== تهيئة اللعبة ==========
function initGame(levelIdx) {
    canvas  = document.getElementById('gameCanvas');
    ctx     = canvas.getContext('2d');
    canvas.width  = canvas.clientWidth  || window.innerWidth;
    canvas.height = canvas.clientHeight || window.innerHeight;
    CONFIG.groundY = canvas.height - 55;

    const lvl = LEVELS[levelIdx];
    const bonus = lvl.playerBonus;

    // اللاعب يكتسب HP ودمج مع كل مستوى
    const p1MaxHp = 100 + bonus.hp;
    p1 = new Fighter(canvas.width * 0.18, '#' + (()=>{
        const c = {'red':'e74c3c','blue':'3498db','green':'2ecc71','yellow':'f1c40f','white':'ecf0f1','black':'2c3e50'};
        return c[GameState.p1Color] || '2ecc71';
    })(), true, p1MaxHp, false);

    p2 = new Fighter(canvas.width * 0.82, lvl.color, false, lvl.hp, lvl.hasSword);
    p2.aiConfig = lvl.ai;

    // لون خلفية الحلبة حسب المستوى
    canvas.parentElement.style.background =
        `linear-gradient(180deg, ${lvl.bg[0]} 0%, ${lvl.bg[1]} 70%, ${lvl.bg[2]} 100%)`;

    GameState.active      = false;
    GameState.timeLeft    = CONFIG.roundTime;
    GameState.powerCharge = 0;
    GameState.p1Rounds    = 0;
    GameState.p2Rounds    = 0;
    GameState.currentRound = 1;
    p1.combo = 0;
    damageNumbers.length = 0;
    particles.length     = 0;
    ScreenShake.intensity = 0;
    ScreenShake.duration  = 0;
    ScreenFlash.alpha     = 0;

    // تحديث HUD
    document.getElementById('p1HealthBar').style.width = '100%';
    document.getElementById('p2HealthBar').style.width = '100%';
    document.getElementById('timerBar').style.width = '100%';
    document.getElementById('powerMeter').style.width = '0%';
    document.getElementById('comboDisplay').innerHTML = '<span>⚡</span> 0';
    document.getElementById('gameMessage').innerHTML  = '';
    document.getElementById('aiLabel').textContent    = lvl.fightLabel;
    document.getElementById('aiLabel').style.color    =
        lvl.type === 'finalboss' ? '#e74c3c' :
        lvl.type === 'miniboss'  ? '#e67e22' : lvl.color;

    updateHudLevels(levelIdx);
    updateRoundDots();
}

function updateRoundDots() {
    const p1Dots = document.getElementById('p1RoundDots');
    const p2Dots = document.getElementById('p2RoundDots');
    if (!p1Dots || !p2Dots) return;

    p1Dots.innerHTML = [0,1].map(i =>
        `<div class="round-dot ${i < GameState.p1Rounds ? 'p1-won' : ''}"></div>`
    ).join('');
    p2Dots.innerHTML = [0,1].map(i =>
        `<div class="round-dot ${i < GameState.p2Rounds ? 'p2-won' : ''}"></div>`
    ).join('');
}

function updateHudLevels(current) {
    const c = document.getElementById('hudLevels');
    c.innerHTML = LEVELS.map((lvl, i) => {
        let cls  = i < current ? 'done' : (i === current ? 'active' : '');
        let color = lvl.type === 'finalboss' ? '#e74c3c'
                  : lvl.type === 'miniboss'  ? '#e67e22' : '';
        let style = color ? `style="background:${color};border-color:${color}"` : '';
        return `<div class="hud-level-dot ${cls}" ${style} title="${lvl.fightLabel}"></div>`;
    }).join('');
}

// ========== فحص الضربات ==========
function checkAttacks() {
    const dist     = Math.abs(p1.x - p2.x);
    const lvl      = LEVELS[GameState.currentLevelIdx];
    const bonusDmg = lvl.playerBonus.damage;
    const swordRange = p2.hasSword ? 30 : 0;

    // ضربة اللاعب
    if (p1.isAttacking && dist < CONFIG.hitRange && !p2.invincible) {
        const dmg = CONFIG.baseDamage + bonusDmg + (GameState.powerCharge * 0.22);
        if (p2.takeDamage(dmg, p1)) {
            GameState.powerCharge = 0;
            if (p2.health <= 0) endRound(true);
        }
        p1.isAttacking = false;
    }

    // ضربة AI - بيستخدم damage المستوى مباشرة
    if (p2.isAttacking && dist < CONFIG.hitRange + swordRange && !p1.invincible) {
        const aiDmg = lvl.damage;
        if (p1.takeDamage(aiDmg, p2)) {
            p1.combo = 0;
            if (p1.health <= 0) endRound(false);
        }
        p2.isAttacking = false;
    }
}

// ========== ذكاء AI حسب المستوى ==========
function updateAI() {
    if (p2.stunned > 0 || !GameState.active) return;

    const cfg  = p2.aiConfig;
    const dist = Math.abs(p1.x - p2.x);
    const dx   = p1.x - p2.x;
    const now  = Date.now();

    p2.facing = dx > 0 ? 1 : -1;

    // تصدي ذكي - يتصدى لما اللاعب قريب ومهاجم
    const shouldBlock = p1.isAttacking && dist < 65 && Math.random() < cfg.blockChance;
    p2.isBlocking = shouldBlock;

    // حركة ذكية
    if (!p2.isBlocking) {
        if (dist > 60) {
            // مطاردة اللاعب بقوة
            p2.vx = (dx > 0 ? 1 : -1) * CONFIG.playerSpeed * cfg.speed;
        } else if (dist < 35) {
            // ابتعد قليلاً للضرب الصح
            p2.vx = (dx > 0 ? -1 : 1) * CONFIG.playerSpeed * 0.4;
        } else {
            // منطقة الهجوم - اثبت
            p2.vx *= 0.7;
        }
    }

    // هجوم - لما في المنطقة الصح
    const cooldownReady = now - p2.lastAttackTime > CONFIG.attackCooldown;
    const inRange = dist < 60;

    if (!p2.isBlocking && inRange && cooldownReady) {
        // المستويات العليا تضرب أكتر لما اللاعب بيهاجم أو واقف
        const extraChance = cfg.aggression * (p1.isAttacking ? 0.015 : 0);
        if (Math.random() < cfg.attackChance + extraChance) {
            p2.isAttacking = true;
            p2.lastAttackTime = now;
            AudioManager.play('punch');
            setTimeout(() => { p2.isAttacking = false; }, CONFIG.attackDuration);
        }
    }

    // قفز - للمستويات المتقدمة يقفز فوق اللاعب
    if (p2.isGrounded && Math.random() < cfg.jumpChance) {
        p2.vy = CONFIG.jumpForce;
        // لو صعب أو أسطورة يقفز باتجاه اللاعب
        if (cfg.aggression > 0.7 && dist > 80) {
            p2.vx = (dx > 0 ? 1 : -1) * CONFIG.playerSpeed * cfg.speed * 1.2;
        }
        AudioManager.play('jump');
    }

    // المستوى 4 - هجوم إضافي بعد التصدي
    if (cfg.aggression >= 1.0 && !p2.isBlocking && dist < 55 && cooldownReady) {
        if (Math.random() < 0.015) {
            p2.isAttacking = true;
            p2.lastAttackTime = now;
            AudioManager.play('punch');
            setTimeout(() => { p2.isAttacking = false; }, CONFIG.attackDuration);
        }
    }
}

function gameLoop() {
    if (!GameState.active) { animFrameId = null; return; }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // تأثير ارتجاج الشاشة
    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);

    // رسم الأرض
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, CONFIG.groundY + 2, canvas.width, canvas.height - CONFIG.groundY);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, CONFIG.groundY + 2);
    ctx.lineTo(canvas.width, CONFIG.groundY + 2);
    ctx.stroke();

    // تحكم اللاعب
    if (p1.stunned <= 0) {
        if (keys.left)       { p1.vx = -CONFIG.playerSpeed; p1.facing = -1; }
        else if (keys.right) { p1.vx =  CONFIG.playerSpeed; p1.facing =  1; }
    }

    // شحن القوة
    if (GameState.mouseDown && !p1.isAttacking)
        GameState.powerCharge = Math.min(CONFIG.maxPower, GameState.powerCharge + CONFIG.powerChargeRate);
    else
        GameState.powerCharge = Math.max(0, GameState.powerCharge - 0.5);

    p1.update();
    updateAI();
    p2.update();
    checkAttacks();

    // رسم الجسيمات خلف الشخصيات
    updateAndDrawParticles(ctx);

    p1.draw(ctx);
    p2.draw(ctx);

    // رسم نقاط الضرر
    for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const d = damageNumbers[i];
        d.y  += d.vy;
        d.vy *= 0.92;
        d.alpha -= 0.022;
        d.age++;
        if (d.alpha <= 0) { damageNumbers.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.font = `bold ${d.size}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = d.color;
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 3;
        ctx.textAlign = 'center';
        ctx.strokeText(d.text, d.x, d.y);
        ctx.fillText(d.text, d.x, d.y);
        ctx.restore();
    }

    ctx.restore(); // end screen shake

    // فلاش الكومبو فوق كل حاجة
    ScreenFlash.draw(ctx);

    // تحديث HUD
    document.getElementById('p1HealthBar').style.width = (p1.health / p1.maxHealth * 100) + '%';
    document.getElementById('p2HealthBar').style.width = (p2.health / p2.maxHealth * 100) + '%';
    document.getElementById('powerMeter').style.width  = GameState.powerCharge + '%';
    document.getElementById('comboDisplay').innerHTML  = `<span>⚡</span> ${p1.combo}`;

    animFrameId = requestAnimationFrame(gameLoop);
}

// ========== التايمر ==========
function startTimer() {
    if (GameState.timerInterval) clearInterval(GameState.timerInterval);
    GameState.timerInterval = setInterval(() => {
        if (!GameState.active) return;
        GameState.timeLeft--;
        document.getElementById('timerBar').style.width =
            (GameState.timeLeft / CONFIG.roundTime * 100) + '%';
        if (GameState.timeLeft <= 0) endRound(p1.health > p2.health);
    }, 1000);
}

// ========== نهاية جولة واحدة ==========
function endRound(playerWon) {
    if (!GameState.active) return;
    GameState.active = false;
    clearInterval(GameState.timerInterval);

    const lvl = LEVELS[GameState.currentLevelIdx];

    // تحديث نقاط الجولات
    if (playerWon) {
        GameState.p1Rounds++;
    } else {
        GameState.p2Rounds++;
    }
    updateRoundDots();

    // شاشة نتيجة الجولة السريعة
    const ready = document.getElementById('readyScreen');
    ready.style.display = 'flex';

    if (playerWon) {
        ready.innerHTML = `<span style="color:#2ecc71">Round ${GameState.currentRound}<br>WIN! ✅</span>`;
        AudioManager.play('win');
    } else {
        ready.innerHTML = `<span style="color:#e74c3c">Round ${GameState.currentRound}<br>LOSE ❌</span>`;
        AudioManager.play('lose');
    }

    // هل انتهت المعركة؟
    const matchWon  = GameState.p1Rounds >= 2;
    const matchLost = GameState.p2Rounds >= 2;
    const isDecider = GameState.currentRound >= 3;

    setTimeout(() => {
        ready.style.display = 'none';

        if (matchWon || matchLost || isDecider) {
            // نهاية المعركة كاملة
            endMatch(GameState.p1Rounds > GameState.p2Rounds);
        } else {
            // جولة جديدة
            GameState.currentRound++;
            startNextRound();
        }
    }, 1800);
}

// ========== بدء جولة جديدة (نفس العدو) ==========
function startNextRound() {
    const lvl   = LEVELS[GameState.currentLevelIdx];
    const bonus = lvl.playerBonus;

    // إعادة تعيين HP فقط بدون تغيير الـ rounds
    const p1MaxHp = 100 + bonus.hp;
    p1.health = p1MaxHp; p1.maxHealth = p1MaxHp;
    p1.x = canvas.width * 0.18; p1.y = CONFIG.groundY;
    p1.vx = 0; p1.vy = 0; p1.isAttacking = false;
    p1.isBlocking = false; p1.invincible = false; p1.combo = 0;

    p2.health = lvl.hp; p2.maxHealth = lvl.hp;
    p2.x = canvas.width * 0.82; p2.y = CONFIG.groundY;
    p2.vx = 0; p2.vy = 0; p2.isAttacking = false;
    p2.isBlocking = false; p2.invincible = false;

    GameState.timeLeft    = CONFIG.roundTime;
    GameState.powerCharge = 0;
    damageNumbers.length  = 0;

    document.getElementById('p1HealthBar').style.width = '100%';
    document.getElementById('p2HealthBar').style.width = '100%';
    document.getElementById('timerBar').style.width    = '100%';
    document.getElementById('powerMeter').style.width  = '0%';
    document.getElementById('gameMessage').innerHTML   = '';

    const ready = document.getElementById('readyScreen');
    AudioManager.play('fight');

    setTimeout(() => {
        ready.style.display = 'flex';
        ready.innerHTML = `Round ${GameState.currentRound}`;
    }, 300);
    setTimeout(() => { ready.innerHTML = 'FIGHT!'; }, 1800);
    setTimeout(() => {
        ready.style.display = 'none';
        GameState.active = true;
        startTimer();
        animFrameId = requestAnimationFrame(gameLoop);
    }, 2600);
}

// ========== نهاية المعركة كاملة ==========
function endMatch(playerWon) {
    const lvl    = LEVELS[GameState.currentLevelIdx];
    const isLast = GameState.currentLevelIdx >= LEVELS.length - 1;
    const endScr = document.getElementById('endScreen');
    const title  = document.getElementById('endTitle');
    const sub    = document.getElementById('endSubtitle');
    const dots   = document.getElementById('endLevelDots');
    const btns   = document.getElementById('endBtns');

    if (playerWon) {
        Stats.addWin();
        // إضافة Gold للـ Character المشترك
        const goldReward = ARCADE_GOLD.rewards[GameState.currentLevelIdx] || 50;
        ARCADE_GOLD.addGold(goldReward);
        if (isLast) {
            title.textContent = '👑 أنت البطل!';
            title.style.color = '#f1c40f';
            sub.textContent   = 'هزمت الـ Final Boss وأتممت الـ Arcade Mode!';
        } else if (lvl.type === 'miniboss') {
            title.textContent = '🔥 أسقطت الـ Mini Boss!';
            title.style.color = '#e67e22';
            sub.textContent   = 'المعارك الحقيقية بتبدأ دلوقتي...';
        } else {
            title.textContent = '🏆 انتصرت!';
            title.style.color = '#2ecc71';
            sub.textContent   = `${GameState.p1Rounds} - ${GameState.p2Rounds} | 🪙 +${goldReward} Gold!`;
        }
        btns.innerHTML = isLast
            ? `<button class="end-btn btn-home" onclick="closeEndScreen(true)">🏠 القائمة الرئيسية</button>`
            : `<button class="end-btn btn-next" onclick="goNextLevel()">التالي ⬅️</button>
               <button class="end-btn btn-home" onclick="closeEndScreen(true)">🏠 القائمة</button>`;
    } else {
        Stats.addLoss();
        if (lvl.type === 'miniboss') {
            title.textContent = '💥 الـ Mini Boss هزمك!';
            title.style.color = '#e67e22';
        } else if (lvl.type === 'finalboss') {
            title.textContent = '☠️ الـ Final Boss هزمك!';
            title.style.color = '#e74c3c';
        } else {
            title.textContent = '💀 خسرت!';
            title.style.color = '#e74c3c';
        }
        sub.textContent = `${GameState.p1Rounds} - ${GameState.p2Rounds} | حاول تاني!`;
        btns.innerHTML  = `<button class="end-btn btn-retry" onclick="retryLevel()">🔄 إعادة المحاولة</button>
                           <button class="end-btn btn-home"  onclick="closeEndScreen(true)">🏠 القائمة</button>`;
    }

    dots.innerHTML = LEVELS.map((l, i) => {
        let cls   = i < GameState.currentLevelIdx ? 'done' : (i === GameState.currentLevelIdx ? 'active' : '');
        let color = l.type === 'finalboss' ? '#e74c3c' : l.type === 'miniboss' ? '#e67e22' : '';
        let style = color && cls ? `style="background:${color};border-color:${color}"` : '';
        return `<div class="level-dot ${cls}" ${style} title="${l.fightLabel}"></div>`;
    }).join('');

    endScr.style.display = 'flex';
}

function retryLevel()  { closeEndScreen(false); startLevel(GameState.currentLevelIdx); }
function goNextLevel() {
    GameState.currentLevelIdx++;
    Stats.currentLevel = GameState.currentLevelIdx + 1;
    Stats.save();
    closeEndScreen(false);
    startLevel(GameState.currentLevelIdx);
}
function closeEndScreen(goHome) {
    document.getElementById('endScreen').style.display = 'none';
    if (goHome) backToMainFromGame();
}

// ========== بدء مستوى ==========
function startLevel(idx) {
    GameState.currentLevelIdx = idx;

    document.getElementById('gameScreen').style.display = 'block';

    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    GameState.active = false;

    // ننتظر 100ms عشان الـ canvas يتحسب صح على الموبايل
    setTimeout(() => {
        initGame(idx);

        // لو الـ canvas لسه 0 نحاول تاني
        if (canvas.width === 0 || canvas.height === 0) {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            CONFIG.groundY = canvas.height - 55;
            p1.x = canvas.width * 0.18;
            p2.x = canvas.width * 0.82;
        }

        const ready = document.getElementById('readyScreen');
        AudioManager.play('fight');

        setTimeout(() => { ready.style.display = 'flex'; ready.innerHTML = 'Round 1'; }, 500);
        setTimeout(() => { ready.innerHTML = 'FIGHT!'; }, 2500);
        setTimeout(() => {
            ready.style.display = 'none';
            GameState.active = true;
            startTimer();
            animFrameId = requestAnimationFrame(gameLoop);
        }, 3500);
    }, 100);
}

// ========== بدء وضع القصة ==========
function startCampaign() {
    document.getElementById('arcadeMenuWrapper').style.display = 'none';
    startLevel(0);
}

// ========== التحكم ==========
function setupControls() {
    const bind = (id, onStart, onEnd) => {
        const el = document.getElementById(id);
        if (!el) return;
        const s = e => { e.preventDefault(); onStart(); };
        const e = ev => { ev.preventDefault(); if (onEnd) onEnd(); };
        el.addEventListener('touchstart',  s, { passive:false });
        el.addEventListener('touchend',    e, { passive:false });
        el.addEventListener('touchcancel', e, { passive:false });
        el.addEventListener('mousedown', s);
        el.addEventListener('mouseup',   e);
        el.addEventListener('mouseleave',e);
    };

    // Joystick
    const jBase = document.getElementById('joystickBase');
    const jKnob = document.getElementById('joystickKnob');
    const maxR  = 32;

    function jCenter() {
        const r = jBase.getBoundingClientRect();
        return { x: r.left + r.width/2, y: r.top + r.height/2 };
    }
    function moveJ(cx, cy) {
        const c = jCenter();
        let dx = cx - c.x, dy = cy - c.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxR) { dx = dx/dist*maxR; dy = dy/dist*maxR; }
        jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        keys.left  = dx < -8;
        keys.right = dx >  8;
    }
    function resetJ() {
        jKnob.style.transform = 'translate(-50%,-50%)';
        keys.left = keys.right = false;
    }

    jBase.addEventListener('touchstart',  e => { e.preventDefault(); moveJ(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    jBase.addEventListener('touchmove',   e => { e.preventDefault(); moveJ(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    jBase.addEventListener('touchend',    e => { e.preventDefault(); resetJ(); }, { passive:false });
    jBase.addEventListener('touchcancel', e => { e.preventDefault(); resetJ(); }, { passive:false });
    jBase.addEventListener('mousedown', e => moveJ(e.clientX, e.clientY));
    jBase.addEventListener('mousemove', e => { if (e.buttons===1) moveJ(e.clientX, e.clientY); });
    jBase.addEventListener('mouseup',   resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    // أزرار الأكشن
    bind('btnJump', () => {
        if (p1 && p1.isGrounded && GameState.active) {
            p1.vy = CONFIG.jumpForce; AudioManager.play('jump');
        }
    });

    bind('btnAttack', () => {
        if (!p1 || !GameState.active || p1.stunned > 0) return;
        const now = Date.now();
        if (now - p1.lastAttackTime > CONFIG.attackCooldown) {
            p1.isAttacking = true;
            p1.lastAttackTime = now;
            GameState.mouseDown = true;
            AudioManager.play('punch');
            setTimeout(() => { p1.isAttacking = false; GameState.mouseDown = false; }, CONFIG.attackDuration);
        }
    }, () => { GameState.mouseDown = false; });

    bind('btnBlock', () => {
        if (p1 && GameState.active && p1.blockStamina > 0) p1.isBlocking = true;
    }, () => { if (p1) p1.isBlocking = false; });
}

// ========== الإعدادات ==========
function openSettings()  { document.getElementById('settingsScreen').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsScreen').style.display = 'none'; }
function toggleSound() {
    GameState.soundOn = !GameState.soundOn;
    const btn = document.getElementById('soundToggle');
    btn.classList.toggle('on', GameState.soundOn);
}

// ========== القوائم ==========
function selectColor(color) {
    GameState.p1Color = color;
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    const el = document.getElementById(`color${color[0].toUpperCase()+color.slice(1)}`);
    if (el) el.classList.add('selected');
    setTimeout(backToMain, 300);
}

function showCharacterSelect() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('characterSelect').style.display = 'flex';
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    const el = document.getElementById(`color${GameState.p1Color[0].toUpperCase()+GameState.p1Color.slice(1)}`);
    if (el) el.classList.add('selected');
}

function showStats() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('statsScreen').style.display = 'flex';
    document.getElementById('statsDisplay').innerHTML = `
        <div style="margin:12px 0;">🏆 الفوز: ${Stats.wins}</div>
        <div style="margin:12px 0;">💔 الخسارة: ${Stats.losses}</div>
        <div style="margin:12px 0;">📈 نسبة الفوز: ${Stats.getWinRate()}%</div>
        <div style="margin:12px 0;">🎮 آخر مستوى وصلت: ${LEVELS[Math.min(Stats.currentLevel-1,8)].name}</div>
        <div style="margin:12px 0;">🪙 Gold المجموع: ${ARCADE_GOLD.getGold()}</div>
    `;
}

function showModes() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('modesScreen').style.display = 'flex';
}

function backToMain() {
    document.getElementById('characterSelect').style.display = 'none';
    document.getElementById('statsScreen').style.display    = 'none';
    document.getElementById('modesScreen').style.display    = 'none';
    document.getElementById('mainMenu').style.display       = 'flex';
}

function backToMainFromGame() {
    GameState.active = false;
    clearInterval(GameState.timerInterval);
    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('endScreen').style.display  = 'none';

    const isPortrait = window.innerHeight > window.innerWidth;
    const wrap = document.getElementById('arcadeMenuWrapper');
    if (isPortrait) {
        wrap.style.display = 'none';
        document.getElementById('rotateScreen').style.display = 'flex';
    } else {
        wrap.style.display = 'block';
        document.getElementById('mainMenu').style.display = 'flex';
    }
}

// ========== التحميل ==========
window.onload = () => {
    // فيكس الارتفاع على الموبايل
    function fixVP() {
        const gs = document.querySelector('.game-screen');
        if (gs) {
            gs.style.height = window.innerHeight + 'px';
            gs.style.width  = window.innerWidth  + 'px';
        }
        // لو الكانفاس موجود وشغال، نحدث أبعاده
        const cv = document.getElementById('gameCanvas');
        if (cv && cv.parentElement && cv.parentElement.offsetWidth > 0) {
            cv.style.width  = '100%';
            cv.style.height = '100%';
        }
    }
    fixVP();
    window.addEventListener('resize', fixVP);
    window.addEventListener('orientationchange', () => setTimeout(fixVP, 300));

    AudioManager.preload();
    setupControls();
    document.body.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

    // فحص الاتجاه
    function checkOri() {
        const portrait = window.innerHeight > window.innerWidth;
        const gameOn   = document.getElementById('gameScreen').style.display === 'block';
        const rot      = document.getElementById('rotateScreen');
        const wrap     = document.getElementById('arcadeMenuWrapper');
        if (gameOn) { rot.style.display = 'none'; return; }
        if (portrait) { rot.style.display = 'flex'; wrap.style.display = 'none'; }
        else           { rot.style.display = 'none'; wrap.style.display = 'block'; }
    }
    window.addEventListener('resize', checkOri);
    window.addEventListener('orientationchange', () => setTimeout(checkOri, 300));
    checkOri();
};
