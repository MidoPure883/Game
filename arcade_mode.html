};

// ========== فئة المقاتل - Animation System الكامل ==========

// =====================================================
// ============================================================
// FIGHTER CLASS — Direct Drawing (no skeleton/joints)
// Shadow Fight style: silhouette + glow + state-based poses
// ============================================================

const STATES = {
    IDLE:'idle', WALK:'walk', JUMP:'jump', FALL:'fall', LAND:'land',
    ATTACK_LIGHT:'attack_light', ATTACK_HEAVY:'attack_heavy',
    BLOCK:'block', HURT:'hurt', STUN:'stun', DEATH:'death', WIN:'win'
};
const ANIM_DATA = {
    idle:         {loop:true,  dur:800},
    walk:         {loop:true,  dur:400},
    jump:         {loop:false, dur:300},
    fall:         {loop:false, dur:500},
    land:         {loop:false, dur:200, recovery:200},
    attack_light: {loop:false, startup:80,  active:180, recovery:360},
    attack_heavy: {loop:false, startup:140, active:280, recovery:560},
    block:        {loop:true,  dur:200},
    hurt:         {loop:false, dur:320},
    stun:         {loop:false, dur:500},
    death:        {loop:false, dur:800},
    win:          {loop:true,  dur:600},
};

// Hitbox helpers (simple AABB, no joints needed)
const HITBOX_BODY  = {oy:-70, h:80, w:28};
const HITBOX_PUNCH = {oy:-50, h:24, w:40};
const HITBOX_SWORD = {oy:-60, h:22, w:64};


function Fighter(x, color, isPlayer, maxHp, hasSword) {
    if(hasSword===undefined)hasSword=false;
    if(maxHp===undefined)maxHp=100;
        this.x=x; this.y=CONFIG.groundY;
        this.vx=0; this.vy=0;
        this.color=color;
        this.health=maxHp; this.maxHealth=maxHp;
        this.isGrounded=true;
        this.facing=isPlayer?1:-1;
        this.isAttacking=false; this.isBlocking=false;
        this.lastAttackTime=0;
        this.stunned=0;
        this.invincible=false; this.invincibleEnd=0;
        this.isPlayer=isPlayer;
        this.blockStamina=100;
        this.combo=0; this.lastHitTime=0;
        this.hasSword=hasSword;
        this.landingSquish=0; this.recoilX=0;
        this.heroId='kang';
        // State machine
        this.state=STATES.IDLE;
        this.stateStart=Date.now(); this.stateTime=0;
        this.canInterrupt=true;
        // Walk animation phase
        this.walkPhase=0;
    
}

Fighter.boxesOverlap = function(a,b) {
        return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
    
};

Fighter.prototype.setState = function(s, force) {
    if(force===undefined)force=false;
        if(!force&&!this.canInterrupt) return;
        if(this.state===STATES.DEATH) return;
        if(this.state===s) return;
        this.state=s; this.stateStart=Date.now(); this.stateTime=0;
        const a=ANIM_DATA[s];
        if(a&&!a.loop&&a.recovery){
            this.canInterrupt=false;
            setTimeout(()=>{this.canInterrupt=true;},a.recovery);
        } else { this.canInterrupt=true; }
    
};

Fighter.prototype.getBodyBox = function() {
        return {
            x: this.x+this.recoilX - HITBOX_BODY.w/2,
            y: this.y + HITBOX_BODY.oy,
            w: HITBOX_BODY.w, h: HITBOX_BODY.h
        };
    
};

Fighter.prototype.getAttackBox = function() {
        const def = this.hasSword ? HITBOX_SWORD : HITBOX_PUNCH;
        const f   = this.facing;
        return {
            x: this.x + this.recoilX + (f>0 ? 10 : -10-def.w),
            y: this.y + def.oy,
            w: def.w, h: def.h
        };
    
};

Fighter.prototype.update = function() {
        const now=Date.now();
        this.stateTime=now-this.stateStart;
        if(this.stunned>0){this.stunned--;if(this.stunned===0)this.setState(STATES.IDLE,true);}
        if(this.invincible&&now>this.invincibleEnd) this.invincible=false;
        if(!this.isBlocking&&this.blockStamina<100)
            this.blockStamina=Math.min(100,this.blockStamina+0.5);
        const wasGrounded=this.isGrounded;
        this.vy+=CONFIG.gravity; this.y+=this.vy;
        if(this.y>=CONFIG.groundY){
            if(!wasGrounded&&this.vy>3){
                this.landingSquish=10; spawnLandingDust(this.x);
                this.setState(STATES.LAND,true);
                setTimeout(()=>{if(this.state===STATES.LAND)this.setState(STATES.IDLE,true);},200);
            }
            this.y=CONFIG.groundY; this.vy=0; this.isGrounded=true;
            if(!this.isPlayer) this.vx*=CONFIG.friction;
            else if(!keys.left&&!keys.right) this.vx*=CONFIG.friction;
        } else {
            this.isGrounded=false; this.vx*=CONFIG.airFriction;
            if(this.vy>1&&this.state!==STATES.FALL) this.setState(STATES.FALL);
        }
        if(this.landingSquish>0) this.landingSquish-=1.5;
        if(Math.abs(this.recoilX)>0.1) this.recoilX*=0.75; else this.recoilX=0;
        this.x+=this.vx;
        this.x=Math.max(40,Math.min(canvas.width-40,this.x));
        if(!this.isPlayer) return;
        const moving=Math.abs(this.vx)>0.5;
        if(this.isGrounded&&!this.isAttacking&&!this.isBlocking
           &&this.state!==STATES.LAND&&this.state!==STATES.HURT&&this.state!==STATES.STUN)
            this.setState(moving?STATES.WALK:STATES.IDLE);
        if(!this.isGrounded&&this.vy<-1) this.setState(STATES.JUMP);
        if(this.isBlocking&&this.state!==STATES.HURT) this.setState(STATES.BLOCK,true);
    
};

Fighter.prototype.takeDamage = function(amount, attacker) {
        if(this.invincible||this.health<=0) return false;
        let finalDmg=amount, kb=5.5;
        if(this.isBlocking&&this.blockStamina>0){
            finalDmg=Math.floor(amount*CONFIG.blockReduction);
            this.blockStamina-=amount*2; kb=1.5;
            AudioManager.play('block');
            spawnHitParticles(this.x,this.y-40,'#3498db','block');
            ScreenShake.trigger(3,4);
            this.recoilX=attacker.x<this.x?3:-3;
        } else {
            AudioManager.play('hit');
            const heavy=finalDmg>20;
            spawnHitParticles(this.x,this.y-40,this.color,heavy?'heavy':'hit');
            spawnHitParticles(this.x,this.y-40,'#f1c40f','sparks');
            ScreenShake.trigger(heavy?8:5,heavy?8:5);
            this.setState(STATES.HURT,true);
            this.recoilX=attacker.x<this.x?5:-5;
        }
        this.health=Math.max(0,this.health-finalDmg);
        const dir=attacker.x<this.x?1:-1;
        this.vx=dir*kb; this.vy=-4;
        spawnDamageNumber(this.x,this.y-70,finalDmg,!this.isPlayer);
        this.invincible=true;
        this.invincibleEnd=Date.now()+CONFIG.invincibilityDuration;
        if(attacker && attacker.isPlayer){
            const n=Date.now();
            attacker.combo=(n-attacker.lastHitTime<CONFIG.comboWindow)?attacker.combo+1:1;
            attacker.lastHitTime=n;
            if(attacker.combo>=3){
                spawnComboEffect(this.x,this.y,attacker.combo);
                ScreenFlash.trigger(
                    attacker.combo>=7?'#e74c3c':attacker.combo>=5?'#e67e22':'#f1c40f',
                    Math.min(0.35,attacker.combo*0.05));
                if(attacker.combo>=5) ScreenShake.trigger(attacker.combo,6);
            }
        }
        return true;
    
};

Fighter.prototype.draw = function(ctx) {
        const now  = Date.now();
        const t    = this.stateTime;
        const f    = this.facing;
        const cx   = this.x + this.recoilX;
        const cy   = this.y;
        const inv  = this.invincible && Math.floor(now/80)%2;
        const st   = this.state;

        const heroId  = this.heroId||'kang';
        const isHogan = heroId==='hogan';
        const isGante = heroId==='gante';
        const isKenji = heroId==='kenji';
        const isNorm  = heroId==='normal';

        // Glow color
        const glow = inv ? '#fff' :
                     isHogan ? '#e67e22' :
                     isGante ? '#ff4400' :
                     isKenji ? '#9b59b6' :
                     isNorm  ? '#aaaaaa' : '#4ab4ff';

        // Scale: Hogan bigger, Kenji smaller
        const sc = isHogan?1.28 : isGante?1.12 : isKenji?0.92 : 1.0;

        ctx.save();
        // squish on landing
        const sq=Math.max(0,this.landingSquish);
        ctx.translate(cx,cy);
        ctx.scale(sc*(1+sq*0.03), sc*(1-sq*0.03));
        ctx.translate(-cx,-cy);

        // Ground shadow
        if(this.isGrounded){
            ctx.save();
            ctx.globalAlpha=0.28; ctx.fillStyle='#000';
            ctx.beginPath(); ctx.ellipse(cx,cy+4,28*sc,8,0,0,Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // Gante fire aura
        if(isGante){
            ctx.save();
            ctx.globalAlpha=0.2+Math.sin(now/280)*0.08;
            ctx.strokeStyle='#ff5500'; ctx.lineWidth=3;
            ctx.shadowColor='#ff4400'; ctx.shadowBlur=22;
            ctx.beginPath(); ctx.arc(cx,cy-40,46+Math.sin(now/300)*8,0,Math.PI*2); ctx.stroke();
            ctx.restore();
        }
        // Kenji speed trail
        if(isKenji&&Math.abs(this.vx)>1.5){
            ctx.save(); ctx.globalAlpha=0.1;
            this._silhouette(ctx, cx-f*20, cy, f, '#9b59b6');
            ctx.restore();
        }

        // ===== Compute pose offsets per state =====
        let pose = this._getPose(st, t, f, now);

        // Apply invincible flicker color
        const bodyCol = inv ? '#ffffff' : '#111213';

        // Main silhouette
        ctx.shadowColor=glow; ctx.shadowBlur=18+Math.sin(now/400)*4;
        this._drawPose(ctx, cx, cy, f, pose, bodyCol, glow, now, isHogan, isGante, isKenji, isNorm);
        ctx.shadowBlur=0;

        ctx.restore();
    
};

Fighter.prototype._getPose = function(st, t, f, now) {
        // defaults: upright idle
        let p = {
            // head offset
            hx:0, hy:0,
            // body lean (degrees)
            lean:0,
            // right arm: shoulder-elbow angle, elbow-wrist angle
            arRs:0, arRe:0,
            // left arm
            arLs:0, arLe:0,
            // right leg: hip-knee, knee-ankle
            lgRh:0, lgRa:0,
            // left leg
            lgLh:0, lgLa:0,
            // vertical bob
            bob:0,
            // attack active frame
            inActive: false,
        };

        const sin=Math.sin, cos=Math.cos, PI=Math.PI;
        const pr=(a,b)=>Math.min((t-a)/Math.max(b-a,1),1); // progress a→b

        if(st===STATES.IDLE){
            const b=sin(now/900)*4;
            p.bob=b; p.hy=b*0.5;
            p.arLs=20; p.arLe=15;
            p.arRs=-20; p.arRe=-15;
            p.lgRh=8; p.lgLh=-8;
        }
        else if(st===STATES.WALK){
            this.walkPhase+=0.12;
            const wc=this.walkPhase;
            p.arRs = sin(wc)*28;  p.arRe= sin(wc)*15;
            p.arLs =-sin(wc)*28;  p.arLe=-sin(wc)*15;
            p.lgRh = sin(wc)*30;  p.lgRa= sin(wc)*20;
            p.lgLh =-sin(wc)*30;  p.lgLa=-sin(wc)*20;
            p.bob  = Math.abs(sin(wc))*-4;
            p.lean = this.vx*2;
        }
        else if(st===STATES.JUMP){
            const pv=pr(0,200);
            p.bob  = -pv*20;
            p.arRs = lerp(0,-50,pv); p.arRe = lerp(0,-20,pv);
            p.arLs = lerp(0,-50,pv); p.arLe = lerp(0,-20,pv);
            p.lgRh = lerp(0, 20,pv); p.lgRa = lerp(0, 15,pv);
            p.lgLh = lerp(0,-20,pv); p.lgLa = lerp(0,-15,pv);
        }
        else if(st===STATES.FALL){
            p.arRs=-30; p.arRe=-15; p.arLs=-30; p.arLe=-15;
            p.lgRh=15;  p.lgLh=-15;
        }
        else if(st===STATES.LAND){
            const pv=1-pr(0,200);
            p.bob  = pv*12;
            p.lgRh = pv*25; p.lgLh = pv*25;
            p.arRs = pv*15; p.arLs = pv*15;
        }
        else if(st===STATES.ATTACK_LIGHT){
            const a=ANIM_DATA.attack_light;
            if(t<a.startup){
                const pv=pr(0,a.startup);
                p.arRs=lerp(0,-60,pv); p.arRe=lerp(0,-30,pv);
                p.lean=lerp(0,-12,pv);
            } else if(t<a.active){
                const pv=pr(a.startup,a.active);
                p.arRs=lerp(-60,60,pv); p.arRe=lerp(-30,15,pv);
                p.lean=lerp(-12,18,pv); p.hx=lerp(0,6,pv);
                p.inActive=true;
            } else {
                const pv=pr(a.active,a.recovery);
                p.arRs=lerp(60,0,pv); p.lean=lerp(18,0,pv);
            }
        }
        else if(st===STATES.ATTACK_HEAVY){
            const a=ANIM_DATA.attack_heavy;
            if(t<a.startup){
                const pv=pr(0,a.startup);
                p.arRs=lerp(0,-80,pv); p.arRe=lerp(0,-40,pv);
                p.arLs=lerp(0,-30,pv);
                p.lean=lerp(0,-18,pv); p.bob=lerp(0,-8,pv);
            } else if(t<a.active){
                const pv=pr(a.startup,a.active);
                p.arRs=lerp(-80,80,pv); p.arRe=lerp(-40,20,pv);
                p.lean=lerp(-18,24,pv); p.hx=lerp(0,8,pv);
                p.inActive=true;
            } else {
                const pv=pr(a.active,a.recovery);
                p.arRs=lerp(80,0,pv); p.lean=lerp(24,0,pv);
            }
        }
        else if(st===STATES.BLOCK){
            p.arRs=-10; p.arRe=-20; p.arLs=-10; p.arLe=-20;
            p.lean=-8; p.hx=-5;
        }
        else if(st===STATES.HURT){
            const pv=1-pr(0,320);
            p.lean=pv*20; p.hx=pv*8;
            p.arRs=lerp(0,-40,pv); p.bob=pv*6;
        }
        else if(st===STATES.WIN){
            const b=Math.abs(sin(now/400))*30;
            p.arRs=-b; p.arRe=-b*0.5;
            p.arLs=-b; p.arLe=-b*0.5;
            p.bob=sin(now/500)*5;
        }
        else if(st===STATES.DEATH){
            const pv=Math.min(t/600,1);
            p.bob=lerp(0,70,pv); p.lean=lerp(0,80,pv);
            p.arRs=lerp(0,60,pv); p.arLs=lerp(0,40,pv);
        }

        return p;
    
};

Fighter.prototype._drawPose = function(ctx, cx, cy, f, p, bodyCol, glow, now, isHogan, isGante, isKenji, isNorm) {
        // Sizes
        const headR  = isHogan?19 : isKenji?14 : 16;
        const torsoH = isHogan?48 : isKenji?38 : 42;
        const legL   = isHogan?38 : isKenji?30 : 34;
        const armL   = isHogan?30 : isKenji?24 : 26;
        const bodyW  = isHogan?16 : isKenji?10 : 13;
        const limbW  = isHogan?12 : isKenji?8  : 10;
        const fistR  = isHogan?10 : isKenji?7  : 8;

        // World Y of key body points
        const rootY    = cy + p.bob;
        const hipY     = rootY;
        const shoulderY= hipY - torsoH;
        const neckY    = shoulderY + 6;
        const headY    = shoulderY - headR - 4;

        // Body center X (with lean)
        const leanOff  = p.lean * 0.4;
        const bx       = cx + leanOff;

        // Helper: draw limb as thick rounded line
        const limb=(x1,y1,ang,len,w,col2)=>{
            const x2=x1+Math.sin(ang*Math.PI/180)*len*f;
            const y2=y1+Math.cos(ang*Math.PI/180)*len;
            ctx.save();
            ctx.strokeStyle=col2||bodyCol;
            ctx.lineWidth=w; ctx.lineCap='round';
            ctx.shadowColor=glow; ctx.shadowBlur=6;
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
            ctx.restore();
            return {x:x2,y:y2};
        };

        // ===== LEGS =====
        const legW=limbW+2;
        // Right leg
        const knee_r = limb(cx, hipY, p.lgRh, legL*0.55, legW);
        const foot_r = limb(knee_r.x, knee_r.y, p.lgRh+p.lgRa, legL*0.45, legW-1);
        // Left leg
        const knee_l = limb(cx, hipY, p.lgLh, legL*0.55, legW);
        const foot_l = limb(knee_l.x, knee_l.y, p.lgLh+p.lgLa, legL*0.45, legW-1);
        // Feet/boots
        this._drawBoots(ctx, foot_r.x, foot_r.y, foot_l.x, foot_l.y, f, isHogan, glow);

        // ===== TORSO =====
        ctx.save();
        ctx.strokeStyle=bodyCol; ctx.lineWidth=bodyW*2;
        ctx.lineCap='round'; ctx.shadowColor=glow; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.moveTo(cx, hipY); ctx.lineTo(bx, shoulderY); ctx.stroke();
        ctx.restore();

        // ===== TORSO DETAILS =====
        if(isHogan)  this._hoganTorso(ctx, bx, shoulderY, hipY, f, glow);
        if(isGante)  this._ganteTorso(ctx, bx, shoulderY, hipY);
        if(isKenji)  this._kenjiScarf(ctx, bx, shoulderY, f, now);

        // ===== ARMS =====
        // Right arm (attack arm)
        const elbow_r = limb(bx, shoulderY+8, p.arRs, armL*0.55, limbW);
        const wrist_r = limb(elbow_r.x, elbow_r.y, p.arRs+p.arRe, armL*0.45, limbW-1);
        // Left arm
        const elbow_l = limb(bx, shoulderY+8, p.arLs, armL*0.55, limbW);
        const wrist_l = limb(elbow_l.x, elbow_l.y, p.arLs+p.arLe, armL*0.45, limbW-1);
        // Fists
        this._drawFists(ctx, wrist_r.x, wrist_r.y, wrist_l.x, wrist_l.y, fistR, isGante, isHogan, glow);

        // ===== HEAD =====
        ctx.save();
        ctx.shadowColor=glow; ctx.shadowBlur=16+Math.sin(now/400)*4;
        const hg=ctx.createRadialGradient(bx+p.hx-4,headY-5,2,bx+p.hx,headY,headR+4);
        hg.addColorStop(0, isGante?'#1e0600':isKenji?'#18182e':isHogan?'#222':'#161618');
        hg.addColorStop(1,'#080808');
        ctx.fillStyle=hg;
        ctx.beginPath(); ctx.arc(bx+p.hx, headY, headR, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // ===== HEAD DETAILS =====
        if(!isNorm&&!isHogan&&!isGante&&!isKenji) this._kangBandana(ctx, bx+p.hx, headY, headR, f, now);
        if(isHogan)  this._hoganHelmet(ctx, bx+p.hx, headY, headR, f);
        if(isKenji)  this._kenjiHood(ctx, bx+p.hx, headY, headR, f);

        // ===== EYES =====
        this._drawEyes(ctx, bx+p.hx, headY, f, glow, now, isGante, isHogan);

        // ===== WEAPON =====
        this._drawWeapon(ctx, wrist_r.x, wrist_r.y, f, now, p.inActive);

        // ===== BLOCK SHIELD =====
        if(this.isBlocking){
            ctx.save();
            ctx.strokeStyle='#3498db'; ctx.lineWidth=4;
            ctx.shadowColor='#3498db'; ctx.shadowBlur=20;
            ctx.beginPath(); ctx.arc(bx+f*30, shoulderY+10, 24, 0, Math.PI*2); ctx.stroke();
            ctx.strokeStyle='rgba(100,200,255,0.2)'; ctx.lineWidth=2; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(bx+f*30, shoulderY+10, 19, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    
};

Fighter.prototype._silhouette = function(ctx, cx, cy, f, col) {
        ctx.fillStyle=col; ctx.strokeStyle=col;
        ctx.lineWidth=10; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-80); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx,cy-96,14,0,Math.PI*2); ctx.fill();
    
};

Fighter.prototype._drawBoots = function(ctx,rx,ry,lx,ly,f,isHogan,glow) {
        ctx.save();
        ctx.fillStyle=isHogan?'#1a0800':'#0a0a0a';
        ctx.shadowColor=isHogan?'#e67e22':glow; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.ellipse(rx+f*4,ry+4,14,5.5,f*0.15,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(lx-f*4,ly+4,14,5.5,-f*0.15,0,Math.PI*2); ctx.fill();
        if(isHogan){
            ctx.strokeStyle='rgba(230,126,34,0.6)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(rx+f*4,ry+3,13,4.5,f*0.15,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(lx-f*4,ly+3,13,4.5,-f*0.15,0,Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    
};

Fighter.prototype._drawFists = function(ctx,rx,ry,lx,ly,fR,isGante,isHogan,glow) {
        ctx.save();
        ctx.fillStyle=isGante?'#1a0000':'#111';
        ctx.shadowColor=isGante?'#ff4400':isHogan?'#e67e22':glow;
        ctx.shadowBlur=isGante||isHogan?14:6;
        ctx.beginPath(); ctx.arc(rx,ry,fR,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(lx,ly,fR,0,Math.PI*2); ctx.fill();
        // Knuckles
        const kc=isHogan?'rgba(230,126,34,0.7)':isGante?'rgba(255,80,0,0.6)':'rgba(255,220,50,0.5)';
        ctx.fillStyle=kc; ctx.shadowBlur=0;
        for(let k=-1;k<=1;k++){
            ctx.beginPath(); ctx.arc(rx+k*3.5,ry+2,2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
    
};

Fighter.prototype._hoganTorso = function(ctx,bx,sy,hy,f,glow) {
        ctx.save();
        ctx.shadowColor='#e67e22'; ctx.shadowBlur=10;
        // Chest plate
        ctx.fillStyle='rgba(230,126,34,0.22)';
        ctx.strokeStyle='rgba(230,126,34,0.55)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.rect(bx-16,sy+2,32,hy-sy-4); ctx.fill(); ctx.stroke();
        ctx.strokeStyle='rgba(230,126,34,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx,sy+2); ctx.lineTo(bx,hy-2); ctx.stroke();
        // Bolts
        [[bx-11,sy+7],[bx+11,sy+7],[bx-11,hy-10],[bx+11,hy-10]].forEach(([x,y])=>{
            ctx.fillStyle='rgba(230,126,34,0.6)';
            ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
        });
        // Shoulder pads
        [-1,1].forEach(s=>{
            const sx=bx+s*f*24, sy2=sy+2;
            ctx.fillStyle='rgba(230,126,34,0.3)';
            ctx.beginPath(); ctx.ellipse(sx,sy2,17,11,s*0.25,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='rgba(230,126,34,0.65)'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(sx,sy2,16,10,s*0.25,0,Math.PI*2); ctx.stroke();
        });
        ctx.restore();
    
};

Fighter.prototype._ganteTorso = function(ctx,bx,sy,hy) {
        ctx.save();
        ctx.strokeStyle='rgba(255,80,0,0.55)'; ctx.lineWidth=2;
        ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
        ctx.beginPath();
        ctx.moveTo(bx-7,sy+6); ctx.lineTo(bx+6,sy+18); ctx.lineTo(bx-4,sy+30); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx+7,sy+7); ctx.lineTo(bx-3,sy+19); ctx.stroke();
        ctx.restore();
    
};

Fighter.prototype._kenjiScarf = function(ctx,bx,sy,f,now) {
        ctx.save();
        const sw=Math.sin(now/450)*14;
        ctx.fillStyle='#7d3c98'; ctx.shadowColor='#9b59b6'; ctx.shadowBlur=14;
        ctx.beginPath();
        ctx.moveTo(bx+f*7,sy+4);
        ctx.quadraticCurveTo(bx-f*12+sw*.5,sy+20,bx-f*40+sw,sy+36);
        ctx.lineTo(bx-f*35+sw,sy+44);
        ctx.quadraticCurveTo(bx-f*8+sw*.5,sy+26,bx+f*5,sy+8);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    
};

Fighter.prototype._kangBandana = function(ctx,hx,hy,hr,f,now) {
        ctx.save();
        ctx.fillStyle='#c0392b'; ctx.shadowColor='#c0392b'; ctx.shadowBlur=12;
        ctx.beginPath();
        ctx.ellipse(hx,hy-hr*0.28,hr+3,6,0,Math.PI*0.82,Math.PI*2.18); ctx.fill();
        const bw=Math.sin(now/500)*14;
        ctx.beginPath();
        ctx.moveTo(hx-f*13,hy-hr*0.28);
        ctx.quadraticCurveTo(hx-f*26+bw,hy+5,hx-f*42+bw*1.6,hy+18);
        ctx.lineTo(hx-f*37+bw*1.6,hy+26);
        ctx.quadraticCurveTo(hx-f*22+bw,hy+11,hx-f*11,hy-4);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    
};

Fighter.prototype._hoganHelmet = function(ctx,hx,hy,hr,f) {
        ctx.save();
        ctx.shadowColor='#e67e22'; ctx.shadowBlur=10;
        ctx.fillStyle='rgba(230,126,34,0.45)';
        ctx.strokeStyle='rgba(230,126,34,0.65)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.rect(hx-16,hy-hr-2,32,15); ctx.fill(); ctx.stroke();
        ctx.restore();
    
};

Fighter.prototype._kenjiHood = function(ctx,hx,hy,hr,f) {
        ctx.save();
        ctx.fillStyle='#0d0d1a';
        ctx.beginPath(); ctx.arc(hx,hy,hr+1,Math.PI*1.06,Math.PI*1.94); ctx.fill();
        ctx.fillStyle='#100818';
        ctx.beginPath(); ctx.rect(hx-14,hy+1,28,12); ctx.fill();
        ctx.restore();
    
};

Fighter.prototype._drawEyes = function(ctx,hx,hy,f,glow,now,isGante,isHogan) {
        const ep=0.82+Math.sin(now/450)*0.18;
        const eW=isHogan?7:6.5, eH=isHogan?5:4.5;
        const ey=hy-1;
        [{x:hx-f*7},{x:hx+f*7}].forEach(({x:ex})=>{
            ctx.save();
            ctx.shadowColor=glow; ctx.shadowBlur=20*ep;
            const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,eW);
            eg.addColorStop(0,`rgba(255,255,255,${ep})`);
            const gc=glow.startsWith('#')?hexToRgbStr(glow):'255,255,255';
            eg.addColorStop(0.42,`rgba(${gc},${(ep*0.88).toFixed(2)})`);
            eg.addColorStop(1,'transparent');
            ctx.fillStyle=eg;
            ctx.beginPath(); ctx.ellipse(ex,ey,eW,eH,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle=`rgba(255,255,255,${(ep*0.8).toFixed(2)})`;
            ctx.shadowBlur=0;
            ctx.beginPath(); ctx.ellipse(ex,ey,eW*0.38,eH*0.42,0,0,Math.PI*2); ctx.fill();
            if(isGante){
                ctx.strokeStyle='rgba(255,160,80,0.7)'; ctx.lineWidth=2;
                ctx.beginPath(); ctx.moveTo(ex-4,ey-3); ctx.lineTo(ex+4,ey+3); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(ex+4,ey-3); ctx.lineTo(ex-4,ey+3); ctx.stroke();
            }
            ctx.restore();
        });
    
};

Fighter.prototype._drawWeapon = function(ctx,wx,wy,f,now,inActive) {
        if(this.hasSword){
            ctx.save(); ctx.lineCap='round';
            ctx.strokeStyle=inActive?'#ff1818':'#c0392b';
            ctx.shadowColor=inActive?'#ff0000':'#7b241c';
            ctx.shadowBlur=inActive?32:10; ctx.lineWidth=5;
            ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+f*46,wy-30); ctx.stroke();
            ctx.strokeStyle='rgba(255,180,180,0.3)'; ctx.lineWidth=2; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.moveTo(wx+f*2,wy-1); ctx.lineTo(wx+f*44,wy-29); ctx.stroke();
            ctx.strokeStyle='#f39c12'; ctx.shadowColor='#f39c12'; ctx.shadowBlur=8; ctx.lineWidth=6;
            ctx.beginPath(); ctx.moveTo(wx-f*6,wy+8); ctx.lineTo(wx+f*12,wy-8); ctx.stroke();
            ctx.restore();
        }
        if(this.heroId==='kenji'&&!this.hasSword){
            ctx.save(); ctx.translate(wx,wy);
            ctx.rotate(f*(-0.6+Math.sin(now/800)*0.12));
            ctx.fillStyle='#2c1810';
            ctx.beginPath(); ctx.rect(-3.5,-10,7,16); ctx.fill();
            ctx.fillStyle='#d0d0e8'; ctx.shadowColor='rgba(200,200,255,0.9)'; ctx.shadowBlur=12;
            ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(3,-28); ctx.lineTo(-3,-28); ctx.closePath(); ctx.fill();
            ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.moveTo(0.5,-11); ctx.lineTo(2,-27); ctx.lineTo(0,-26); ctx.closePath(); ctx.fill();
            ctx.strokeStyle='#999'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.arc(0,7,5,0,Math.PI*2); ctx.stroke();
            ctx.restore();
        }
    
};

// Helpers
function lerp(a,b,t){return a+(b-a)*t;}
function hexToRgbStr(hex){
    if(!hex||!hex.startsWith('#'))return'200,200,200';
}
function isKang(id){return !id||id==='kang';}

// Helpers

// ===== Hero ID helpers =====
function hexToRgb(hex){
    if(!hex||!hex.startsWith('#'))return'200,200,200';
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return isNaN(r)?'200,200,200':`${r},${g},${b}`;
}




// ========== متغيرات عامة ==========
let p1, p2;
let keys = { left: false, right: false };
let animFrameId = null;
let canvas, ctx;

// ========== تهيئة اللعبة ==========
function initGame(levelIdx) {
    canvas  = document.getElementById('gameCanvas');
    ctx     = canvas.getContext('2d');
    fightersSVG = document.getElementById('fightersSVG');
    canvas.width  = canvas.clientWidth  || window.innerWidth;
    canvas.height = canvas.clientHeight || window.innerHeight;
    CONFIG.groundY = canvas.height - 55;

    const lvl = LEVELS[levelIdx];
    const bonus = lvl.playerBonus;

    // اللاعب يكتسب HP ودمج مع كل مستوى
    const p1MaxHp = 100 + bonus.hp;
    p1 = new Fighter(canvas.width * 0.18, '#' + (()=>{
        const c = {'red':'e74c3c','blue':'3498db','green':'2ecc71','yellow':'f1c40f','white':'ecf0f1','black':'2c3e50'};
        return c[GameState.getP1Color()] || '2ecc71';
    })(), true, p1MaxHp, false);

    p2 = new Fighter(canvas.width * 0.82, lvl.color, false, lvl.hp, lvl.hasSword);
    p2.aiConfig = lvl.ai;
    // Set hero IDs for visual rendering
    const savedChar = JSON.parse(localStorage.getItem('game_character')||'{}');
    p1.heroId = savedChar.heroId || 'kang';
    // AI = شخصية عادية دايماً — Bosses بس بيبقوا مختلفين
    p2.heroId = lvl.type === 'finalboss' ? 'hogan' :
                lvl.type === 'miniboss'  ? 'gante' : 'normal';

    // خلفية Canvas المتحركة حسب المستوى
    canvas.parentElement.style.background = 'none';
    initBgParticles(lvl.bg, canvas.width, canvas.height);

    // موسيقى حسب نوع المستوى
    BattleMusic.play(lvl.type);

    GameState.active      = false;
    GameState.timeLeft    = CONFIG.roundTime;
    GameState.powerCharge = 0;
    GameState.p1Rounds    = 0;
    GameState.p2Rounds    = 0;
    GameState.currentRound = 1;
    p1.combo = 0;
    damageNumbers.length = 0;
    particles.length     = 0;
    ScreenShake.intensity = 0;
    ScreenShake.duration  = 0;
    ScreenFlash.alpha     = 0;

    // تحديث HUD
    document.getElementById('p1HealthBar').style.width = '100%';
    document.getElementById('p2HealthBar').style.width = '100%';
    document.getElementById('timerBar').style.width = '100%';
    document.getElementById('powerMeter').style.width = '0%';
    document.getElementById('comboDisplay').innerHTML = '<span>⚡</span> 0';
    document.getElementById('gameMessage').innerHTML  = '';
    document.getElementById('aiLabel').textContent    = lvl.fightLabel;
    document.getElementById('aiLabel').style.color    =
        lvl.type === 'finalboss' ? '#e74c3c' :
        lvl.type === 'miniboss'  ? '#e67e22' : lvl.color;

    updateHudLevels(levelIdx);
    updateRoundDots();
}

function updateRoundDots() {
    const p1Dots = document.getElementById('p1RoundDots');
    const p2Dots = document.getElementById('p2RoundDots');
    if (!p1Dots || !p2Dots) return;

    p1Dots.innerHTML = [0,1].map(i =>
        `<div class="round-dot ${i < GameState.p1Rounds ? 'p1-won' : ''}"></div>`
    ).join('');
    p2Dots.innerHTML = [0,1].map(i =>
        `<div class="round-dot ${i < GameState.p2Rounds ? 'p2-won' : ''}"></div>`
    ).join('');
}

function updateHudLevels(current) {
    const c = document.getElementById('hudLevels');
    c.innerHTML = LEVELS.map((lvl, i) => {
        let cls  = i < current ? 'done' : (i === current ? 'active' : '');
        let color = lvl.type === 'finalboss' ? '#e74c3c'
                  : lvl.type === 'miniboss'  ? '#e67e22' : '';
        let style = color ? `style="background:${color};border-color:${color}"` : '';
        return `<div class="hud-level-dot ${cls}" ${style} title="${lvl.fightLabel}"></div>`;
    }).join('');
}

// ========== فحص الضربات ==========
function checkAttacks() {
    const lvl       = LEVELS[GameState.currentLevelIdx];
    const bonusDmg  = lvl.playerBonus.damage;

    // ===== ضربة اللاعب — hitbox حقيقي =====
    if (p1.isAttacking && !p2.invincible) {
        const anim = ANIM_DATA[p1.state];
        const inActiveFrame = anim && p1.stateTime >= anim.startup && p1.stateTime < anim.active;
        if (inActiveFrame) {
            const atkBox  = p1.getAttackBox();
            const bodyBox = p2.getBodyBox();
            if (Fighter.boxesOverlap(atkBox, bodyBox)) {
                let baseDmg = CONFIG.baseDamage + bonusDmg + (GameState.powerCharge * 0.22);
                const comboMult = 1 + Math.floor(p1.combo / 3) * 0.15;
                baseDmg *= comboMult;
                var _r1=rollCrit(baseDmg); var dmg=_r1.dmg; var isCrit=_r1.isCrit;
                if (p2.takeDamage(dmg, p1)) {
                    if (isCrit)        spawnCritText(p2.x, p2.y);
                    if (comboMult > 1) spawnComboMultText(p2.x, p2.y - 40, comboMult);
                    GameState.powerCharge = 0;
                    if (p2.health <= 0) endRound(true);
                }
                p1.isAttacking = false;
            }
        }
    }

    // ===== ضربة AI — hitbox حقيقي =====
    if (p2.isAttacking && !p1.invincible) {
        const anim = ANIM_DATA[p2.state];
        const inActiveFrame = anim && p2.stateTime >= anim.startup && p2.stateTime < anim.active;
        if (inActiveFrame) {
            const atkBox  = p2.getAttackBox();
            const bodyBox = p1.getBodyBox();
            if (Fighter.boxesOverlap(atkBox, bodyBox)) {
                var _r2=rollCrit(lvl.damage); var aiDmg=_r2.dmg; var aiCrit=_r2.isCrit;
                if (p1.takeDamage(aiDmg, p2)) {
                    if (aiCrit) spawnCritText(p1.x, p1.y);
                    p1.combo = 0;
                    if (p1.health <= 0) endRound(false);
                }
                p2.isAttacking = false;
            }
        }
    }
}

// ========== ذكاء AI حسب المستوى ==========
// ========== Crit Damage System ==========
const CRIT_CHANCE = 0.08;
function rollCrit(baseDmg) {
    if (Math.random() < CRIT_CHANCE) {
        return { dmg: baseDmg * 2.2, isCrit: true };
    }
    return { dmg: baseDmg, isCrit: false };
}

function spawnCritText(x, y) {
    // CRIT! نص كبير وواضح
    damageNumbers.push({
        x, y: y - 70,
        vy: -4, alpha: 1,
        text: '💥 CRIT!',
        color: '#ff2020',
        size: 26, age: 0,
    });
    // ارتجاج قوي عند الـ Crit
    ScreenShake.trigger(12, 10);
    ScreenFlash.trigger('#ff0000', 0.2);
}

function spawnComboMultText(x, y, mult) {
    const pct = Math.round((mult - 1) * 100);
    damageNumbers.push({
        x: x + 30, y,
        vy: -2.5, alpha: 1,
        text: `×${mult.toFixed(1)} COMBO`,
        color: '#f1c40f',
        size: 18, age: 0,
    });
}

function updateAI() {
    if (p2.stunned > 0 || !GameState.active) return;

    const cfg  = p2.aiConfig;
    const dist = Math.abs(p1.x - p2.x);
    const dx   = p1.x - p2.x;
    const now  = Date.now();

    p2.facing = dx > 0 ? 1 : -1;

    // تصدي ذكي
    const shouldBlock = p1.isAttacking && dist < 65 && Math.random() < cfg.blockChance;
    p2.isBlocking = shouldBlock;
    if (shouldBlock) {
        p2.setState(STATES.BLOCK, true);
    }

    // حركة
    if (!p2.isBlocking) {
        if (dist > 60) {
            p2.vx = (dx > 0 ? 1 : -1) * CONFIG.playerSpeed * cfg.speed;
            p2.setState(STATES.WALK);
        } else if (dist < 35) {
            p2.vx = (dx > 0 ? -1 : 1) * CONFIG.playerSpeed * 0.4;
        } else {
            p2.vx *= 0.7;
            if (p2.isGrounded) p2.setState(STATES.IDLE);
        }
    }

    // هجوم مع Animation
    const cooldownReady = now - p2.lastAttackTime > CONFIG.attackCooldown;
    const inRange = dist < 60;

    if (!p2.isBlocking && inRange && cooldownReady) {
        const extraChance = cfg.aggression * (p1.isAttacking ? 0.015 : 0);
        if (Math.random() < cfg.attackChance + extraChance) {
            p2.isAttacking = true;
            p2.lastAttackTime = now;
            // AI بيستخدم heavy attack أحياناً
            const useHeavy = cfg.aggression > 0.7 && Math.random() < 0.3;
            p2.setState(useHeavy ? STATES.ATTACK_HEAVY : STATES.ATTACK_LIGHT, true);
            AudioManager.play('punch');
            const dur = useHeavy ? ANIM_DATA.attack_heavy.dur : ANIM_DATA.attack_light.dur;
            setTimeout(() => {
                p2.isAttacking = false;
                p2.setState(STATES.IDLE, true);
            }, dur);
        }
    }

    // قفز
    if (p2.isGrounded && Math.random() < cfg.jumpChance) {
        p2.vy = CONFIG.jumpForce;
        p2.setState(STATES.JUMP, true);
        if (cfg.aggression > 0.7 && dist > 80) {
            p2.vx = (dx > 0 ? 1 : -1) * CONFIG.playerSpeed * cfg.speed * 1.2;
        }
        AudioManager.play('jump');
    }

    // Final Boss extra attack
    if (cfg.aggression >= 1.0 && !p2.isBlocking && dist < 55 && cooldownReady) {
        if (Math.random() < 0.015) {
            p2.isAttacking = true;
            p2.lastAttackTime = now;
            p2.setState(STATES.ATTACK_HEAVY, true);
            AudioManager.play('punch');
            setTimeout(() => { p2.isAttacking = false; p2.setState(STATES.IDLE, true); }, ANIM_DATA.attack_heavy.dur);
        }
    }
}

function gameLoop() {
    if (!GameState.active) { animFrameId = null; return; }
    const t = Date.now();
    const W = canvas.width, H = canvas.height;

    ctx.clearRect(0, 0, W, H);

    // رسم الخلفية المتحركة
    const lvlBg = LEVELS[GameState.currentLevelIdx].bg;
    drawAnimatedBg(lvlBg, W, H, t);

    // تأثير ارتجاج الشاشة
    ctx.save();
    ScreenShake.update();
    ScreenShake.apply(ctx);

    // تحكم اللاعب
    if (p1.stunned <= 0) {
        if (keys.left)       { p1.vx = -CONFIG.playerSpeed; p1.facing = -1; }
        else if (keys.right) { p1.vx =  CONFIG.playerSpeed; p1.facing =  1; }
    }

    // شحن القوة
    if (GameState.mouseDown && !p1.isAttacking)
        GameState.powerCharge = Math.min(CONFIG.maxPower, GameState.powerCharge + CONFIG.powerChargeRate);
    else
        GameState.powerCharge = Math.max(0, GameState.powerCharge - 0.5);

    p1.update();
    updateAI();
    p2.update();
    checkAttacks();

    // رسم الجسيمات خلف الشخصيات
    updateAndDrawParticles(ctx);

    p1.draw(ctx);
    p2.draw(ctx);

    // رسم نقاط الضرر
    for (let i = damageNumbers.length - 1; i >= 0; i--) {
        const d = damageNumbers[i];
        d.y  += d.vy;
        d.vy *= 0.92;
        d.alpha -= 0.022;
        d.age++;
        if (d.alpha <= 0) { damageNumbers.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = d.alpha;
        ctx.font = `bold ${d.size}px 'Segoe UI', sans-serif`;
        ctx.fillStyle = d.color;
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 3;
        ctx.textAlign = 'center';
        ctx.strokeText(d.text, d.x, d.y);
        ctx.fillText(d.text, d.x, d.y);
        ctx.restore();
    }

    ctx.restore(); // end screen shake

    // فلاش الكومبو فوق كل حاجة
    ScreenFlash.draw(ctx);

    // تحديث HUD
    document.getElementById('p1HealthBar').style.width = (p1.health / p1.maxHealth * 100) + '%';
    document.getElementById('p2HealthBar').style.width = (p2.health / p2.maxHealth * 100) + '%';
    document.getElementById('powerMeter').style.width  = GameState.powerCharge + '%';
    document.getElementById('comboDisplay').innerHTML  = `<span>⚡</span> ${p1.combo}`;

    animFrameId = requestAnimationFrame(gameLoop);
}

// ========== التايمر ==========
function startTimer() {
    if (GameState.timerInterval) clearInterval(GameState.timerInterval);
    GameState.timerInterval = setInterval(() => {
        if (!GameState.active) return;
        GameState.timeLeft--;
        document.getElementById('timerBar').style.width =
            (GameState.timeLeft / CONFIG.roundTime * 100) + '%';
        if (GameState.timeLeft <= 0) endRound(p1.health > p2.health);
    }, 1000);
}

// ========== نهاية جولة واحدة ==========
function endRound(playerWon) {
    if (!GameState.active) return;
    GameState.active = false;
    clearInterval(GameState.timerInterval);

    const lvl = LEVELS[GameState.currentLevelIdx];

    // تحديث نقاط الجولات
    if (playerWon) {
        GameState.p1Rounds++;
    } else {
        GameState.p2Rounds++;
    }
    updateRoundDots();

    // شاشة نتيجة الجولة السريعة
    const ready = document.getElementById('readyScreen');
    ready.style.display = 'flex';

    if (playerWon) {
        ready.innerHTML = `<span style="color:#2ecc71">Round ${GameState.currentRound}<br>WIN! ✅</span>`;
        AudioManager.play('win');
    } else {
        ready.innerHTML = `<span style="color:#e74c3c">Round ${GameState.currentRound}<br>LOSE ❌</span>`;
        AudioManager.play('lose');
    }

    // هل انتهت المعركة؟
    const matchWon  = GameState.p1Rounds >= 2;
    const matchLost = GameState.p2Rounds >= 2;
    const isDecider = GameState.currentRound >= 3;

    setTimeout(() => {
        ready.style.display = 'none';

        if (matchWon || matchLost || isDecider) {
            // نهاية المعركة كاملة
            endMatch(GameState.p1Rounds > GameState.p2Rounds);
        } else {
            // جولة جديدة
            GameState.currentRound++;
            startNextRound();
        }
    }, 1800);
}

// ========== بدء جولة جديدة (نفس العدو) ==========
function startNextRound() {
    const lvl   = LEVELS[GameState.currentLevelIdx];
    const bonus = lvl.playerBonus;

    // إعادة تعيين HP فقط بدون تغيير الـ rounds
    const p1MaxHp = 100 + bonus.hp;
    p1.health = p1MaxHp; p1.maxHealth = p1MaxHp;
    p1.x = canvas.width * 0.18; p1.y = CONFIG.groundY;
    p1.vx = 0; p1.vy = 0; p1.isAttacking = false;
    p1.isBlocking = false; p1.invincible = false; p1.combo = 0;

    p2.health = lvl.hp; p2.maxHealth = lvl.hp;
    p2.x = canvas.width * 0.82; p2.y = CONFIG.groundY;
    p2.vx = 0; p2.vy = 0; p2.isAttacking = false;
    p2.isBlocking = false; p2.invincible = false;

    GameState.timeLeft    = CONFIG.roundTime;
    GameState.powerCharge = 0;
    damageNumbers.length  = 0;

    document.getElementById('p1HealthBar').style.width = '100%';
    document.getElementById('p2HealthBar').style.width = '100%';
    document.getElementById('timerBar').style.width    = '100%';
    document.getElementById('powerMeter').style.width  = '0%';
    document.getElementById('gameMessage').innerHTML   = '';

    const ready = document.getElementById('readyScreen');
    AudioManager.play('fight');

    setTimeout(() => {
        ready.style.display = 'flex';
        ready.innerHTML = `Round ${GameState.currentRound}`;
    }, 300);
    setTimeout(() => { ready.innerHTML = 'FIGHT!'; }, 1800);
    setTimeout(() => {
        ready.style.display = 'none';
        GameState.active = true;
        startTimer();
        animFrameId = requestAnimationFrame(gameLoop);
    }, 2600);
}

// ========== نهاية المعركة كاملة ==========
function endMatch(playerWon) {
    const lvl    = LEVELS[GameState.currentLevelIdx];
    const isLast = GameState.currentLevelIdx >= LEVELS.length - 1;
    const endScr = document.getElementById('endScreen');
    const title  = document.getElementById('endTitle');
    const sub    = document.getElementById('endSubtitle');
    const dots   = document.getElementById('endLevelDots');
    const btns   = document.getElementById('endBtns');

    if (playerWon) {
        Stats.addWin();
        p1.setState(STATES.WIN, true);
        BattleMusic.stop();
        // إضافة Gold للـ Character المشترك
        const goldReward = ARCADE_GOLD.rewards[GameState.currentLevelIdx] || 50;
        ARCADE_GOLD.addGold(goldReward);
        if (isLast) {
            title.textContent = '👑 أنت البطل!';
            title.style.color = '#f1c40f';
            sub.textContent   = 'هزمت الـ Final Boss وأتممت الـ Arcade Mode!';
        } else if (lvl.type === 'miniboss') {
            title.textContent = '🔥 أسقطت الـ Mini Boss!';
            title.style.color = '#e67e22';
            sub.textContent   = 'المعارك الحقيقية بتبدأ دلوقتي...';
        } else {
            title.textContent = '🏆 انتصرت!';
            title.style.color = '#2ecc71';
            sub.textContent   = `${GameState.p1Rounds} - ${GameState.p2Rounds} | 🪙 +${goldReward} Gold!`;
        }
        btns.innerHTML = isLast
            ? `<button class="end-btn btn-home" onclick="closeEndScreen(true)">🏠 القائمة الرئيسية</button>`
            : `<button class="end-btn btn-next" onclick="goNextLevel()">التالي ⬅️</button>
               <button class="end-btn btn-home" onclick="closeEndScreen(true)">🏠 القائمة</button>`;
    } else {
        Stats.addLoss();
        BattleMusic.stop();
        if (lvl.type === 'miniboss') {
            title.textContent = '💥 الـ Mini Boss هزمك!';
            title.style.color = '#e67e22';
        } else if (lvl.type === 'finalboss') {
            title.textContent = '☠️ الـ Final Boss هزمك!';
            title.style.color = '#e74c3c';
        } else {
            title.textContent = '💀 خسرت!';
            title.style.color = '#e74c3c';
        }
        sub.textContent = `${GameState.p1Rounds} - ${GameState.p2Rounds} | حاول تاني!`;
        btns.innerHTML  = `<button class="end-btn btn-retry" onclick="retryLevel()">🔄 إعادة المحاولة</button>
                           <button class="end-btn btn-home"  onclick="closeEndScreen(true)">🏠 القائمة</button>`;
    }

    dots.innerHTML = LEVELS.map((l, i) => {
        let cls   = i < GameState.currentLevelIdx ? 'done' : (i === GameState.currentLevelIdx ? 'active' : '');
        let color = l.type === 'finalboss' ? '#e74c3c' : l.type === 'miniboss' ? '#e67e22' : '';
        let style = color && cls ? `style="background:${color};border-color:${color}"` : '';
        return `<div class="level-dot ${cls}" ${style} title="${l.fightLabel}"></div>`;
    }).join('');

    endScr.style.display = 'flex';
}

function retryLevel()  { closeEndScreen(false); startLevel(GameState.currentLevelIdx); }
function goNextLevel() {
    GameState.currentLevelIdx++;
    Stats.currentLevel = GameState.currentLevelIdx + 1;
    Stats.save();
    closeEndScreen(false);
    startLevel(GameState.currentLevelIdx);
}
function closeEndScreen(goHome) {
    document.getElementById('endScreen').style.display = 'none';
    if (goHome) backToMainFromGame();
}

// ========== بدء مستوى ==========
function startLevel(idx) {
    GameState.currentLevelIdx = idx;

    document.getElementById('gameScreen').style.display = 'block';

    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    GameState.active = false;

    // ننتظر 100ms عشان الـ canvas يتحسب صح على الموبايل
    setTimeout(() => {
        initGame(idx);

        // لو الـ canvas لسه 0 نحاول تاني
        if (canvas.width === 0 || canvas.height === 0) {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            CONFIG.groundY = canvas.height - 55;
            p1.x = canvas.width * 0.18;
            p2.x = canvas.width * 0.82;
        }

        const ready = document.getElementById('readyScreen');
        AudioManager.play('fight');

        setTimeout(() => { ready.style.display = 'flex'; ready.innerHTML = 'Round 1'; }, 500);
        setTimeout(() => { ready.innerHTML = 'FIGHT!'; }, 2500);
        setTimeout(() => {
            ready.style.display = 'none';
            GameState.active = true;
            startTimer();
            animFrameId = requestAnimationFrame(gameLoop);
        }, 3500);
    }, 100);
}

// ========== بدء وضع القصة ==========
function startCampaign() {
    document.getElementById('arcadeMenuWrapper').style.display = 'none';
    startLevel(0);
}

// تحديث واجهة الـ menu
function updateArcadeMenu() {
    // Gold
    const goldEl = document.getElementById('arcadeGoldDisplay');
    if (goldEl) goldEl.textContent = ARCADE_GOLD.getGold();
    // Stage dots
    const dots = document.getElementById('stageProgressDots');
    if (dots) {
        dots.innerHTML = LEVELS.map((lvl, i) => {
            const done = i < (Stats.currentLevel - 1);
            const cls  = lvl.type === 'finalboss' ? 'final' :
                         lvl.type === 'miniboss'  ? 'boss'  : '';
            return `<div class="stage-dot ${cls} ${done?'done':''}"></div>`;
        }).join('');
    }
}

// ========== التحكم ==========
function setupControls() {
    const bind = (id, onStart, onEnd) => {
        const el = document.getElementById(id);
        if (!el) return;
        const s = e => { e.preventDefault(); onStart(); };
        const e = ev => { ev.preventDefault(); if (onEnd) onEnd(); };
        el.addEventListener('touchstart',  s, { passive:false });
        el.addEventListener('touchend',    e, { passive:false });
        el.addEventListener('touchcancel', e, { passive:false });
        el.addEventListener('mousedown', s);
        el.addEventListener('mouseup',   e);
        el.addEventListener('mouseleave',e);
    };

    // Joystick
    const jBase = document.getElementById('joystickBase');
    const jKnob = document.getElementById('joystickKnob');
    const maxR  = 32;

    function jCenter() {
        const r = jBase.getBoundingClientRect();
        return { x: r.left + r.width/2, y: r.top + r.height/2 };
    }
    function moveJ(cx, cy) {
        const c = jCenter();
        let dx = cx - c.x, dy = cy - c.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > maxR) { dx = dx/dist*maxR; dy = dy/dist*maxR; }
        jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        keys.left  = dx < -8;
        keys.right = dx >  8;
    }
    function resetJ() {
        jKnob.style.transform = 'translate(-50%,-50%)';
        keys.left = keys.right = false;
    }

    jBase.addEventListener('touchstart',  e => { e.preventDefault(); moveJ(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    jBase.addEventListener('touchmove',   e => { e.preventDefault(); moveJ(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    jBase.addEventListener('touchend',    e => { e.preventDefault(); resetJ(); }, { passive:false });
    jBase.addEventListener('touchcancel', e => { e.preventDefault(); resetJ(); }, { passive:false });
    jBase.addEventListener('mousedown', e => moveJ(e.clientX, e.clientY));
    jBase.addEventListener('mousemove', e => { if (e.buttons===1) moveJ(e.clientX, e.clientY); });
    jBase.addEventListener('mouseup',   resetJ);
    jBase.addEventListener('mouseleave',resetJ);

    // أزرار الأكشن
    bind('btnJump', () => {
        if (p1 && p1.isGrounded && GameState.active) {
            p1.vy = CONFIG.jumpForce;
            p1.setState(STATES.JUMP, true);
            AudioManager.play('jump');
        }
    });

    bind('btnAttack', () => {
        if (!p1 || !GameState.active || p1.stunned > 0) return;
        const now = Date.now();
        if (now - p1.lastAttackTime > CONFIG.attackCooldown) {
            p1.isAttacking = true;
            p1.lastAttackTime = now;
            GameState.mouseDown = true;
            // Heavy attack لو power charge عالي
            const isHeavy = GameState.powerCharge > 50;
            p1.setState(isHeavy ? STATES.ATTACK_HEAVY : STATES.ATTACK_LIGHT, true);
            AudioManager.play('punch');
            const dur = isHeavy ? ANIM_DATA.attack_heavy.dur : ANIM_DATA.attack_light.dur;
            setTimeout(() => {
                p1.isAttacking = false;
                GameState.mouseDown = false;
                p1.setState(STATES.IDLE, true);
            }, dur);
        }
    }, () => { GameState.mouseDown = false; });

    bind('btnBlock', () => {
        if (p1 && GameState.active && p1.blockStamina > 0) {
            p1.isBlocking = true;
            p1.setState(STATES.BLOCK, true);
        }
    }, () => {
        if (p1) { p1.isBlocking = false; p1.setState(STATES.IDLE, true); }
    });
}

// ========== الإعدادات ==========
function openSettings()  { document.getElementById('settingsScreen').style.display = 'flex'; }
function closeSettings() { document.getElementById('settingsScreen').style.display = 'none'; }
function toggleSound() {
    GameState.soundOn = !GameState.soundOn;
    const btn = document.getElementById('soundToggle');
    btn.classList.toggle('on', GameState.soundOn);
}

// ========== القوائم ==========
function selectColor(color) {
    GameState.getP1Color() = color;
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    const el = document.getElementById(`color${color[0].toUpperCase()+color.slice(1)}`);
    if (el) el.classList.add('selected');
    setTimeout(backToMain, 300);
}

function showCharacterSelect() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('characterSelect').style.display = 'flex';
    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
    const el = document.getElementById(`color${GameState.getP1Color()[0].toUpperCase()+GameState.getP1Color().slice(1)}`);
    if (el) el.classList.add('selected');
}

function showStats() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('statsScreen').style.display = 'flex';
    document.getElementById('statsDisplay').innerHTML = `
        <div style="margin:12px 0;">🏆 الفوز: ${Stats.wins}</div>
        <div style="margin:12px 0;">💔 الخسارة: ${Stats.losses}</div>
        <div style="margin:12px 0;">📈 نسبة الفوز: ${Stats.getWinRate()}%</div>
        <div style="margin:12px 0;">🎮 آخر مستوى وصلت: ${LEVELS[Math.min(Stats.currentLevel-1,8)].name}</div>
        <div style="margin:12px 0;">🪙 Gold المجموع: ${ARCADE_GOLD.getGold()}</div>
    `;
}

function showModes() {
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('modesScreen').style.display = 'flex';
}

function backToMain() {
    document.getElementById('characterSelect').style.display = 'none';
    document.getElementById('statsScreen').style.display    = 'none';
    document.getElementById('modesScreen').style.display    = 'none';
    document.getElementById('mainMenu').style.display       = 'flex';
}

function backToMainFromGame() {
    GameState.active = false;
    clearInterval(GameState.timerInterval);
    if (animFrameId !== null) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('endScreen').style.display  = 'none';
    // رجوع للقائمة — لو جوه iframe استخدم parent، لو مش جوه iframe روح index
    if (window.parent && window.parent.returnToMenu) {
        window.parent.returnToMenu();
    } else {
        window.location.href = 'index.html';
    }
}

function checkOri() {
    // لا نعرض شاشة التدوير هنا — المستخدم جاي من landscape
    const gameOn = document.getElementById('gameScreen').style.display === 'block';
    if (!gameOn) {
        document.getElementById('arcadeMenuWrapper').style.display = 'flex';
    }
}

// ========== التحميل ==========
window.onload = () => {
    // فيكس الارتفاع على الموبايل
    function fixVP() {
        const gs = document.querySelector('.game-screen');
        if (gs) {
            gs.style.height = window.innerHeight + 'px';
            gs.style.width  = window.innerWidth  + 'px';
        }
        // لو الكانفاس موجود وشغال، نحدث أبعاده
        const cv = document.getElementById('gameCanvas');
        if (cv && cv.parentElement && cv.parentElement.offsetWidth > 0) {
            cv.style.width  = '100%';
            cv.style.height = '100%';
        }
    }
    fixVP();
    window.addEventListener('resize', fixVP);
    window.addEventListener('orientationchange', () => setTimeout(fixVP, 300));

    AudioManager.preload();
    BattleMusic.load();
    setupControls();
    document.body.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

    function checkOri() {
        const portrait = window.innerHeight > window.innerWidth;
        const gameOn   = document.getElementById('gameScreen').style.display === 'block';
        const rot      = document.getElementById('rotateScreen');
        const wrap     = document.getElementById('arcadeMenuWrapper');
        if (gameOn) { rot.style.display = 'none'; return; }
        if (portrait) {
            rot.style.display  = 'flex';
            wrap.style.display = 'none';
        } else {
            rot.style.display  = 'none';
            wrap.style.display = 'flex';
        }
    }
    window.addEventListener('resize', checkOri);
    window.addEventListener('orientationchange', () => setTimeout(checkOri, 300));

    // لو جاي من القائمة الرئيسية مباشرة — ابدأ فوراً لو landscape
    const urlParams = new URLSearchParams(window.location.search);
    const portrait  = window.innerHeight > window.innerWidth;
    if (urlParams.get('play') === '1' && !portrait) {
        startCampaign();
    } else {
        checkOri();
    }
};
</script>
